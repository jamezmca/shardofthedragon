<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See in Morse Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top press banner ── */
    #press-banner {
      width: 100%;
      height: 120px;
      background: #141e14;
      border-bottom: 2px solid #2a4a2a;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 16px;
      transition: background 0.05s;
      outline: none;
    }

    #press-banner.down {
      background: #1e3020;
    }

    #banner-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    #banner-title {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: #3a6a3a;
      text-transform: uppercase;
    }

    #seq-display {
      font-size: 1.6rem;
      letter-spacing: 0.5em;
      color: #c8a400;
      min-height: 2rem;
      white-space: nowrap;
    }

    #banner-hint {
      font-size: 0.68rem;
      color: #2e4e2e;
      letter-spacing: 0.05em;
    }

    #char-display {
      font-size: 5.5rem;
      font-weight: bold;
      color: #ffd700;
      line-height: 1;
      min-width: 80px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Output banner ── */
    #output-banner {
      width: 100%;
      height: 64px;
      background: #161616;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 20px 0 28px;
      gap: 16px;
    }

    #output {
      flex: 1;
      font-size: 2rem;
      letter-spacing: 0.25em;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #clear-btn {
      flex-shrink: 0;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid #4a2a2a;
      color: #664444;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    #clear-btn:hover { border-color: #8a4a4a; color: #cc8888; }

    /* ── Tree ── */
    #tree-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: visible;
      padding: 8px 0;
    }

    #morse-tree { display: block; margin: 0 auto; }
  </style>
</head>
<body>

  <div id="press-banner" tabindex="0">
    <div id="banner-left">
      <div id="banner-title">Morse Code Trainer — tap · hold –</div>
      <div id="seq-display"></div>
      <div id="banner-hint">keyboard: . – &nbsp;│&nbsp; space/enter to hold &nbsp;│&nbsp; backspace to undo</div>
    </div>
    <div id="char-display"></div>
  </div>

  <div id="output-banner">
    <div id="output"></div>
    <button id="clear-btn">CLEAR</button>
  </div>

  <div id="tree-wrap">
    <svg id="morse-tree" width="1400" height="555"></svg>
  </div>

  <script>
  (() => {
    const MORSE = {
      '-':'T',    '.':'E',
      '--':'M',   '-.':'N',   '.-':'A',   '..':'I',
      '---':'O',  '--.':'G',  '-.-':'K',  '-..':'D',
      '.--':'W',  '.-.':'R',  '..-':'U',  '...':'S',
      '--.-':'Q', '--..':'Z', '-.--':'Y', '-.-.':'C',
      '-..-':'X', '-...':'B', '.---':'J', '.--.':'P',
      '.-..':'L', '..-.':'F', '...-':'V', '....':'H',
      '-----':'0','----.':'9','---..' :'8','--...':'7',
      '-....':'6','.....':'5','....-':'4','...--':'3',
      '..---':'2','.----':'1'
    };

    // ── Build tree ────────────────────────────────────────────────────────
    const nodeMap = new Map();
    function getNode(seq) {
      if (!nodeMap.has(seq)) nodeMap.set(seq, { seq, char: MORSE[seq] || null, dash: null, dot: null, x: 0, y: 0 });
      return nodeMap.get(seq);
    }
    const prefixSet = new Set(['']);
    for (const s of Object.keys(MORSE)) for (let i = 1; i <= s.length; i++) prefixSet.add(s.slice(0, i));
    for (const s of prefixSet) {
      if (!s) continue;
      const n = getNode(s), p = getNode(s.slice(0, -1));
      if (s.endsWith('-')) p.dash = n; else p.dot = n;
    }
    const root = getNode('');

    // ── Layout ────────────────────────────────────────────────────────────
    const SVG_W = 1400, SVG_H = 555, LEVEL_H = 86;
    function layout(n, x, y, sp) {
      if (!n) return;
      n.x = x; n.y = y;
      layout(n.dash, x - sp, y + LEVEL_H, sp / 2);
      layout(n.dot,  x + sp, y + LEVEL_H, sp / 2);
    }
    layout(root, SVG_W / 2, 46, 350);

    // ── Draw SVG ──────────────────────────────────────────────────────────
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('morse-tree');
    function mkEl(tag, attrs) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }
    function mkTxt(parent, x, y, str, attrs = {}) {
      const t = mkEl('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', ...attrs });
      t.textContent = str; parent.appendChild(t); return t;
    }

    const edgeG = mkEl('g', {}), nodeG = mkEl('g', {});
    svg.append(edgeG, nodeG);

    mkTxt(svg, root.x, root.y - 34, 'START', { fill:'#666', 'font-size':'12', 'font-family':'Courier New', 'letter-spacing':'4' });
    mkTxt(svg, root.x - 195, root.y - 18, '← DAH  (–)', { fill:'#444', 'font-size':'11', 'font-family':'Courier New' });
    mkTxt(svg, root.x + 195, root.y - 18, '(·)  DIT →',  { fill:'#444', 'font-size':'11', 'font-family':'Courier New' });

    const R = d => d === 0 ? 20 : d <= 2 ? 17 : d <= 3 ? 15 : d <= 4 ? 13 : 10;
    const edgeMap = new Map(), circMap = new Map();

    for (const [s, n] of nodeMap) {
      const d = s.length;
      if (d > 0) {
        const p = nodeMap.get(s.slice(0, -1));
        const ln = mkEl('line', { x1:p.x, y1:p.y, x2:n.x, y2:n.y, stroke:'#2a2a2a', 'stroke-width':'1.5' });
        edgeG.appendChild(ln); edgeMap.set(s, ln);
      }
      const named = n.char !== null, isRoot = s === '';
      const c = mkEl('circle', {
        cx: n.x, cy: n.y, r: R(d),
        fill:   isRoot ? '#252015' : named ? '#142014' : '#161616',
        stroke: isRoot ? '#c8a400' : named ? '#2d5c2d' : '#222',
        'stroke-width': isRoot ? '2' : '1.5'
      });
      nodeG.appendChild(c); circMap.set(s, c);
      mkTxt(nodeG, n.x, n.y, isRoot ? '' : (n.char || ''), {
        fill: named ? '#a8d8a8' : '#2a2a2a',
        'font-size': d <= 3 ? '12' : '10',
        'font-family': 'Courier New', 'font-weight': 'bold', 'pointer-events': 'none'
      });
    }

    // ── State ─────────────────────────────────────────────────────────────
    let seq = '', t0 = 0, pressed = false, timer = null, outputText = '';
    const seqEl  = document.getElementById('seq-display');
    const charEl = document.getElementById('char-display');
    const outEl  = document.getElementById('output');
    const banner = document.getElementById('press-banner');

    function pressStart() {
      if (pressed) return;
      pressed = true; t0 = Date.now(); banner.classList.add('down');
    }
    function pressEnd() {
      if (!pressed) return;
      pressed = false; banner.classList.remove('down');
      push(Date.now() - t0 < 250 ? '.' : '-');
    }
    function push(sym) {
      clearTimeout(timer);
      seq += sym; render();
      timer = setTimeout(commit, 1400);
    }
    function commit() {
      if (!seq) return;
      const ch = MORSE[seq];
      if (ch) { outputText += ch; outEl.textContent = outputText; }
      seq = ''; render();
    }

    function render() {
      seqEl.textContent = seq.split('').map(s => s === '.' ? '·' : '–').join(' ');
      charEl.textContent = MORSE[seq] || '';
      for (const [s, ln] of edgeMap) { ln.setAttribute('stroke', '#2a2a2a'); ln.setAttribute('stroke-width', '1.5'); }
      for (const [s, c] of circMap) {
        const n = nodeMap.get(s), named = n.char !== null, isRoot = s === '';
        c.setAttribute('fill',   isRoot ? '#252015' : named ? '#142014' : '#161616');
        c.setAttribute('stroke', isRoot ? '#c8a400' : named ? '#2d5c2d' : '#222');
      }
      for (let i = 0; i <= seq.length; i++) {
        const ps = seq.slice(0, i), c = circMap.get(ps);
        if (c) {
          c.setAttribute('fill',   i === seq.length ? '#c8a400' : '#2c2810');
          c.setAttribute('stroke', i === seq.length ? '#ffd700' : '#776800');
        }
        if (i > 0) {
          const ln = edgeMap.get(ps);
          if (ln) { ln.setAttribute('stroke', '#c8a400'); ln.setAttribute('stroke-width', '2.5'); }
        }
      }
    }

    // ── Banner events ─────────────────────────────────────────────────────
    banner.addEventListener('mousedown',  pressStart);
    banner.addEventListener('mouseup',    pressEnd);
    banner.addEventListener('mouseleave', () => { if (pressed) pressEnd(); });
    banner.addEventListener('touchstart', e => { e.preventDefault(); pressStart(); }, { passive: false });
    banner.addEventListener('touchend',   e => { e.preventDefault(); pressEnd();   }, { passive: false });
    banner.addEventListener('touchcancel',e => { e.preventDefault(); if (pressed) pressEnd(); }, { passive: false });

    // ── Keyboard ──────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressStart(); }
      else if (e.key === '.') push('.');
      else if (e.key === '-') push('-');
      else if (e.key === 'Backspace') {
        clearTimeout(timer); seq = seq.slice(0, -1);
        if (seq) timer = setTimeout(commit, 1400);
        render();
      }
    });
    document.addEventListener('keyup', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressEnd(); }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      clearTimeout(timer); seq = ''; outputText = ''; outEl.textContent = ''; render();
    });

    render();
  })();
  </script>
</body>
</html>
