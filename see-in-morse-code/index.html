<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See in Morse Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #press-banner {
      width: 100%;
      height: 120px;
      background: #141e14;
      border-bottom: 2px solid #2a4a2a;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 16px;
      transition: background 0.05s;
      outline: none;
    }

    #press-banner.down { background: #1e3020; }

    #banner-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    #banner-title {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: #3a6a3a;
      text-transform: uppercase;
    }

    #seq-display {
      font-size: 1.6rem;
      letter-spacing: 0.5em;
      color: #c8a400;
      min-height: 2rem;
      white-space: nowrap;
    }

    #banner-hint {
      font-size: 0.68rem;
      color: #2e4e2e;
      letter-spacing: 0.05em;
    }

    #char-display {
      font-size: 5.5rem;
      font-weight: bold;
      color: #ffd700;
      line-height: 1;
      min-width: 80px;
      text-align: right;
      flex-shrink: 0;
    }

    #output-banner {
      width: 100%;
      height: 64px;
      background: #161616;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 20px 0 28px;
      gap: 16px;
    }

    #output {
      flex: 1;
      font-size: 2rem;
      letter-spacing: 0.25em;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #clear-btn {
      flex-shrink: 0;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid #4a2a2a;
      color: #664444;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    #clear-btn:hover { border-color: #8a4a4a; color: #cc8888; }

    #tree-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px 4px 16px;
    }

    #morse-tree {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div id="press-banner" tabindex="0">
    <div id="banner-left">
      <div id="banner-title">Morse Code Trainer — tap · hold –</div>
      <div id="seq-display"></div>
      <div id="banner-hint">keyboard: . – &nbsp;│&nbsp; space/enter to hold &nbsp;│&nbsp; backspace to undo</div>
    </div>
    <div id="char-display"></div>
  </div>

  <div id="output-banner">
    <div id="output"></div>
    <button id="clear-btn">CLEAR</button>
  </div>

  <div id="tree-wrap">
    <svg id="morse-tree" viewBox="0 0 420 440" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <script>
  (() => {
    const MORSE = {
      '-':'T',    '.':'E',
      '--':'M',   '-.':'N',   '.-':'A',   '..':'I',
      '---':'O',  '--.':'G',  '-.-':'K',  '-..':'D',
      '.--':'W',  '.-.':'R',  '..-':'U',  '...':'S',
      '--.-':'Q', '--..':'Z', '-.--':'Y', '-.-.':'C',
      '-..-':'X', '-...':'B', '.---':'J', '.--.':'P',
      '.-..':'L', '..-.':'F', '...-':'V', '....':'H',
    };

    // Build tree
    const nodeMap = new Map();
    function getNode(seq) {
      if (!nodeMap.has(seq)) nodeMap.set(seq, { seq, char: MORSE[seq] || null, dash: null, dot: null, x: 0, y: 0 });
      return nodeMap.get(seq);
    }
    const prefixSet = new Set(['']);
    for (const s of Object.keys(MORSE)) for (let i = 1; i <= s.length; i++) prefixSet.add(s.slice(0, i));
    for (const s of prefixSet) {
      if (!s) continue;
      const n = getNode(s), p = getNode(s.slice(0, -1));
      if (s.endsWith('-')) p.dash = n; else p.dot = n;
    }
    const root = getNode('');

    // Layout: left = dash, right = dot
    const ROOT_X = 210, ROOT_Y = 48, LEVEL_H = 88, SP0 = 95;
    function layout(n, x, y, sp) {
      if (!n) return;
      n.x = x; n.y = y;
      layout(n.dash, x - sp, y + LEVEL_H, sp / 2);
      layout(n.dot,  x + sp, y + LEVEL_H, sp / 2);
    }
    layout(root, ROOT_X, ROOT_Y, SP0);

    // SVG helpers
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('morse-tree');
    function mk(tag, attrs) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }
    function txt(parent, x, y, str, attrs = {}) {
      const t = mk('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', ...attrs });
      t.textContent = str; parent.appendChild(t); return t;
    }

    const edgeG = mk('g', {}), nodeG = mk('g', {});
    svg.append(edgeG, nodeG);

    // Header
    txt(svg, ROOT_X - 56, 14, 'MORSE', { fill:'#666', 'font-size':'11', 'font-family':'Courier New', 'letter-spacing':'3', 'font-weight':'bold' });
    txt(svg, ROOT_X + 56, 14, 'CODE',  { fill:'#666', 'font-size':'11', 'font-family':'Courier New', 'letter-spacing':'3', 'font-weight':'bold' });

    // Antenna at root
    const ax = ROOT_X, ay = ROOT_Y - 18;
    svg.appendChild(mk('line', { x1:ax,    y1:ay+14, x2:ax,   y2:ay,    stroke:'#c8a400', 'stroke-width':'1.5' }));
    svg.appendChild(mk('line', { x1:ax-9,  y1:ay+5,  x2:ax,   y2:ay,    stroke:'#c8a400', 'stroke-width':'1.2' }));
    svg.appendChild(mk('line', { x1:ax+9,  y1:ay+5,  x2:ax,   y2:ay,    stroke:'#c8a400', 'stroke-width':'1.2' }));
    svg.appendChild(mk('line', { x1:ax-14, y1:ay+2,  x2:ax,   y2:ay-6,  stroke:'#c8a400', 'stroke-width':'1' }));
    svg.appendChild(mk('line', { x1:ax+14, y1:ay+2,  x2:ax,   y2:ay-6,  stroke:'#c8a400', 'stroke-width':'1' }));

    // Dash/dot hint labels on the first branches
    txt(svg, ROOT_X - 52, ROOT_Y + 22, '–', { fill:'#3a3a3a', 'font-size':'10', 'font-family':'Courier New' });
    txt(svg, ROOT_X + 52, ROOT_Y + 22, '·', { fill:'#3a3a3a', 'font-size':'10', 'font-family':'Courier New' });

    const edgeMap = new Map(), shapeMap = new Map();

    // Node dimensions
    const RECT_W = 20, RECT_H = 11, CIRC_R = 8, ROOT_R = 9;

    function drawShape(s, n, fill, stroke) {
      const isRoot = s === '';
      const isDash = s.endsWith('-');
      let shape;
      if (isRoot) {
        shape = mk('circle', { cx: n.x, cy: n.y, r: ROOT_R, fill, stroke, 'stroke-width': '2' });
      } else if (isDash) {
        shape = mk('rect', {
          x: n.x - RECT_W / 2, y: n.y - RECT_H / 2,
          width: RECT_W, height: RECT_H, rx: 2,
          fill, stroke, 'stroke-width': '1.5'
        });
      } else {
        shape = mk('circle', { cx: n.x, cy: n.y, r: CIRC_R, fill, stroke, 'stroke-width': '1.5' });
      }
      nodeG.appendChild(shape);
      return shape;
    }

    function nodeFill(s)   { const n = nodeMap.get(s); return s==='' ? '#252015' : n.char ? '#142014' : '#161616'; }
    function nodeStroke(s) { const n = nodeMap.get(s); return s==='' ? '#c8a400' : n.char ? '#2d5c2d' : '#222'; }

    for (const [s, n] of nodeMap) {
      const d = s.length;
      if (d > 0) {
        const p = nodeMap.get(s.slice(0, -1));
        const ln = mk('line', { x1:p.x, y1:p.y, x2:n.x, y2:n.y, stroke:'#2a2a2a', 'stroke-width':'1.5' });
        edgeG.appendChild(ln);
        edgeMap.set(s, ln);
      }
      const shape = drawShape(s, n, nodeFill(s), nodeStroke(s));
      shapeMap.set(s, shape);

      if (n.char) {
        txt(nodeG, n.x, n.y, n.char, {
          fill: '#a8d8a8',
          'font-size': d <= 2 ? '8' : '7',
          'font-family': 'Courier New',
          'font-weight': 'bold',
          'pointer-events': 'none'
        });
      }
    }

    // State
    let seq = '', t0 = 0, pressed = false, timer = null, outputText = '';
    const seqEl  = document.getElementById('seq-display');
    const charEl = document.getElementById('char-display');
    const outEl  = document.getElementById('output');
    const banner = document.getElementById('press-banner');

    function pressStart() {
      if (pressed) return;
      pressed = true; t0 = Date.now(); banner.classList.add('down');
    }
    function pressEnd() {
      if (!pressed) return;
      pressed = false; banner.classList.remove('down');
      push(Date.now() - t0 < 250 ? '.' : '-');
    }
    function push(sym) {
      clearTimeout(timer);
      seq += sym; render();
      timer = setTimeout(commit, 1400);
    }
    function commit() {
      if (!seq) return;
      const ch = MORSE[seq];
      if (ch) { outputText += ch; outEl.textContent = outputText; }
      seq = ''; render();
    }

    function setShape(s, fill, stroke) {
      const shape = shapeMap.get(s);
      if (!shape) return;
      shape.setAttribute('fill', fill);
      shape.setAttribute('stroke', stroke);
    }

    function render() {
      seqEl.textContent = seq.split('').map(s => s === '.' ? '·' : '–').join(' ');
      charEl.textContent = MORSE[seq] || '';

      for (const [s, ln] of edgeMap) { ln.setAttribute('stroke', '#2a2a2a'); ln.setAttribute('stroke-width', '1.5'); }
      for (const [s] of shapeMap)    setShape(s, nodeFill(s), nodeStroke(s));

      for (let i = 0; i <= seq.length; i++) {
        const ps = seq.slice(0, i);
        setShape(ps, i === seq.length ? '#c8a400' : '#2c2810', i === seq.length ? '#ffd700' : '#776800');
        if (i > 0) {
          const ln = edgeMap.get(ps);
          if (ln) { ln.setAttribute('stroke', '#c8a400'); ln.setAttribute('stroke-width', '2.5'); }
        }
      }
    }

    banner.addEventListener('mousedown',  pressStart);
    banner.addEventListener('mouseup',    pressEnd);
    banner.addEventListener('mouseleave', () => { if (pressed) pressEnd(); });
    banner.addEventListener('touchstart', e => { e.preventDefault(); pressStart(); }, { passive: false });
    banner.addEventListener('touchend',   e => { e.preventDefault(); pressEnd();   }, { passive: false });
    banner.addEventListener('touchcancel',e => { e.preventDefault(); if (pressed) pressEnd(); }, { passive: false });

    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressStart(); }
      else if (e.key === '.') push('.');
      else if (e.key === '-') push('-');
      else if (e.key === 'Backspace') {
        clearTimeout(timer); seq = seq.slice(0, -1);
        if (seq) timer = setTimeout(commit, 1400);
        render();
      }
    });
    document.addEventListener('keyup', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressEnd(); }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      clearTimeout(timer); seq = ''; outputText = ''; outEl.textContent = ''; render();
    });

    render();
  })();
  </script>
</body>
</html>
