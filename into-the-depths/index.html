<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Into the Depths — A Never Ending Algebra Game</title>
  <meta name="description" content="Peel layers of operations from the outside in to isolate the unknown. Each correct inverse brings you closer. One wrong move ends it all." />
  <meta name="keywords" content="algebra game, math game, inverse operations, solving equations, order of operations, educational math, algebra practice" />
  <meta name="author" content="Into the Depths" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Into the Depths — A Never Ending Algebra Game" />
  <meta property="og:description" content="Peel layers of operations from the outside in to isolate the unknown. Each correct inverse brings you closer. One wrong move ends it all." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Into the Depths — A Never Ending Algebra Game" />
  <meta name="twitter:description" content="Peel layers of operations from the outside in to isolate the unknown. Each correct inverse brings you closer. One wrong move ends it all." />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left">
      <h1>Into the Depths</h1>
      <p class="slogan">a never ending battle to solve for <span id="current-var">🎁</span></p>
    </div>
    <div class="nav-right">
      <div class="score-row">Score: <span id="score">0</span> &ensp; Best: <span id="best">0</span></div>
    </div>
  </nav>

  <div id="app">
    <div class="game-area">
      <div id="equation"></div>
      <div id="next-equation"></div>
      <div id="calc-display" class="calc-display">—</div>
      <div id="calc-keys" class="calc-keys">

        <button class="calc-btn fn-key" data-type="fn" data-value="√">√</button>
        <button class="calc-btn fn-key" data-type="fn" data-value="∛">∛</button>
        <button class="calc-btn fn-key" data-type="fn" data-value="^2">x²</button>
        <button class="calc-btn fn-key" data-type="fn" data-value="^3">x³</button>

        <button class="calc-btn fn-key" data-type="fn" data-value="^(2/3)">x<sup>2/3</sup></button>
        <button class="calc-btn fn-key" data-type="fn" data-value="^(3/2)">x<sup>3/2</sup></button>
        <button class="calc-btn fn-key" data-type="fn" data-value="negate">−x</button>
        <button class="calc-btn fn-key" data-type="fn" data-value="1/x">1/x</button>

        <button class="calc-btn op-key" data-type="op" data-value="+">+</button>
        <button class="calc-btn op-key" data-type="op" data-value="−">−</button>
        <button class="calc-btn op-key" data-type="op" data-value="×">×</button>
        <button class="calc-btn op-key" data-type="op" data-value="÷">÷</button>

        <button class="calc-btn" data-type="num" data-value="7">7</button>
        <button class="calc-btn" data-type="num" data-value="8">8</button>
        <button class="calc-btn" data-type="num" data-value="9">9</button>
        <button class="calc-btn back-key" id="calc-back">⌫</button>

        <button class="calc-btn" data-type="num" data-value="4">4</button>
        <button class="calc-btn" data-type="num" data-value="5">5</button>
        <button class="calc-btn" data-type="num" data-value="6">6</button>
        <button class="calc-btn" data-type="frac" data-value="/">/</button>

        <button class="calc-btn" data-type="num" data-value="1">1</button>
        <button class="calc-btn" data-type="num" data-value="2">2</button>
        <button class="calc-btn" data-type="num" data-value="3">3</button>
        <div class="calc-spacer"></div>

        <button class="calc-btn zero-key" data-type="num" data-value="0">0</button>
        <button class="calc-btn enter-key" id="calc-enter">↵</button>

      </div>

      <div id="feedback" class="feedback"></div>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bar-group">
      <label for="var-select">solve for</label>
      <select id="var-select">
        <option value="🎁">🎁</option>
        <option value="x">x</option>
        <option value="?">?</option>
      </select>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-group">
      <label for="diff-select">difficulty</label>
      <select id="diff-select">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
