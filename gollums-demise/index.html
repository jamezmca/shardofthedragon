<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="A scientifically accurate account of Gollum's death in Mount Doom — told as a 2D canvas game. Run him off the bridge and watch physics do the rest.">
<title>Gollum's Demise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; }
canvas { display:block; max-width:100vw; max-height:100vh; image-rendering:pixelated; image-rendering:crisp-edges; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

const BANNER_H    = 44;   // top status bar
const BRIDGE_Y    = 330;
const BRIDGE_L    = 68;
const BRIDGE_R    = 415;
const BRIDGE_TH   = 14;
const LAVA_Y      = 510;
const GH          = 60;   // gollum sprite height (20 rows × 3px)

const PHASES = {
  1: {
    title: 'Phase I — The Approach',
    items: [
      'Temperature: ~600°C — Gollum enters the toxic gas column',
      'Sulphur dioxide & hydrogen fluoride sear his airways with every breath',
      'Radiant heat alone causes third-degree burns before any contact',
      'Hair ignites. Corneas desiccate.',
    ]
  },
  2: {
    title: 'Phase II — Impact',
    items: [
      'Basaltic lava: ~1,100°C, density ~2.7 g/cm³ — three times denser than water',
      'Surface moisture flash-vaporises in milliseconds — a violent steam detonation',
      'Skin blackens and burns through in under a second. Every nerve fires at once.',
      'His brain cannot process it fast enough. Then it stops.',
    ]
  },
  3: {
    title: 'Phase III — Dissolution',
    items: [
      'The lava is viscous. Engulfment is slow.',
      'Organic compounds oxidise and vaporise into the air.',
      'Body fat liquefies and catches fire.',
      'Bone — calcium phosphate — dissolves into the silicate melt.',
      'At 1,100°C this takes hours.',
      'The Ring is destroyed. The lava consumes everything.',
    ]
  }
};

const STATUS_TEXT = {
  RUNNING:  'Run, precious... run to the edge...',
  FALLING1: 'Falling into the void — time slows...',
  PAUSE1:   'In the toxic gases above the lava',
  FALLING2: 'Still falling — the surface approaches',
  PAUSE2:   'Impact.',
  SINKING:  'Dissolution...',
};

let state, gollum, lavaTime, lavaSpits, lavaBubbles;
let phase3Scroll, sinkY, phase3Done, timeScale;
const keys = {};

function init() {
  state        = 'RUNNING';
  timeScale    = 1.0;
  phase3Scroll = 0;
  sinkY        = 0;
  phase3Done   = false;
  lavaTime     = 0;
  lavaSpits    = [];
  lavaBubbles  = Array.from({length:14}, () => ({
    x: 90 + Math.random()*(W-180),
    phase: Math.random()*Math.PI*2,
    r: 4 + Math.random()*10,
    speed: 0.018 + Math.random()*0.028
  }));
  gollum = { x:175, y:BRIDGE_Y-GH, vx:0, vy:0, facing:1 };
  keys['left_touch'] = false;
  keys['right_touch'] = false;
}

// ── Background ────────────────────────────────────────────────────────────────
// Volcano funnel: narrow at top (crater), wide at bottom (chamber).
// All three wall layers use this shape so the open space widens going up.

function drawBg() {
  // Atmosphere gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,    '#e8c060');
  g.addColorStop(0.12, '#c04010');
  g.addColorStop(0.5,  '#6a1600');
  g.addColorStop(0.85, '#350000');
  g.addColorStop(1,    '#aa1800');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Far back wall — widest at bottom (lightest tone = furthest away)
  ctx.fillStyle = '#7a4030';
  for (const [ox, dir] of [[0,1],[W,-1]]) {
    ctx.beginPath();
    ctx.moveTo(ox,0); ctx.lineTo(ox+dir*80,0);   // narrow at top
    ctx.lineTo(ox+dir*180,H); ctx.lineTo(ox,H);  // wide at bottom
    ctx.closePath(); ctx.fill();
  }

  // Mid wall — medium tone, same funnel direction
  ctx.fillStyle = '#552818';
  for (const [ox, dir] of [[0,1],[W,-1]]) {
    ctx.beginPath();
    ctx.moveTo(ox,0); ctx.lineTo(ox+dir*52,0);
    ctx.lineTo(ox+dir*118,H); ctx.lineTo(ox,H);
    ctx.closePath(); ctx.fill();
  }

  // Foreground rock — darkest, jagged edge, funnel shape
  ctx.fillStyle = '#220d04';
  const STEPS = 10;
  for (const [ox, dir] of [[0,1],[W,-1]]) {
    ctx.beginPath();
    ctx.moveTo(ox,0);
    ctx.lineTo(ox+dir*32,0);  // narrow top
    for (let i=0; i<=STEPS; i++) {
      const t = i/STEPS;
      const base = 32 + t*58; // 32→90 going top to bottom
      const jag  = Math.sin(i*2.1)*6 + Math.cos(i*1.6+1)*4;
      ctx.lineTo(ox+dir*(base+jag), t*H);
    }
    ctx.lineTo(ox+dir*90,H); ctx.lineTo(ox,H);
    ctx.closePath(); ctx.fill();
  }

  // Warm light beam from crater
  const beam = ctx.createRadialGradient(W/2,0,12,W/2,0,400);
  beam.addColorStop(0,   'rgba(255,220,100,0.22)');
  beam.addColorStop(0.5, 'rgba(255,160,40,0.08)');
  beam.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = beam; ctx.fillRect(0,0,W,H*0.75);
}

// ── Bridge ────────────────────────────────────────────────────────────────────

function drawBridge() {
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(BRIDGE_L, BRIDGE_Y+BRIDGE_TH, BRIDGE_R-BRIDGE_L, 7);

  // Slab — pixel-flat (no gradient, just two tones)
  ctx.fillStyle='#5a4030';
  ctx.fillRect(BRIDGE_L, BRIDGE_Y, BRIDGE_R-BRIDGE_L, BRIDGE_TH);
  ctx.fillStyle='#3a2018';
  ctx.fillRect(BRIDGE_L, BRIDGE_Y+BRIDGE_TH-3, BRIDGE_R-BRIDGE_L, 3);

  // Pixel crack lines
  ctx.fillStyle='rgba(0,0,0,0.45)';
  for (let x=BRIDGE_L+28; x<BRIDGE_R; x+=28) {
    ctx.fillRect(x, BRIDGE_Y, 1, BRIDGE_TH);
  }

  // Jagged broken end
  ctx.fillStyle='#3e2010';
  ctx.beginPath();
  ctx.moveTo(BRIDGE_R,BRIDGE_Y);
  ctx.lineTo(BRIDGE_R+20,BRIDGE_Y+3);
  ctx.lineTo(BRIDGE_R+9, BRIDGE_Y+8);
  ctx.lineTo(BRIDGE_R+24,BRIDGE_Y+BRIDGE_TH);
  ctx.lineTo(BRIDGE_R,   BRIDGE_Y+BRIDGE_TH);
  ctx.closePath(); ctx.fill();

  // Left wall anchor block
  ctx.fillStyle='#4a3020';
  ctx.fillRect(BRIDGE_L-30, BRIDGE_Y-8, 36, BRIDGE_TH+16);
  ctx.fillStyle='#5a4030';
  ctx.fillRect(BRIDGE_L-30, BRIDGE_Y-8, 36, 3);
}

// ── Lava ──────────────────────────────────────────────────────────────────────

function drawLava() {
  lavaTime += 0.018 * timeScale;

  const lg = ctx.createLinearGradient(0,LAVA_Y,0,H);
  lg.addColorStop(0,  '#ff5500'); lg.addColorStop(0.4,'#dd2200'); lg.addColorStop(1,'#880000');
  ctx.fillStyle = lg;
  ctx.beginPath(); ctx.moveTo(0,LAVA_Y);
  for (let x=0; x<=W; x+=8)
    ctx.lineTo(x, LAVA_Y + Math.sin(x*0.025+lavaTime)*6 + Math.sin(x*0.06-lavaTime*1.4)*3);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  // Hot glow patches
  for (let i=0; i<4; i++) {
    const hx = W*0.08 + W*0.84*((i*0.26+lavaTime*0.035)%1);
    const rg = ctx.createRadialGradient(hx,LAVA_Y+18,0,hx,LAVA_Y+18,60);
    rg.addColorStop(0,'rgba(255,210,0,0.42)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(hx-60,LAVA_Y,120,65);
  }

  // Bubbles
  lavaBubbles.forEach(b => {
    b.phase += b.speed * timeScale;
    const by = LAVA_Y+14+Math.abs(Math.sin(b.phase))*32;
    const rg = ctx.createRadialGradient(b.x,by,0,b.x,by,b.r);
    rg.addColorStop(0,'rgba(255,190,0,0.65)'); rg.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(b.x,by,b.r*1.5,0,Math.PI*2); ctx.fill();
  });

  // Spits
  if (Math.random()<0.03*timeScale)
    lavaSpits.push({x:100+Math.random()*(W-200),y:LAVA_Y,
      vx:(Math.random()-0.5)*4.5,vy:-(3+Math.random()*6.5),r:2+Math.random()*4,life:1});
  lavaSpits = lavaSpits.filter(s=>s.life>0);
  lavaSpits.forEach(s=>{
    s.x+=s.vx*timeScale; s.y+=s.vy*timeScale; s.vy+=0.18*timeScale; s.life-=0.022;
    ctx.globalAlpha=s.life*0.9;
    ctx.fillStyle=s.vy>0?'#cc3300':'#ff8800';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
}

// ── Gollum pixel art sprite ───────────────────────────────────────────────────
// 15 cols × 20 rows @ 3px per cell = 45×60px on screen.
// Sprite defined facing right; mirrored horizontally for facing left.
// Ring held aloft by raised right arm (cols 9-13, rows 0-5).

const GOLLUM_SPRITE = [
  '..........rrr..',  //  0  ring top
  '.........r...r.',  //  1  ring sides
  '.........r...r.',  //  2  ring sides
  '..........rrr..',  //  3  ring bottom
  '..........l....',  //  4  arm up
  '.........l.....',  //  5  arm up
  '....ssssl......',  //  6  head start + arm join at shoulder
  '...ssssss......',  //  7  head
  '...seesee......',  //  8  eyes
  '...sepsp.......',  //  9  pupils (inward-facing stare)
  '...ssssss......',  // 10  lower face
  '....ssss.......',  // 11  chin
  '..l.cccc.......',  // 12  body + left arm start
  '.l..cccc.......',  // 13  left arm
  'l...cccc.......',  // 14  left arm extended
  '....cccc.......',  // 15  lower body
  '....l..l.......',  // 16  legs
  '....l..l.......',  // 17  legs
  '....l..l.......',  // 18  legs
  '...ll..ll......',  // 19  feet
];

const GOLLUM_COLORS = {
  's': '#bec0a0',  // pale grey-green skin
  'e': '#99bbff',  // big pale eyes
  'p': '#111130',  // dark pupils
  'c': '#5a3820',  // dark loincloth
  'l': '#a8a888',  // limbs
  'r': '#d4a000',  // gold ring
};

function drawGollum(x, y) {
  const P  = 3;
  const SW = 15 * P; // 45px
  ctx.save();
  ctx.translate(x + 22, y);  // center sprite on x
  if (gollum.facing < 0) ctx.scale(-1, 1);

  const ox = -22; // left edge offset for centering

  // Ring glow behind sprite pixels
  const rgx = ox + 11*P, rgy = 2*P;
  const rg = ctx.createRadialGradient(rgx, rgy, P, rgx, rgy, P*5);
  rg.addColorStop(0, 'rgba(255,220,40,0.65)');
  rg.addColorStop(1, 'rgba(255,130,0,0)');
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(rgx, rgy, P*5, 0, Math.PI*2); ctx.fill();

  // Draw sprite row by row
  GOLLUM_SPRITE.forEach((row, ry) => {
    for (let cx = 0; cx < row.length; cx++) {
      const ch = row[cx];
      if (ch === '.') continue;
      ctx.fillStyle = GOLLUM_COLORS[ch] || '#ff00ff';
      ctx.fillRect(ox + cx*P, ry*P, P, P);
    }
  });

  ctx.restore();
}

// ── Pixel / Terraria-style UI ─────────────────────────────────────────────────

// Bevel-bordered pixel button — matches Terraria's inventory style
function pixelBtn(x, y, w, h, pressed) {
  // fill
  ctx.fillStyle = pressed ? '#1c0d05' : '#2c1a0a';
  ctx.fillRect(x,y,w,h);
  // top + left highlight
  ctx.fillStyle = pressed ? '#3e2210' : '#7c4a20';
  ctx.fillRect(x,   y,   w, 3);
  ctx.fillRect(x,   y,   3, h);
  // bottom + right shadow
  ctx.fillStyle = pressed ? '#7c4a20' : '#080302';
  ctx.fillRect(x,   y+h-3, w, 3);
  ctx.fillRect(x+w-3, y,   3, h);
  // inner 1px accent on top/left
  ctx.fillStyle = pressed ? '#2a1208' : '#5a3418';
  ctx.fillRect(x+3, y+3, w-6, 1);
  ctx.fillRect(x+3, y+3, 1, h-6);
}

function drawControls() {
  const bx=W-142, by=H-72, bw=56, bh=48, gap=8;
  for (const [i, symbol, tKey, kCode] of [
    [0,'<','left_touch','ArrowLeft'],
    [1,'>','right_touch','ArrowRight']
  ]) {
    const x=bx+i*(bw+gap);
    const pressed=!!(keys[tKey]||keys[kCode]);
    pixelBtn(x, by, bw, bh, pressed);
    ctx.fillStyle = pressed ? '#664422' : '#ffcc88';
    ctx.font = '11px "Press Start 2P", monospace';
    ctx.textAlign='center';
    ctx.fillText(symbol, x+bw/2, by+bh/2+4);
  }
  window._lBtn={x:bx,        y:by,w:bw,h:bh};
  window._rBtn={x:bx+bw+gap, y:by,w:bw,h:bh};
}

function drawPixelSpaceKey(cy, label='SPACE TO CONTINUE') {
  const sw=220, sh=38, sx=(W-sw)/2;
  pixelBtn(sx, cy-sh/2, sw, sh, false);
  ctx.fillStyle='#ffcc88';
  ctx.font='8px "Press Start 2P", monospace';
  ctx.textAlign='center';
  ctx.fillText(label, W/2, cy+3);
}

// ── Title (Cinzel / LOTR font) ────────────────────────────────────────────────

function drawTitleText() {
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 50px Cinzel, serif';
  ctx.fillStyle='rgba(255,200,75,0.95)';
  ctx.shadowColor='#ff5500'; ctx.shadowBlur=30;
  ctx.fillText("Gollum's Demise", W/2, 205);
  ctx.font='15px Cinzel, serif';
  ctx.fillStyle='rgba(255,185,90,0.62)';
  ctx.shadowBlur=8;
  ctx.fillText('Use  ←  →  to move  ·  Walk off the bridge', W/2, 244);
  ctx.restore();
}

// ── Full-width pause banner ───────────────────────────────────────────────────

function drawBanner(phase) {
  const {title, items} = PHASES[phase];
  const bannerH = 50 + items.length*44 + 56; // dynamic height
  const by = H - bannerH;

  // Full-width panel
  ctx.fillStyle='rgba(8,3,0,0.96)';
  ctx.fillRect(0, by, W, bannerH);

  // Pixel-style top border (3 rows: dark, bright, medium)
  ctx.fillStyle='#661500'; ctx.fillRect(0,by,W,2);
  ctx.fillStyle='#ff6600'; ctx.fillRect(0,by+2,W,2);
  ctx.fillStyle='#993300'; ctx.fillRect(0,by+4,W,1);

  // Title (Cinzel)
  ctx.textAlign='center';
  ctx.font='bold 19px Cinzel, serif';
  ctx.fillStyle='#ff9944';
  ctx.shadowColor='#ff3300'; ctx.shadowBlur=10;
  ctx.fillText(title, W/2, by+34);
  ctx.shadowBlur=0;

  // Bullet items
  ctx.font='13px Cinzel, serif';
  ctx.fillStyle='#ffddb0';
  ctx.textAlign='left';
  items.forEach((item,i) => {
    ctx.fillText('▸  '+item, 52, by+55+i*44);
  });

  // Space key prompt
  drawPixelSpaceKey(by + bannerH - 26);
}

// ── Phase 3 sinking / credits ─────────────────────────────────────────────────

function drawSinking() {
  const {title, items} = PHASES[3];
  phase3Scroll += 0.38;
  sinkY = Math.min(sinkY+0.22, 54);

  // Gollum drawn first so lava can cover lower body
  drawGollum(gollum.x, LAVA_Y-GH+sinkY);
  drawLava();

  // Semi-transparent overlay (credits over lava)
  const alpha = Math.min(1, phase3Scroll/50);
  ctx.save();
  ctx.globalAlpha = alpha * 0.82;
  ctx.fillStyle='#050100';
  ctx.fillRect(0, BANNER_H, W, H-BANNER_H-80);
  // Top border
  ctx.globalAlpha = alpha;
  ctx.fillStyle='#661500'; ctx.fillRect(0,BANNER_H,  W,2);
  ctx.fillStyle='#ff6600'; ctx.fillRect(0,BANNER_H+2,W,2);

  // Title
  ctx.textAlign='center';
  ctx.font='bold 19px Cinzel, serif';
  ctx.fillStyle='#ff9944';
  ctx.shadowColor='#ff3300'; ctx.shadowBlur=10;
  ctx.fillText(title, W/2, BANNER_H+32);
  ctx.shadowBlur=0;

  // Bullet items — fade in sequentially
  ctx.font='13px Cinzel, serif';
  ctx.fillStyle='#ffd8a0';
  ctx.textAlign='left';
  items.forEach((item,i) => {
    const la = Math.min(1, Math.max(0,(phase3Scroll-i*28)/22));
    ctx.globalAlpha = alpha*la;
    ctx.fillText('▸  '+item, 52, BANNER_H+60+i*34);
  });
  ctx.restore();

  const allDone = phase3Scroll >= items.length*28+60;
  if (allDone) drawPixelSpaceKey(H-46, 'SPACE TO RESTART');
  return allDone;
}

// ── Top status banner ─────────────────────────────────────────────────────────

function drawStatusBanner() {
  const isPaused = state==='PAUSE1'||state==='PAUSE2'||state==='SINKING';
  const isSlow   = state==='FALLING1'||state==='FALLING2';

  // Background
  ctx.fillStyle='rgba(5,2,0,0.92)'; ctx.fillRect(0,0,W,BANNER_H);
  // Bottom pixel border
  ctx.fillStyle='#551100'; ctx.fillRect(0,BANNER_H-3,W,2);
  ctx.fillStyle='#331100'; ctx.fillRect(0,BANNER_H-1,W,1);

  // Left icon: pause bars or slow-mo arrow
  if (isPaused || isSlow) {
    const ix=14, iy=12, ih=20;
    if (isPaused) {
      // Classic ⏸ — two vertical rectangles
      ctx.fillStyle='#ffcc88';
      ctx.fillRect(ix,   iy, 6, ih);
      ctx.fillRect(ix+10,iy, 6, ih);
    } else {
      // Slow-mo: filled right-arrow
      ctx.fillStyle='#88ccff';
      ctx.beginPath();
      ctx.moveTo(ix,iy); ctx.lineTo(ix+14,iy+ih/2); ctx.lineTo(ix,iy+ih);
      ctx.closePath(); ctx.fill();
      // "x.25" label next to it
      ctx.font='6px "Press Start 2P", monospace';
      ctx.fillStyle='#88ccff'; ctx.textAlign='left';
      ctx.fillText('x.25',ix+18,iy+13);
    }
  }

  // Status text (Cinzel)
  ctx.font='12px Cinzel, serif';
  ctx.fillStyle='rgba(255,190,90,0.88)';
  ctx.textAlign='center';
  ctx.fillText(STATUS_TEXT[state]||'', W/2, BANNER_H/2+5);
}

// ── Update ────────────────────────────────────────────────────────────────────

function update() {
  if (state==='RUNNING') {
    const left  = keys['ArrowLeft'] ||keys['left_touch'];
    const right = keys['ArrowRight']||keys['right_touch'];
    if (left)       { gollum.vx=-3.2; gollum.facing=-1; }
    else if (right) { gollum.vx= 3.2; gollum.facing= 1; }
    else              gollum.vx *= 0.62;
    gollum.x = Math.max(BRIDGE_L, gollum.x+gollum.vx);
    gollum.y = BRIDGE_Y-GH;
    if (gollum.x+44 > BRIDGE_R) {
      state='FALLING1'; timeScale=0.25; gollum.vy=0.8;
    }
  }

  if (state==='FALLING1'||state==='FALLING2') {
    gollum.vy += 0.3  *timeScale;
    gollum.x  += gollum.vx*0.88*timeScale;
    gollum.y  += gollum.vy*timeScale;
    if (state==='FALLING1' && gollum.y+GH>=LAVA_Y-95) state='PAUSE1';
    if (state==='FALLING2' && gollum.y+GH>=LAVA_Y)  { state='PAUSE2'; gollum.y=LAVA_Y-GH; }
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────

function loop() {
  update();
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawBridge();

  if (state==='RUNNING') {
    drawTitleText();
    drawGollum(gollum.x, gollum.y);
    drawLava();
    drawControls();
  } else if (state==='FALLING1'||state==='FALLING2') {
    drawGollum(gollum.x, gollum.y);
    drawLava();
  } else if (state==='PAUSE1') {
    drawGollum(gollum.x, gollum.y);
    drawLava();
    drawBanner(1);
  } else if (state==='PAUSE2') {
    drawGollum(gollum.x, gollum.y);
    drawLava();
    drawBanner(2);
  } else if (state==='SINKING') {
    phase3Done = drawSinking();
  }

  drawStatusBanner();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  keys[e.code]=true;
  if (e.code==='Space') {
    e.preventDefault();
    if      (state==='PAUSE1')                  { state='FALLING2'; gollum.vy=2.2; timeScale=0.25; }
    else if (state==='PAUSE2')                  { state='SINKING';  timeScale=1.0; }
    else if (state==='SINKING' && phase3Done)   { init(); }
  }
});
document.addEventListener('keyup', e => { delete keys[e.code]; });

function hitBtn(mx,my,b) { return b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h; }

canvas.addEventListener('mousedown', e => {
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if (hitBtn(mx,my,window._lBtn)) keys['left_touch']=true;
  if (hitBtn(mx,my,window._rBtn)) keys['right_touch']=true;
});
canvas.addEventListener('mouseup', ()=>{ keys['left_touch']=keys['right_touch']=false; });

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  [...e.changedTouches].forEach(t=>{
    const r=canvas.getBoundingClientRect();
    const mx=(t.clientX-r.left)*(W/r.width), my=(t.clientY-r.top)*(H/r.height);
    if (hitBtn(mx,my,window._lBtn)) keys['left_touch']=true;
    if (hitBtn(mx,my,window._rBtn)) keys['right_touch']=true;
  });
},{passive:false});
canvas.addEventListener('touchend',()=>{ keys['left_touch']=keys['right_touch']=false; });

document.fonts.ready.then(()=>{ init(); loop(); });
</script>
</body>
