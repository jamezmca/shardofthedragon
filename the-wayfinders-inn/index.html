<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wayfinder's Inn</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080402;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wrap {
      transform-origin: center center;
      transition: transform 0.45s ease;
      will-change: transform;
    }

    #scene {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .btn {
      background: rgba(8, 4, 2, 0.88);
      color: #c89050;
      border: 1px solid #5a3010;
      padding: 5px 14px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.08em;
      user-select: none;
    }
    .btn:hover  { border-color: #c89050; }
    .btn:active { background: rgba(40, 20, 8, 0.95); }
  </style>
</head>
<body>

<div id="wrap">
  <canvas id="scene" width="380" height="120"></canvas>
</div>

<div id="controls">
  <button class="btn" id="btn-zoom">fit</button>
  <button class="btn" id="btn-audio">music: off</button>
</div>

<audio id="aud" src="soundtrack.mp3" loop></audio>

<script>
  const cv  = document.getElementById('scene');
  const ctx = cv.getContext('2d');
  const W = 380, H = 120;

  function p(c, x, y, w, h) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

  // ── STATIC SCENE ──────────────────────────────────────────────────────

  function drawRoom() {

    // ── CEILING ──────────────────────────────────────────────────────
    p('#120904', 0, 0, W, 16);
    // Ceiling plank grain
    [2, 5, 9, 13].forEach(y => p('#0e0702', 0, y, W, 1));
    // Cross-beams (vertical, heavy timber)
    [76, 188, 296].forEach(bx => {
      p('#2c1808', bx,    0, 14, 22);
      p('#3e2410', bx+1,  0,  3, 22); // highlight left face
      p('#1e1004', bx+11, 0,  3, 22); // shadow right face
    });

    // ── REAR WALL ────────────────────────────────────────────────────
    p('#221308', 0, 16, W, 74);
    // Subtle vertical plank lines on wall
    [46, 105, 162, 218, 265, 330, 372].forEach(wx => p('#1c1006', wx, 16, 1, 74));

    // ── FIREPLACE ────────────────────────────────────────────────────
    // Stone mass
    p('#3c2c1c', 8, 16, 84, 74);

    // Stone blocks with highlight/shadow to suggest 3D
    [
      // top row (full width)
      [8,16,18,9],[26,16,16,9],[42,16,20,9],[62,16,16,9],[78,16,14,9],
      // second row
      [8,25,14,9],[22,25,20,9],[42,25,16,9],[58,25,14,9],[72,25,20,9],
      // flanks only (firebox is x=28–64)
      [8,34,20,9],[66,34,26,9],
      [8,43,18,9],[66,43,26,9],
      [8,52,22,9],[64,52,28,9],
      [8,61,20,9],[66,61,26,9],
      [8,70,84,10], // hearth slab
    ].forEach(([x, y, w, h]) => {
      p('#4e3a26', x, y, w, h);       // stone face
      p('#5e4a32', x, y, w, 1);       // top highlight
      p('#3a2818', x, y+1, 1, h-1);   // left edge shadow
      p('#2e2010', x+w-1, y+1, 1, h-1); // right edge shadow
    });

    // Mortar lines
    for (let my = 16; my < 90; my += 9) p('#251a0c', 8, my, 84, 1);
    [18, 26, 38, 48, 58, 66, 74, 82].forEach(mx => p('#251a0c', mx, 16, 1, 74));

    // Mantle shelf
    p('#6a3e1a', 4,  13, 92, 5);
    p('#8a5224', 4,  13, 92, 2); // shine
    p('#3a2010', 4,  17, 92, 1); // shadow

    // Firebox opening: x=28–64, y=34–82
    p('#0c0806', 28, 34, 36, 50);
    p('#181008', 26, 33, 40,  2); // lintel
    p('#181008', 26, 33,  2, 50); // left jamb
    p('#181008', 64, 33,  2, 50); // right jamb

    // Ash at firebox base (will be partially covered by fire anim)
    p('#2a1a0a', 30, 78, 32, 4);
    p('#3e2812', 34, 79, 7, 2);
    p('#3e2812', 50, 79, 9, 2);

    // ── BAR ──────────────────────────────────────────────────────────
    // Back shelf
    p('#3a2010', 242, 16, 136, 5);
    p('#5a3416', 242, 16, 136, 2);

    // Kegs on back shelf
    [[252,15],[278,13],[306,15],[332,13],[356,15]].forEach(([kx, kh]) => {
      p('#5c3214', kx,    18, 16, kh);          // body
      p('#7a4420', kx+2,  18, 12,  2);          // top face
      p('#3a1e08', kx,    20,  2, kh-2);        // left hoop
      p('#3a1e08', kx+14, 20,  2, kh-2);        // right hoop
      p('#3a1e08', kx,    18 + Math.floor(kh/2), 16, 1); // mid hoop
    });

    // Bar counter top
    p('#6e3e18', 242, 56, 136,  8);
    p('#8c5222', 242, 56, 136,  2); // shine
    p('#3a2010', 242, 63, 136,  1); // shadow

    // Bar front face
    p('#4c2e10', 242, 64, 136, 26);
    [268, 296, 324, 352].forEach(bx => p('#3a2008', bx, 65, 2, 24)); // panels

    // Foot rail
    p('#3a2010', 246, 100, 128, 4);
    p('#5a3416', 246, 100, 128, 2);

    // Stools
    [[254,84],[282,84],[310,84],[338,84]].forEach(([sx, sy]) => {
      p('#4a2c10', sx,    sy,   16,  3); // seat top
      p('#6a3e18', sx+1,  sy,   14,  1); // seat shine
      p('#2e1a08', sx+6,  sy+3,  4, 22); // leg
      p('#221006', sx+4,  sy+23, 8,  2); // foot
    });

    // Tankard on bar
    p('#7a5828', 268, 51, 7, 6); // cup
    p('#8a6838', 268, 51, 7, 1); // rim
    p('#7a5828', 275, 53, 3, 3); // handle

    // ── WALL SCONCES (candle brackets) ───────────────────────────────
    [[110, 22],[170, 22],[228, 22]].forEach(([cx, cy]) => {
      p('#4a3020', cx-2, cy+5,  8, 3);  // bracket arm
      p('#d8d0a8', cx,   cy,    4, 8);  // candle body
      p('#b8b090', cx+1, cy,    2, 8);  // wax shadow
    });

    // ── HANGING LANTERN ──────────────────────────────────────────────
    p('#3a2010', 148,  4,  4,  5); // chain
    p('#5a3416', 144,  9, 12,  2); // cap
    p('#4a2c10', 144, 11, 12, 10); // body
    p('#3a2010', 143, 11,  2, 10); // left edge
    p('#3a2010', 155, 11,  2, 10); // right edge
    p('#3a2010', 144, 20, 12,  2); // base

    // ── TABLE ────────────────────────────────────────────────────────
    p('#543010', 138, 73, 60, 5);
    p('#7a4420', 138, 73, 60, 2); // shine
    p('#301808', 150, 78,  5,14); // left leg
    p('#301808', 184, 78,  5,14); // right leg

    // Mug on table
    p('#7a5828', 162, 67,  6, 7);
    p('#8a6838', 162, 67,  6, 1);
    p('#7a5828', 168, 69,  3, 3);
    p('#6a4818', 169, 70,  1, 2);

    // ── FLOOR ────────────────────────────────────────────────────────
    p('#160c04', 0, 90, W, 30);
    // Plank grain
    [93, 98, 104, 110, 116].forEach(fy => p('#1c1006', 0, fy, W, 1));
    // Plank splits
    [42, 100, 158, 214, 268, 322, 362].forEach(fx => p('#100802', fx, 90, 2, 30));

    // Hearth rug area (slightly warmer tone in front of fireplace)
    p('#1e1006', 6, 90, 88, 30);
  }

  // ── ANIMATED FIRE ─────────────────────────────────────────────────────

  function drawFire(t) {
    const FX = 30, FY = 36, FW = 32, FH = 40;

    p('#0c0806', FX, FY, FW, FH); // re-darken firebox

    for (let layer = 0; layer < 5; layer++) {
      const speed   = 2.0 + layer * 0.38;
      const stagger = layer * (FH / 5);

      for (let x = FX; x < FX + FW; x++) {
        const col      = x - FX;
        const progress = ((t * speed + stagger + col * 0.28) % FH);
        const baseY    = FY + (FH - 1) - Math.round(progress);
        const wobble   = Math.sin(col * 0.62 + t * 2.4 + layer * 1.4) * 2.4;
        const py       = Math.round(baseY + wobble);
        if (py < FY || py >= FY + FH) continue;

        const heat = progress / FH;
        let c;
        if      (heat > 0.70) c = `rgba(255,248,168,${Math.min(0.95,((heat-0.70)/0.30)*0.9+0.06).toFixed(2)})`;
        else if (heat > 0.42) c = `rgba(255,128,18,${(0.52+((heat-0.42)/0.28)*0.38).toFixed(2)})`;
        else if (heat > 0.18) c = `rgba(210,38,8,${(0.22+((heat-0.18)/0.24)*0.30).toFixed(2)})`;
        else                  c = `rgba(110,14,4,${(heat/0.18*0.20).toFixed(2)})`;

        ctx.fillStyle = c;
        ctx.fillRect(x, py, 1, 1);
      }
    }

    // Glowing ember bed at base
    for (let ex = FX; ex < FX + FW; ex++) {
      const g = 0.32 + 0.24 * Math.sin(ex * 0.85 + t * 3.8);
      p(`rgba(255,85,8,${g.toFixed(2)})`, ex, FY + FH - 3, 1, 3);
    }
  }

  // ── GLOW OVERLAYS ─────────────────────────────────────────────────────

  function drawGlow(t) {
    const pulse = 0.06 + 0.02 * Math.sin(t * 1.35);

    // Fireplace warmth: left wall, ceiling corner, hearth floor
    p(`rgba(255,85,16,${(pulse * 1.6).toFixed(3)})`,  6,  90, 88, 30);
    p(`rgba(255,75,12,${pulse.toFixed(3)})`,           0,  36, 14, 54);
    p(`rgba(200,65,10,${(pulse * 0.65).toFixed(3)})`,  0,   0,110, 16);

    // Lantern inner glow
    const lp = 0.65 + 0.35 * Math.sin(t * 2.4 + Math.sin(t * 5.3) * 0.4);
    p(`rgba(240,185,65,${(lp * 0.72).toFixed(2)})`, 145, 12,  8,  9);
    // Lantern ceiling halo
    p(`rgba(220,145,35,${(lp * 0.10).toFixed(2)})`, 118,  0, 58, 16);
    // Lantern floor cone
    p(`rgba(220,145,35,${(lp * 0.05).toFixed(2)})`, 128, 16, 40, 60);
  }

  function drawCandleFlicker(t) {
    [[110, 18],[170, 18],[228, 18]].forEach(([cx, cy], i) => {
      const f  = 0.58 + 0.42 * Math.sin(t * 4.6 + i * 2.8 + Math.sin(t * 8.5 + i) * 0.7);
      const fh = 3 + (Math.sin(t * 3.9 + i * 2.0) > 0 ? 1 : 0);

      // Glow halo on wall
      p(`rgba(255,175,40,${(f * 0.09).toFixed(2)})`, cx - 7, cy - 5, 18, 16);
      // Flame core
      p(`rgba(255,235,110,${f.toFixed(2)})`, cx + 1, cy - fh, 2, fh + 1);
      p(`rgba(255,115,22,${f.toFixed(2)})`,  cx + 1, cy - fh + 1, 2, fh);
    });
  }

  // ── RENDER LOOP ───────────────────────────────────────────────────────

  function frame() {
    const t = performance.now() / 1000;
    drawRoom();
    drawFire(t);
    drawGlow(t);
    drawCandleFlicker(t);
    requestAnimationFrame(frame);
  }

  // ── ZOOM ──────────────────────────────────────────────────────────────

  let zoomed = false;

  function applyScale() {
    const s = zoomed
      ? Math.max(window.innerWidth / W, window.innerHeight / H)
      : Math.min(window.innerWidth / W, window.innerHeight / H);
    document.getElementById('wrap').style.transform = `scale(${s})`;
  }

  document.getElementById('btn-zoom').addEventListener('click', () => {
    zoomed = !zoomed;
    document.getElementById('btn-zoom').textContent = zoomed ? 'cover' : 'fit';
    applyScale();
  });

  window.addEventListener('resize', applyScale);

  // ── AUDIO ─────────────────────────────────────────────────────────────

  const aud     = document.getElementById('aud');
  let   playing = false;

  document.getElementById('btn-audio').addEventListener('click', () => {
    playing = !playing;
    playing ? aud.play().catch(() => {}) : aud.pause();
    document.getElementById('btn-audio').textContent = playing ? 'music: on' : 'music: off';
  });

  // ── INIT ──────────────────────────────────────────────────────────────
  applyScale();
  frame();
</script>
</body>
</html>
