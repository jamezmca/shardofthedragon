<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go to the gym</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Times New Roman', Times, serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Collage background ── */
    #collage {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: calc(100vh / 4);
      grid-auto-flow: dense;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.9s ease;
      z-index: 0;
    }

    #collage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: saturate(0.8);
    }

    /* ── Dark overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
      opacity: 0;
      transition: opacity 0.9s ease;
      z-index: 1;
    }

    /* ── Main content (above overlay) ── */
    #content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Typing section ── */
    #typing-section {
      text-align: center;
      max-width: 960px;
      width: 100%;
    }

    .prompt {
      font-size: 0.85rem;
      color: #bbb;
      letter-spacing: 0.08em;
      margin-bottom: 1.6rem;
    }

    .phrase {
      font-size: min(4.4rem, 9vw);
      line-height: 1.25;
      user-select: none;
      cursor: default;
      color: #1a1a1a;
    }

    .letter {
      opacity: 0.12;
      transition: opacity 0.1s ease;
    }

    .letter.typed {
      opacity: 1;
    }

    /* ── Character section ── */
    #char-section {
      text-align: center;
      max-width: 640px;
      width: 100%;
      animation: fadein 0.45s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .char-quote {
      font-size: clamp(1.3rem, 3vw, 1.95rem);
      line-height: 1.5;
      font-style: italic;
      color: #fff;
      margin-bottom: 1.8rem;
    }

    .char-img-wrap {
      margin: 0 auto 1rem;
      width: 100%;
      max-width: min(340px, 80vw);
      aspect-ratio: 3 / 4;
      background: #1c1c1c;
      overflow: hidden;
    }

    .char-img-wrap.loading {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { background: #1c1c1c; }
      50%       { background: #2a2a2a; }
    }

    .char-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .char-img.loaded {
      opacity: 1;
    }

    .char-info {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
      margin-bottom: 2.4rem;
    }

    .go-text {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: bold;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .restart-hint {
      margin-top: 1.6rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.05em;
    }

    /* Hidden input to summon mobile keyboard */
    #kb {
      position: fixed;
      top: -200px;
      left: -200px;
      width: 1px;
      height: 1px;
      opacity: 0;
      font-size: 16px; /* prevent iOS viewport zoom on focus */
      border: none;
      outline: none;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<input id="kb" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

<div id="collage"></div>
<div id="overlay"></div>

<div id="content">

  <div id="typing-section">
    <p class="prompt">type the following</p>
    <div class="phrase" id="phrase"></div>
  </div>

  <div id="char-section" hidden>
    <div class="char-img-wrap loading" id="char-img-wrap">
      <img class="char-img" id="char-img" alt="">
    </div>
    <p class="char-info" id="char-info"></p>
    <p class="go-text">go to the gym.</p>
    <p class="restart-hint">tap or press any key to go again</p>
  </div>

</div>

<script>
  /* ─── Characters ─────────────────────────────────────────────────── */
  const characters = [
    // Dragon Ball
    { name: 'Goku',                 anime: 'Dragon Ball Z' },
    { name: 'Vegeta',               anime: 'Dragon Ball Z' },
    { name: 'Gohan',                anime: 'Dragon Ball Z' },
    { name: 'Piccolo',              anime: 'Dragon Ball Z' },
    { name: 'Broly',                anime: 'Dragon Ball Super' },
    // Naruto
    { name: 'Rock Lee',             anime: 'Naruto' },
    { name: 'Might Guy',            anime: 'Naruto' },
    { name: 'Madara Uchiha',        anime: 'Naruto' },
    // One Punch Man
    { name: 'Saitama',              anime: 'One Punch Man' },
    { name: 'Bang (Silver Fang)',   anime: 'One Punch Man' },
    // One Piece
    { name: 'Roronoa Zoro',         anime: 'One Piece' },
    { name: 'Whitebeard',           anime: 'One Piece' },
    { name: 'Shanks',               anime: 'One Piece' },
    // Seven Deadly Sins
    { name: 'Escanor',              anime: 'Seven Deadly Sins' },
    // Berserk
    { name: 'Guts',                 anime: 'Berserk' },
    // Demon Slayer
    { name: 'Tengen Uzui',          anime: 'Demon Slayer' },
    { name: 'Gyomei Himejima',      anime: 'Demon Slayer' },
    { name: 'Akaza',                anime: 'Demon Slayer' },
    // Attack on Titan
    { name: 'Levi Ackerman',        anime: 'Attack on Titan' },
    // Vinland Saga
    { name: 'Thorfinn',             anime: 'Vinland Saga' },
    // Hunter x Hunter
    { name: 'Netero',               anime: 'Hunter x Hunter' },
    { name: 'Meruem',               anime: 'Hunter x Hunter' },
    // JoJo's Bizarre Adventure
    { name: 'Jotaro Kujo',          anime: 'JoJo\'s Bizarre Adventure' },
    // Bleach
    { name: 'Kenpachi Zaraki',      anime: 'Bleach' },
    { name: 'Yamamoto Genryūsai',   anime: 'Bleach' },
    // Record of Ragnarok
    { name: 'Heracles',             anime: 'Record of Ragnarok' },
    { name: 'Lu Bu',                anime: 'Record of Ragnarok' },
    // Jujutsu Kaisen
    { name: 'Yuji Itadori',         anime: 'Jujutsu Kaisen' },
    { name: 'Aoi Todo',             anime: 'Jujutsu Kaisen' },
    { name: 'Toji Fushiguro',       anime: 'Jujutsu Kaisen' },
    // Fullmetal Alchemist: Brotherhood
    { name: 'Alex Louis Armstrong', anime: 'Fullmetal Alchemist: Brotherhood' },
    // Solo Leveling
    { name: 'Sung Jin-Woo',         anime: 'Solo Leveling' },
  ];

  /* ─── Slug (must match fetch-images.js) ─────────────────────────── */
  function toSlug(name) {
    return name
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }

  /* ─── Collage ────────────────────────────────────────────────────── */
  function pickSize(w, h) {
    const ratio = w / h;
    if (ratio > 1.3) {
      // landscape — wide tiles
      return [[2,1],[2,1],[3,1]][Math.floor(Math.random() * 3)];
    } else if (ratio < 0.8) {
      // portrait — tall tiles
      return [[1,2],[1,2],[1,3]][Math.floor(Math.random() * 3)];
    } else {
      // square / near-square
      return [[1,1],[2,2]][Math.floor(Math.random() * 2)];
    }
  }

  const collageEl = document.getElementById('collage');
  const shuffled  = [...characters].sort(() => Math.random() - 0.5);
  const picks     = shuffled.slice(0, 20);   // collage only
  const featured  = shuffled.slice(20);       // featured card only — guaranteed no overlap

  // Preload featured images now so the card appears instantly when the phrase completes
  featured.forEach(char => { new Image().src = `img/${toSlug(char.name)}.jpg`; });
  picks.forEach(char => {
    const img = document.createElement('img');
    img.alt   = '';
    // Start at 1×1; onload will correct span based on actual dimensions.
    // The collage is opacity:0 until phrase completes so reflow is invisible.
    img.style.gridColumn = 'span 1';
    img.style.gridRow    = 'span 1';
    img.onload = () => {
      const [c, r] = pickSize(img.naturalWidth, img.naturalHeight);
      img.style.gridColumn = `span ${c}`;
      img.style.gridRow    = `span ${r}`;
    };
    img.onerror = () => { img.style.opacity = '0'; };
    img.src = `img/${toSlug(char.name)}.jpg`;
    collageEl.appendChild(img);
  });

  // Add filler tiles (1×1) from the same picks pool to plug any gaps left by large spans.
  // Images are already cached so these load instantly.
  [...picks].sort(() => Math.random() - 0.5).forEach(char => {
    const img = document.createElement('img');
    img.alt   = '';
    img.style.gridColumn = 'span 1';
    img.style.gridRow    = 'span 1';
    img.onerror = () => { img.style.opacity = '0'; };
    img.src = `img/${toSlug(char.name)}.jpg`;
    collageEl.appendChild(img);
  });

  /* ─── State ─────────────────────────────────────────────────────── */
  const TARGET = 'give me the strength to go gym';
  let progress = 0;
  let showing  = false;

  const phraseEl      = document.getElementById('phrase');
  const typingSection = document.getElementById('typing-section');
  const charSection   = document.getElementById('char-section');
  const charImgWrap   = document.getElementById('char-img-wrap');
  const charImg       = document.getElementById('char-img');
  const charInfo      = document.getElementById('char-info');

  /* ─── Build letter spans ─────────────────────────────────────────── */
  const spans = TARGET.split('').map(ch => {
    const span = document.createElement('span');
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.className   = 'letter';
    phraseEl.appendChild(span);
    return { el: span, ch };
  });

  /* ─── Input ──────────────────────────────────────────────────────── */
  const kbInput = document.getElementById('kb');

  // Tap anywhere: focus the hidden input to summon the mobile keyboard.
  // On the result screen, a tap resets instead.
  document.addEventListener('click', () => {
    if (showing) { reset(); return; }
    kbInput.focus({ preventScroll: true });
  });

  // On mobile, tap sends touchend before click — focus early so the
  // keyboard appears without a second tap.
  document.addEventListener('touchend', () => {
    if (!showing) kbInput.focus({ preventScroll: true });
  }, { passive: true });

  // On mobile, autocapitalize etc. may mean keydown fires with key='Unidentified'.
  // Use a flag so the input event doesn't double-process keys that keydown handled.
  let handledByKeydown = false;

  document.addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (showing) { reset(); handledByKeydown = true; return; }
    const key = e.key;
    if (key.length !== 1) return;
    if (key === ' ') e.preventDefault();
    handledByKeydown = true;
    if (key === TARGET[progress]) {
      spans[progress].el.classList.add('typed');
      progress++;
      if (progress === TARGET.length) showCharacter();
    }
  });

  // Mobile keyboards fire `input` with e.data = the typed character.
  // Skip if keydown already handled it (desktop path).
  kbInput.addEventListener('input', e => {
    const char = (e.data || '').toLowerCase();
    kbInput.value = ''; // keep input empty so backspace etc. don't accumulate
    if (handledByKeydown) { handledByKeydown = false; return; }
    if (!char) return;
    if (showing) { reset(); return; }
    if (char === TARGET[progress]) {
      spans[progress].el.classList.add('typed');
      progress++;
      if (progress === TARGET.length) showCharacter();
    }
  });

  // Update prompt text on touch devices
  if ('ontouchstart' in window) {
    document.querySelector('.prompt').textContent = 'tap, then type the following';
  }

  /* ─── Show character ─────────────────────────────────────────────── */
  function showCharacter() {
    showing = true;
    const pool = featured.length ? featured : picks;
    const char = pool[Math.floor(Math.random() * pool.length)];

    charInfo.textContent  = `— ${char.name}, ${char.anime}`;
    charImg.classList.remove('loaded');
    charImgWrap.classList.add('loading');
    charImg.src = '';

    typingSection.hidden = true;
    charSection.hidden   = false;
    document.getElementById('collage').style.opacity = '1';
    document.getElementById('overlay').style.opacity = '1';

    charImg.onload  = () => { charImgWrap.classList.remove('loading'); charImg.classList.add('loaded'); };
    charImg.onerror = () => { charImgWrap.classList.remove('loading'); };
    charImg.src = `img/${toSlug(char.name)}.jpg`;
  }

  /* ─── Reset ──────────────────────────────────────────────────────── */
  function reset() {
    showing  = false;
    progress = 0;
    spans.forEach(s => s.el.classList.remove('typed'));
    charImg.src = '';
    charImg.classList.remove('loaded');
    charImgWrap.classList.add('loading');
    charSection.hidden   = true;
    typingSection.hidden = false;
    document.getElementById('collage').style.opacity = '0';
    document.getElementById('overlay').style.opacity = '0';
  }
</script>

</body>
</html>
