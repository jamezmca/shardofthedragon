<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Samurai Giraffe</title>
<meta name="description" content="Execute criminal giraffes with perfect samurai precision. Angle your cut through skin and bone.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #111;
  color: #ddd;
  font-family: monospace;
  height: 100%;
  overflow: hidden;
  user-select: none;
}
body { display: flex; flex-direction: column; height: 100dvh; }

/* ── Level strip ── */
#strip {
  flex-shrink: 0;
  display: flex;
  gap: 6px;
  padding: 7px 8px;
  overflow-x: auto;
  background: #0a0a0a;
  border-bottom: 2px solid #222;
  scrollbar-width: none;
}
#strip::-webkit-scrollbar { display: none; }

.tile {
  flex-shrink: 0;
  width: 54px;
  height: 66px;
  border: 2px solid #333;
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: #181818;
  image-rendering: pixelated;
}
.tile.active  { border-color: #eee; }
.tile.locked  { opacity: 0.35; cursor: default; }
.tile canvas  { display: block; width: 100%; height: 54px; image-rendering: pixelated; }
.tile-lbl {
  position: absolute;
  bottom: 2px; left: 0; right: 0;
  text-align: center;
  font-size: 8px;
  color: #888;
}
.tile-stamp {
  position: absolute;
  inset: 0 0 14px 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  color: #c00;
  font-size: 7px;
  font-weight: bold;
  letter-spacing: 1px;
  transform: rotate(-12deg);
  pointer-events: none;
}
.tile-best {
  position: absolute;
  top: 2px; right: 3px;
  font-size: 7px;
  color: #fc0;
}
.tile-lock {
  position: absolute;
  inset: 0 0 14px 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

/* ── Main ── */
#main {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#gc {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
  cursor: crosshair;
  touch-action: none;
  image-rendering: pixelated;
}

/* ── Stats ── */
#stats {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.78);
  border: 1px solid #333;
  padding: 9px 13px;
  font-size: 11px;
  line-height: 1.9;
  pointer-events: none;
  max-width: 190px;
}
#stats .gname { font-size: 13px; color: #fc0; margin-bottom: 3px; }
#stats .crime { color: #f88; font-style: italic; font-size: 10px; margin-top: 5px; line-height: 1.5; }

/* ── Toggle ── */
#toggle {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; gap: 0;
}
#toggle button {
  background: #1a1a1a;
  color: #aaa;
  border: 1px solid #444;
  padding: 6px 12px;
  font-family: monospace;
  font-size: 11px;
  cursor: pointer;
}
#toggle button:first-child { border-right: none; border-radius: 3px 0 0 3px; }
#toggle button:last-child  { border-radius: 0 3px 3px 0; }
#toggle button.on { background: #333; color: #eee; border-color: #888; }

/* ── Execute btn (mobile) ── */
#exec-btn {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: #5a0000;
  color: #fdd;
  border: 2px solid #a00;
  padding: 11px 32px;
  font-family: monospace;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 2px;
  border-radius: 2px;
}
#exec-btn:disabled { opacity: 0.35; cursor: default; }
@media (pointer: fine) { #exec-btn { display: none; } }

/* ── Result overlay ── */
#result {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#result.show { display: flex; }
#res-score { font-size: 80px; font-weight: bold; line-height: 1; }
#res-verdict { font-size: 18px; letter-spacing: 3px; }
#res-detail { font-size: 12px; color: #aaa; text-align: center; line-height: 2; }
#res-btns { display: flex; gap: 10px; margin-top: 6px; }
#res-btns button {
  background: #1a1a1a;
  color: #ddd;
  border: 1px solid #555;
  padding: 9px 22px;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
  border-radius: 2px;
}
#res-btns button:hover { background: #333; }

/* ── Hint ── */
#hint {
  position: absolute;
  bottom: 14px; right: 14px;
  font-size: 10px;
  color: #555;
  pointer-events: none;
}
@media (pointer: coarse) { #hint { display: none; } }
</style>
</head>
<body>

<div id="strip"></div>
<div id="main">
  <canvas id="gc"></canvas>

  <div id="stats"></div>

  <div id="toggle">
    <button id="btn-photo" class="on" onclick="setView('photo')">PHOTO</button>
    <button id="btn-xray"        onclick="setView('xray')">X-RAY</button>
  </div>

  <button id="exec-btn" disabled onclick="doExecute()">EXECUTE</button>
  <div id="hint">draw slash · SPACE to execute</div>

  <div id="result">
    <div id="res-score"></div>
    <div id="res-verdict"></div>
    <div id="res-detail"></div>
    <div id="res-btns">
      <button onclick="retry()">RETRY</button>
      <button id="btn-next" onclick="goNext()" style="display:none">NEXT ›</button>
    </div>
  </div>
</div>

<script>
// ── Giraffe data ──────────────────────────────────────────────────────────────
const GIRAFFES = [
  {
    name: 'Gerald Longneck III',
    height: '5.2m', weight: '820kg', age: 14,
    crime: 'Consumed the last leaf of the Sacred Acacia of Nairobi. Showed zero remorse.',
    fatness: 0.18,   // lean elder — cut should lean toward bone perp
    boniness: 0.72,
    spotSeed: 1337,
    skinCol: '#C8A84B', spotCol: '#7B5218',
  },
  {
    name: 'Beatrice Patchworth',
    height: '4.1m', weight: '1240kg', age: 5,
    crime: "Sat on a tourist's Land Rover deliberately. Twice. Smirked both times.",
    fatness: 0.82,   // very fat young giraffe — cut should lean toward skin normal
    boniness: 0.22,
    spotSeed: 420,
    skinCol: '#D4B356', spotCol: '#8A6120',
  },
];
GIRAFFES.forEach((g, i) => { g.id = i; });

// ── Persist ───────────────────────────────────────────────────────────────────
let saved = { unlocked: 1, best: [] };
try { saved = JSON.parse(localStorage.getItem('samgiraffe') || '{}'); } catch(e) {}
if (!saved.unlocked) saved.unlocked = 1;
if (!saved.best) saved.best = [];
function persist() { localStorage.setItem('samgiraffe', JSON.stringify(saved)); }

// ── State ─────────────────────────────────────────────────────────────────────
let lvl     = 0;
let view    = 'photo';   // 'photo' | 'xray'
let cut     = null;      // {x1,y1,x2,y2}
let phase   = 'idle';    // 'idle' | 'anim' | 'done'
let drawing = false;
let drawPt  = null;
let blood   = [];
let fallT   = 0;

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let CW = 0, CH = 0;

function resize() {
  const m = document.getElementById('main');
  CW = canvas.width  = m.clientWidth;
  CH = canvas.height = m.clientHeight;
  render();
}
window.addEventListener('resize', resize);

// ── Geometry ──────────────────────────────────────────────────────────────────
function geo(g) {
  const p1 = { x: CW * 0.78, y: CH * 0.90 }; // bottom-right
  const p2 = { x: CW * 0.22, y: CH * 0.10 }; // top-left
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy);
  const ang = Math.atan2(dy, dx);              // neck direction angle
  const px = -dy / len, py = dx / len;         // perpendicular unit vector

  const scale    = CW / 500;
  const halfSkin = (50 + g.fatness * 70) * scale;
  const halfBone = (12 + g.boniness * 14) * scale;
  const boneOff  = (0.06 + g.boniness * 0.09) * (g.id % 2 === 0 ? 1 : -1); // bone tilt offset

  return { p1, p2, dx, dy, len, ang, px, py, halfSkin, halfBone, boneOff };
}

// ── Spot pattern per giraffe ──────────────────────────────────────────────────
function makeSpots(seed, n = 12) {
  const s = [];
  let r = seed;
  for (let i = 0; i < n; i++) {
    r = (r * 1664525 + 1013904223) >>> 0;
    const u = (r / 0xffffffff);
    r = (r * 1664525 + 1013904223) >>> 0;
    const v = (r / 0xffffffff);
    r = (r * 1664525 + 1013904223) >>> 0;
    const rad = 0.05 + (r / 0xffffffff) * 0.12;
    s.push({ u, v, rad });
  }
  return s;
}
GIRAFFES.forEach(g => { g.spots = makeSpots(g.spotSeed); });

function inSpot(u, v, spots) {
  for (const s of spots) {
    const du = u - s.u, dv = v - s.v;
    if (du*du + dv*dv < s.rad * s.rad) return true;
  }
  return false;
}

// ── Neck drawing ──────────────────────────────────────────────────────────────
const PSIZ = () => Math.max(3, Math.round(CW / 100));

function drawNeck(g, G, clipSide, tx, ty, rot) {
  // clipSide: null | 'head' | 'body'  (head = p2 side, body = p1 side)
  ctx.save();

  if (clipSide && cut) {
    const { x1, y1, x2, y2 } = cut;
    const cdx = x2 - x1, cdy = y2 - y1;
    const cl   = Math.hypot(cdx, cdy);
    const ex   = cdx / cl, ey = cdy / cl;
    const ext  = Math.hypot(CW, CH) + 300;
    // Perpendicular toward p2 (head side)
    let nx = -cdy / cl, ny = cdx / cl;
    const side = (G.p2.x - x1) * cdy - (G.p2.y - y1) * cdx;
    if (side < 0) { nx = -nx; ny = -ny; }
    if (clipSide === 'body') { nx = -nx; ny = -ny; }

    ctx.beginPath();
    ctx.moveTo(x1 - ex * ext,              y1 - ey * ext);
    ctx.lineTo(x1 - ex * ext + nx * ext,   y1 - ey * ext + ny * ext);
    ctx.lineTo(x2 + ex * ext + nx * ext,   y2 + ey * ext + ny * ext);
    ctx.lineTo(x2 + ex * ext,              y2 + ey * ext);
    ctx.closePath();
    ctx.clip();
  }

  if (tx || ty || rot) {
    const mx = cut ? (cut.x1 + cut.x2) / 2 : CW / 2;
    const my = cut ? (cut.y1 + cut.y2) / 2 : CH / 2;
    ctx.translate(mx + tx, my + ty);
    ctx.rotate(rot);
    ctx.translate(-mx, -my);
  }

  if (view === 'photo') drawPhotoNeck(g, G);
  else                  drawXrayNeck(g, G);

  ctx.restore();
}

function drawPhotoNeck(g, G) {
  const { p1, p2, px, py, halfSkin, len } = G;
  const ps = PSIZ();
  const steps = Math.ceil(len / ps);

  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const taper = 1 - t * 0.15;
    const hw = halfSkin * taper;
    const cx = p1.x + (p2.x - p1.x) * t;
    const cy = p1.y + (p2.y - p1.y) * t;

    const halfSteps = Math.ceil(hw / ps);
    for (let j = -halfSteps; j <= halfSteps; j++) {
      const d  = j * ps;
      const wx = Math.round((cx + px * d) / ps) * ps;
      const wy = Math.round((cy + py * d) / ps) * ps;
      const v  = (d / hw + 1) / 2;          // 0..1 across
      const spot = inSpot(t, v, g.spots);
      ctx.fillStyle = spot ? g.spotCol : g.skinCol;
      ctx.fillRect(wx, wy, ps, ps);
    }
  }
}

function drawXrayNeck(g, G) {
  const { p1, p2, px, py, halfSkin, halfBone, boneOff, len, ang } = G;
  const ps    = PSIZ();
  const boneAng = ang + boneOff;
  const bpx   = -Math.sin(boneAng);
  const bpy   =  Math.cos(boneAng);
  const steps = Math.ceil(len / ps);

  for (let i = 0; i <= steps; i++) {
    const t     = i / steps;
    const taper = 1 - t * 0.15;
    const hw    = halfSkin * taper;
    const boneHW = halfBone * taper;
    const cx = p1.x + (p2.x - p1.x) * t;
    const cy = p1.y + (p2.y - p1.y) * t;
    // Bone center at this step (slightly different direction)
    const bx = p1.x + Math.cos(boneAng) * t * len;
    const by = p1.y + Math.sin(boneAng) * t * len;

    const halfSteps = Math.ceil(hw / ps);
    for (let j = -halfSteps; j <= halfSteps; j++) {
      const d  = j * ps;
      const wx = Math.round((cx + px * d) / ps) * ps;
      const wy = Math.round((cy + py * d) / ps) * ps;

      // Distance from bone center
      const ddx = (cx + px * d) - bx;
      const ddy = (cy + py * d) - by;
      const boneDist = Math.abs(ddx * bpx + ddy * bpy);

      let col;
      if (boneDist < boneHW) {
        const bf = boneDist / boneHW;
        const br = Math.round(220 + bf * 20);
        col = `rgb(${br},${br},${br})`;
      } else {
        const ef = Math.abs(d) / hw;
        col = ef > 0.88 ? '#445566' : '#0e1520';
      }
      ctx.fillStyle = col;
      ctx.fillRect(wx, wy, ps, ps);
    }
  }
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  if (!CW) return;
  ctx.clearRect(0, 0, CW, CH);

  const g = GIRAFFES[lvl];
  const G = geo(g);

  if (phase === 'done' && cut) {
    // Body stays, head falls
    const ft2  = fallT * fallT;
    const fallY  = ft2 * CH * 0.7;
    const fallX  = -fallT * CW * 0.08;
    const fallR  = fallT * 0.5;
    drawNeck(g, G, 'body', 0,     0,     0);
    drawNeck(g, G, 'head', fallX, fallY, fallR);
  } else {
    drawNeck(g, G, null, 0, 0, 0);
  }

  // Blood
  for (const p of blood) {
    ctx.fillStyle = `rgba(160,0,0,${p.a.toFixed(2)})`;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.s, p.s);
  }

  // Cut line
  if (cut && phase !== 'anim') {
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(cut.x1, cut.y1);
    ctx.lineTo(cut.x2, cut.y2);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    [{ x: cut.x1, y: cut.y1 }, { x: cut.x2, y: cut.y2 }].forEach(p => {
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    });
  }
}

// ── Score ─────────────────────────────────────────────────────────────────────
function score(g, G, c) {
  const cutAng  = Math.atan2(c.y2 - c.y1, c.x2 - c.x1);
  const cutLen  = Math.hypot(c.x2 - c.x1, c.y2 - c.y1);

  // Skin normal = perp to neck. Bone perp = perp to bone axis.
  const skinPerpAng = G.ang + Math.PI / 2;
  const bonePerpAng = (G.ang + G.boneOff) + Math.PI / 2;

  // Ideal = weighted blend: fat → skin normal, bone → bone perp
  const fw = 0.2 + g.fatness  * 0.6;
  const bw = 0.2 + g.boniness * 0.6;
  const idealAng = (skinPerpAng * fw + bonePerpAng * bw) / (fw + bw);

  // Angle diff (handle wrap-around and 180° symmetry of a line)
  let diff = cutAng - idealAng;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  diff = Math.min(Math.abs(diff), Math.PI - Math.abs(diff));
  const angleScore = Math.max(0, 1 - diff / (Math.PI / 4));

  // Power: ideal cut length scales with resistance
  const resistance = 0.18 + g.fatness * 0.14 + g.boniness * 0.18;
  const maxLen     = Math.hypot(CW, CH);
  const power      = cutLen / maxLen;
  const ratio      = power / resistance;

  let powerScore;
  if (ratio < 0.6) {
    powerScore = 0;         // too weak
  } else if (ratio < 1.0) {
    powerScore = (ratio - 0.6) / 0.4;
  } else if (ratio < 1.6) {
    powerScore = 1 - (ratio - 1) / 0.6 * 0.35;
  } else {
    powerScore = Math.max(0, 0.65 - (ratio - 1.6) * 1.3); // explosion territory
  }

  const cutThrough = ratio >= 0.6;
  const explosion  = ratio > 2.2;
  const total      = Math.round((angleScore * 0.6 + powerScore * 0.4) * 100);

  return { total, angleScore, powerScore, cutThrough, explosion };
}

// ── Execute ───────────────────────────────────────────────────────────────────
function doExecute() {
  if (!cut || phase !== 'idle') return;
  const g = GIRAFFES[lvl];
  const G = geo(g);
  const sc = score(g, G, cut);

  if (!sc.cutThrough) {
    showNoCut();
    return;
  }

  phase = 'anim';
  document.getElementById('exec-btn').disabled = true;

  // Spawn blood at cut midpoint
  const mx = (cut.x1 + cut.x2) / 2;
  const my = (cut.y1 + cut.y2) / 2;
  spawnBlood(mx, my, sc.explosion ? 150 : 50);

  const t0 = performance.now();
  const dur = 1100;

  function frame(now) {
    const t = Math.min((now - t0) / dur, 1);

    blood.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.25;
      p.a  -= 0.013;
    });
    blood = blood.filter(p => p.a > 0);

    fallT = t < 0.35 ? 0 : ((t - 0.35) / 0.65) ** 1.6;

    render();

    if (t < 1) requestAnimationFrame(frame);
    else       showResult(sc, G);
  }
  requestAnimationFrame(frame);
}

function spawnBlood(mx, my, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 7;
    blood.push({
      x: mx, y: my,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 3,
      a: 0.7 + Math.random() * 0.3,
      s: 2 + Math.ceil(Math.random() * 4),
    });
  }
}

function showNoCut() {
  document.getElementById('res-score').textContent   = '—';
  document.getElementById('res-score').style.color   = '#666';
  document.getElementById('res-verdict').textContent = 'INSUFFICIENT FORCE';
  document.getElementById('res-detail').textContent  = 'Draw a longer slash.';
  document.getElementById('btn-next').style.display  = 'none';
  document.getElementById('result').classList.add('show');
}

function showResult(sc, G) {
  phase = 'done';

  if (saved.best[lvl] == null || sc.total > saved.best[lvl]) saved.best[lvl] = sc.total;
  if (sc.total > 0 && lvl + 1 < GIRAFFES.length)
    saved.unlocked = Math.max(saved.unlocked, lvl + 2);
  persist();
  buildStrip();

  const col = sc.total >= 80 ? '#44ee88' : sc.total >= 50 ? '#fc0' : '#f44';
  document.getElementById('res-score').textContent = sc.total;
  document.getElementById('res-score').style.color = col;

  const verdict =
    sc.total >= 90 ? 'FLAWLESS EXECUTION' :
    sc.total >= 70 ? 'CLEAN CUT' :
    sc.total >= 50 ? 'ADEQUATE' :
    sc.explosion   ? 'EXPLOSIVE MESS' : 'SLOPPY';

  document.getElementById('res-verdict').textContent = verdict;
  document.getElementById('res-detail').innerHTML =
    `Angle ${Math.round(sc.angleScore * 100)}%  ·  Power ${Math.round(sc.powerScore * 100)}%<br>` +
    `Best: ${saved.best[lvl]}`;

  document.getElementById('btn-next').style.display =
    (lvl + 1 < GIRAFFES.length && saved.unlocked > lvl + 1) ? '' : 'none';

  document.getElementById('result').classList.add('show');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function selectLevel(i) {
  if (i >= saved.unlocked) return;
  lvl    = i;
  view   = 'photo';
  cut    = null;
  phase  = 'idle';
  blood  = [];
  fallT  = 0;
  drawing = false;
  document.getElementById('exec-btn').disabled = true;
  document.getElementById('result').classList.remove('show');
  document.getElementById('btn-photo').classList.add('on');
  document.getElementById('btn-xray').classList.remove('on');
  buildStrip();
  updateStats();
  render();
}

function retry()  { selectLevel(lvl); }
function goNext() { if (lvl + 1 < GIRAFFES.length) selectLevel(lvl + 1); }

function setView(v) {
  view = v;
  document.getElementById('btn-photo').classList.toggle('on', v === 'photo');
  document.getElementById('btn-xray').classList.toggle('on',  v === 'xray');
  render();
}

// ── Strip ─────────────────────────────────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  GIRAFFES.forEach((g, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile'
      + (i === lvl ? ' active' : '')
      + (i >= saved.unlocked ? ' locked' : '');

    // Tiny mugshot canvas
    const mc = document.createElement('canvas');
    mc.width = 54; mc.height = 54;
    drawMugshot(mc, g);
    tile.appendChild(mc);

    const lbl = document.createElement('div');
    lbl.className = 'tile-lbl';
    lbl.textContent = `LVL ${i + 1}`;
    tile.appendChild(lbl);

    if (saved.best[i] != null) {
      const bs = document.createElement('div');
      bs.className = 'tile-best';
      bs.textContent = saved.best[i];
      tile.appendChild(bs);
      const st = document.createElement('div');
      st.className = 'tile-stamp';
      st.textContent = 'EXECUTED';
      tile.appendChild(st);
    }

    if (i >= saved.unlocked) {
      const lk = document.createElement('div');
      lk.className = 'tile-lock';
      lk.textContent = '🔒';
      tile.appendChild(lk);
    } else {
      tile.addEventListener('click', () => selectLevel(i));
    }

    strip.appendChild(tile);
  });
}

function drawMugshot(mc, g) {
  const tc = mc.getContext('2d');
  const w = mc.width, h = mc.height;
  tc.clearRect(0, 0, w, h);
  // Head
  tc.fillStyle = g.skinCol;
  tc.fillRect(w*.28, h*.06, w*.44, h*.32);
  // Ears
  tc.fillRect(w*.22, h*.10, w*.10, h*.12);
  tc.fillRect(w*.68, h*.10, w*.10, h*.12);
  // Horns
  tc.fillStyle = '#8B6530';
  tc.fillRect(w*.33, h*.02, w*.07, h*.10);
  tc.fillRect(w*.60, h*.02, w*.07, h*.10);
  // Neck
  tc.fillStyle = g.skinCol;
  tc.fillRect(w*.34, h*.36, w*.32, h*.50);
  // Spots
  tc.fillStyle = g.spotCol;
  g.spots.slice(0, 5).forEach(s => {
    const sx = w*.34 + s.u * w*.32;
    const sy = h*.36 + s.v * h*.50;
    tc.fillRect(sx, sy, w*.09, h*.09);
  });
  // Eyes
  tc.fillStyle = '#000';
  tc.fillRect(w*.36, h*.14, w*.08, h*.08);
  tc.fillRect(w*.56, h*.14, w*.08, h*.08);
  tc.fillStyle = '#fff';
  tc.fillRect(w*.38, h*.15, w*.03, h*.03);
  tc.fillRect(w*.58, h*.15, w*.03, h*.03);
  // Nostrils
  tc.fillStyle = g.spotCol;
  tc.fillRect(w*.40, h*.28, w*.05, h*.04);
  tc.fillRect(w*.55, h*.28, w*.05, h*.04);
}

// ── Stats panel ───────────────────────────────────────────────────────────────
function updateStats() {
  const g = GIRAFFES[lvl];
  document.getElementById('stats').innerHTML =
    `<div class="gname">${g.name}</div>` +
    `<div>Height: ${g.height}</div>` +
    `<div>Weight: ${g.weight}</div>` +
    `<div>Age: ${g.age} yrs</div>` +
    `<div class="crime">Crime:<br>${g.crime}</div>`;
}

// ── Input ─────────────────────────────────────────────────────────────────────
function evtPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = CW / r.width, sy = CH / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
}

function onDown(e) {
  if (phase !== 'idle') return;
  e.preventDefault();
  drawing = true;
  drawPt  = evtPos(e);
  cut     = null;
  document.getElementById('exec-btn').disabled = true;
}

function onMove(e) {
  if (!drawing || phase !== 'idle') return;
  e.preventDefault();
  const p = evtPos(e);
  render();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([8, 5]);
  ctx.beginPath();
  ctx.moveTo(drawPt.x, drawPt.y);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function onUp(e) {
  if (!drawing || phase !== 'idle') return;
  e.preventDefault();
  drawing = false;
  const r   = canvas.getBoundingClientRect();
  const sx  = CW / r.width, sy = CH / r.height;
  const src = e.changedTouches ? e.changedTouches[0] : e;
  const p   = { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  if (Math.hypot(p.x - drawPt.x, p.y - drawPt.y) > 12) {
    cut = { x1: drawPt.x, y1: drawPt.y, x2: p.x, y2: p.y };
    document.getElementById('exec-btn').disabled = false;
  }
  render();
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); doExecute(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
buildStrip();
updateStats();
resize();
</script>
</body>
</html>
