<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suspenseful Coin Flip</title>
  <meta name="description" content="A Roman coin flip with real suspense. Set your time, flip, and wait.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Cinzel', serif;
      background: #ffffff;
    }
    body.dark { background: #050505; }

    /* ── Coin ──────────────────────────────────────────────────────── */
    #coin-scene {
      position: absolute;
      left: 50%;
      top: calc(50% - 30px);
      transform: translate(-50%, -50%);
      width: 190px; height: 190px;
      perspective: 700px;
      display: flex; align-items: center; justify-content: center;
    }

    #coin-wrap {
      width: 170px; height: 170px;
      position: relative;
      transform-style: preserve-3d;
    }

    .coin-face {
      position: absolute; inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      background: radial-gradient(circle at 38% 30%, #FFF5B0, #E8B830 42%, #C07820 68%, #7A4808);
      border: 7px solid #6A3A04;
      box-shadow:
        inset 0 0 0 12px rgba(240,185,30,0.18),
        inset 0 2px 10px rgba(255,245,180,0.45),
        inset 0 -4px 14px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .coin-face::after {
      content: '';
      position: absolute; inset: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(180,120,10,0.45);
      pointer-events: none;
    }

    .coin-back { transform: rotateY(180deg); }

    .coin-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── Result text ───────────────────────────────────────────────── */
    #result-text {
      position: absolute;
      left: 50%; top: calc(50% + 80px);
      transform: translateX(-50%);
      font-size: 52px; color: #fff; letter-spacing: 5px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    #result-text.show { opacity: 1; }

    /* ── Nav bar ───────────────────────────────────────────────────── */
    #nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 54px;
      border-top: 1px solid #222;
      display: flex;
      background: #fff;
      transition: background 0.05s, border-color 0.05s;
    }
    body.dark #nav-bar {
      background: #050505;
      border-color: #2a2a2a;
    }

    #nb-idle, #nb-flip {
      display: flex;
      width: 100%;
    }
    #nb-flip { display: none; }

    .nb-cell {
      display: flex; align-items: center; justify-content: center;
      padding: 0 20px;
      border-right: 1px solid #222;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: #222;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }
    .nb-cell:last-child { border-right: none; }

    body.dark .nb-cell { border-color: #2a2a2a; color: #ccc; }

    .nb-btn {
      background: none;
      border: none;
      border-right: 1px solid #222;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.08s;
    }
    body.dark .nb-btn { border-right-color: #2a2a2a; }
    .nb-btn:last-child { border-right: none; }
    .nb-btn:focus { outline: none; }
    .nb-btn:hover { background: rgba(0,0,0,0.04); }
    .nb-btn:active, .nb-btn.pressed { background: rgba(0,0,0,0.1); }
    body.dark .nb-btn:hover  { background: rgba(255,255,255,0.06); }
    body.dark .nb-btn:active,
    body.dark .nb-btn.pressed { background: rgba(255,255,255,0.12); }

    .nb-fill { flex: 1; }

    #nb-time { gap: 8px; }
    #nb-time-num { font-size: 26px; font-weight: 700; }
    #nb-time-label { font-size: 13px; color: #aaa; }
    body.dark #nb-time-label { color: #555; }

    .nb-sub { font-size: 12px; color: #aaa; margin-left: 8px; }
    body.dark .nb-sub { color: #555; }
  </style>
</head>
<body>

  <div id="coin-scene">
    <div id="coin-wrap">
      <!-- HEADS -->
      <div class="coin-face">
        <svg class="coin-svg" viewBox="0 0 100 100">
          <defs>
            <path id="fh" d="M14,50 A36,36 0 0,1 86,50"/>
            <path id="fb" d="M17,54 A33,33 0 0,0 83,54"/>
          </defs>
          <text fill="#5A3006" font-family="Cinzel,serif" font-size="8.5" letter-spacing="0.5">
            <textPath href="#fh" startOffset="50%" text-anchor="middle">CAES · AVG</textPath>
          </text>
          <text fill="#5A3006" font-family="Cinzel,serif" font-size="8.5" letter-spacing="0.5">
            <textPath href="#fb" startOffset="50%" text-anchor="middle">ROMA</textPath>
          </text>
          <text x="50" y="57" text-anchor="middle" fill="#5A3006"
                font-family="Cinzel,serif" font-size="30">Ⅰ</text>
        </svg>
      </div>
      <!-- TAILS -->
      <div class="coin-face coin-back">
        <svg class="coin-svg" viewBox="0 0 100 100">
          <defs>
            <path id="bh" d="M14,50 A36,36 0 0,1 86,50"/>
            <path id="bb" d="M17,54 A33,33 0 0,0 83,54"/>
          </defs>
          <text fill="#5A3006" font-family="Cinzel,serif" font-size="8.5" letter-spacing="0.5">
            <textPath href="#bh" startOffset="50%" text-anchor="middle">S · P · Q · R</textPath>
          </text>
          <text fill="#5A3006" font-family="Cinzel,serif" font-size="8.5" letter-spacing="0.5">
            <textPath href="#bb" startOffset="50%" text-anchor="middle">ROMA</textPath>
          </text>
          <text x="50" y="57" text-anchor="middle" fill="#5A3006"
                font-family="Cinzel,serif" font-size="30">Ⅱ</text>
        </svg>
      </div>
    </div>
  </div>

  <div id="result-text">HEADS</div>

  <div id="nav-bar">
    <div id="nb-idle">
      <div class="nb-cell" id="nb-time">
        <span id="nb-time-num">2</span><span id="nb-time-label">min</span>
      </div>
      <button class="nb-cell nb-btn" id="key-up">▲</button>
      <button class="nb-cell nb-btn" id="key-down">▼</button>
      <button class="nb-cell nb-btn nb-fill" id="key-space">
        SPACE <span class="nb-sub">to flip</span>
      </button>
    </div>
    <div id="nb-flip">
      <button class="nb-cell nb-btn nb-fill" id="key-reset">
        SPACE <span class="nb-sub">to reset</span>
      </button>
    </div>
  </div>

  <script>
    const coinWrap  = document.getElementById('coin-wrap');
    const resultTx  = document.getElementById('result-text');
    const nbIdle    = document.getElementById('nb-idle');
    const nbFlip    = document.getElementById('nb-flip');
    const minsEl    = document.getElementById('nb-time-num');

    let mins     = 2;
    let state    = 'idle';
    let coinY    = 0;
    let coinA    = 0;
    let result   = null;
    let fallSecs = 0;
    let t0       = 0;
    let prev     = 0;
    let landA0   = 0, landY0 = 0, targetA = 0;

    const IDLE_SPD = 90;
    const FLIP_SPD = 540;

    function setMins(n) {
      mins = Math.max(0, Math.min(99, n));
      minsEl.textContent = mins;
    }

    function startFlip() {
      const maxS = mins === 0 ? 59 : mins * 60 - 1;
      fallSecs = Math.random() * (maxS - 2) + 2;
      result   = Math.random() < 0.5 ? 'heads' : 'tails';
      nbIdle.style.display = 'none';
      nbFlip.style.display = 'flex';
      state = 'rising'; t0 = prev;
    }

    function doReset() {
      document.body.classList.remove('dark');
      resultTx.classList.remove('show');
      nbIdle.style.display = 'flex';
      nbFlip.style.display = 'none';
      coinY = 0;
      state = 'idle';
    }

    function flash(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 120);
    }

    function frame(t) {
      const dt = Math.min((t - prev) / 1000, 0.05);
      prev = t;
      const el = (t - t0) / 1000;

      switch (state) {
        case 'idle':
          coinA += IDLE_SPD * dt;
          coinY = 0;
          break;

        case 'rising':
          coinA += FLIP_SPD * dt;
          coinY = -185 * Math.min(el / 0.65, 1);
          if (el >= 0.65) { state = 'falling'; t0 = t; }
          break;

        case 'falling': {
          coinA += FLIP_SPD * dt;
          const p = Math.min(el / 0.55, 1);
          coinY = -185 + 215 * p * p;
          if (el >= 0.55) { state = 'drifting'; t0 = t; }
          break;
        }

        case 'drifting':
          coinA += FLIP_SPD * dt;
          coinY = 28 + Math.sin(el * 1.1) * 14;
          if (el >= fallSecs) {
            document.body.classList.add('dark');
            landA0 = coinA; landY0 = coinY;
            const base = Math.round(coinA / 360) * 360;
            targetA = result === 'heads' ? base : base + 180;
            if (targetA - coinA >  180) targetA -= 360;
            if (targetA - coinA < -180) targetA += 360;
            state = 'landing'; t0 = t;
          }
          break;

        case 'landing': {
          const p = Math.min(el / 1.1, 1);
          const e = 1 - Math.pow(1 - p, 3);
          coinA = landA0 + (targetA - landA0) * e;
          coinY = landY0 * (1 - e);
          if (el >= 1.1) {
            coinA = targetA; coinY = 0;
            resultTx.textContent = result === 'heads' ? 'HEADS' : 'TAILS';
            resultTx.classList.add('show');
            state = 'result';
          }
          break;
        }
      }

      coinWrap.style.transform = `translateY(${coinY}px) rotateY(${coinA}deg)`;
      requestAnimationFrame(frame);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')   { e.preventDefault(); if (state === 'idle')   { setMins(mins + 1); flash('key-up'); } }
      if (e.key === 'ArrowDown') { e.preventDefault(); if (state === 'idle')   { setMins(mins - 1); flash('key-down'); } }
      if (e.key === ' ')         { e.preventDefault();
        if (state === 'idle')   { startFlip(); flash('key-space'); }
        if (state === 'result') { doReset();   flash('key-reset'); }
      }
    });

    document.getElementById('key-up').addEventListener('click',    () => { if (state === 'idle')   setMins(mins + 1); });
    document.getElementById('key-down').addEventListener('click',  () => { if (state === 'idle')   setMins(mins - 1); });
    document.getElementById('key-space').addEventListener('click', () => { if (state === 'idle')   startFlip(); });
    document.getElementById('key-reset').addEventListener('click', () => { if (state === 'result') doReset(); });

    requestAnimationFrame(t => { prev = t; t0 = t; requestAnimationFrame(frame); });
  </script>
</body>
</html>
