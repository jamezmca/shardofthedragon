<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gone Fishing</title>
<meta name="description" content="A meditative 2D canvas ocean — calm, atmospheric, infinite depth.">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #010407; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────────────────────
const N_ROWS    = 90;    // total wave rows
const HORIZ_F   = 0.44;  // horizon as fraction of canvas height (0=top, 1=bottom)
const ROW_EXP   = 2.8;   // row y-spacing exponent: higher → denser rows near horizon
const WIDTH_EXP = 1.5;   // row width exponent: how quickly trapezoid narrows toward horizon
const AMP_MAX   = 24;    // wave amplitude at viewer (px)
const AMP_MIN   = 0.35;  // wave amplitude at horizon (px)
const STK_MAX   = 2.8;   // stroke width at viewer
const STK_MIN   = 0.3;   // stroke width at horizon
const STEP_PX   = 4;     // horizontal sampling step for path building

// ─────────────────────────────────────────────────────────────────────────────
// WAVE ROW DATA  (generated once — each row has stable random params)
// ─────────────────────────────────────────────────────────────────────────────
// Each row has 4 layered sine components: [frequency, amplitude-ratio, phase, speed]
const TAU = Math.PI * 2;
function rnd(a, b) { return a + Math.random() * (b - a); }

const ROWS = Array.from({ length: N_ROWS }, () => ({
  layers: [
    [rnd(0.003, 0.007), 1.00, rnd(0, TAU), rnd(0.30, 0.65)],
    [rnd(0.009, 0.016), 0.42, rnd(0, TAU), rnd(0.70, 1.20)],
    [rnd(0.018, 0.030), 0.20, rnd(0, TAU), rnd(0.20, 0.50)],
    [rnd(0.036, 0.055), 0.09, rnd(0, TAU), rnd(1.10, 1.90)],
  ],
  rowSpd: rnd(0.35, 0.90),  // per-row global speed multiplier (variation in drift)
  shimOff: rnd(0, TAU),     // shimmer phase offset
}));

// ─────────────────────────────────────────────────────────────────────────────
// SKY — STARS, CONSTELLATIONS, MILKY WAY
// ─────────────────────────────────────────────────────────────────────────────
// All positions are normalised [0-1] within the sky area (x across, y down).

const N_STARS = 310;
const STARS = Array.from({ length: N_STARS }, () => ({
  x:    rnd(0.01, 0.99),
  y:    rnd(0.03, 0.94),
  sz:   rnd(0.3, 1.5),
  base: rnd(0.35, 0.92),   // base alpha
  tph:  rnd(0, TAU),       // twinkle phase
  tspd: rnd(0.5, 2.2),     // twinkle speed
  warm: Math.random() < 0.10,  // ~10% slightly warm-tinted
}));

// Two constellations defined as normalised sky coords + connection lines.
// Orion sits in the right-centre; Big Dipper upper-left.
const CONSTELLATIONS = [
  {
    stars: [
      { x: 0.635, y: 0.26, sz: 2.4, warm: true  },  // Betelgeuse (orangeish)
      { x: 0.700, y: 0.22, sz: 2.0 },                // Bellatrix
      { x: 0.618, y: 0.47, sz: 1.7 },                // Alnitak  (belt)
      { x: 0.658, y: 0.49, sz: 1.9 },                // Alnilam  (belt)
      { x: 0.695, y: 0.47, sz: 1.6 },                // Mintaka  (belt)
      { x: 0.720, y: 0.65, sz: 2.6, blue: true  },   // Rigel (blue-white)
      { x: 0.605, y: 0.67, sz: 1.7 },                // Saiph
    ],
    lines: [[0,1],[0,2],[1,4],[2,3],[3,4],[2,6],[4,5]],
  },
  {
    stars: [
      { x: 0.220, y: 0.15, sz: 1.8 },  // Dubhe
      { x: 0.268, y: 0.22, sz: 1.6 },  // Merak
      { x: 0.305, y: 0.30, sz: 1.5 },  // Phad
      { x: 0.255, y: 0.34, sz: 1.4 },  // Megrez
      { x: 0.185, y: 0.37, sz: 1.7 },  // Alioth
      { x: 0.115, y: 0.40, sz: 1.5 },  // Mizar
      { x: 0.048, y: 0.34, sz: 1.8 },  // Alkaid
    ],
    lines: [[0,1],[1,2],[2,3],[0,3],[3,4],[4,5],[5,6]],
  },
];

// Milky Way: a set of overlapping soft gradient passes forming a diagonal band.
// Defined as { cx, cy, angle, width } all in normalised sky units.
const MW_PASSES = [
  { cx: 0.48, cy: 0.50, angle: -0.38, w: 0.55, h: 2.0, a: 0.042 },
  { cx: 0.44, cy: 0.48, angle: -0.38, w: 0.32, h: 2.0, a: 0.055 },
  { cx: 0.46, cy: 0.52, angle: -0.34, w: 0.18, h: 2.0, a: 0.038 },
  { cx: 0.50, cy: 0.44, angle: -0.42, w: 0.12, h: 2.0, a: 0.028 },  // secondary arm
];

// ─────────────────────────────────────────────────────────────────────────────
// WAVE FUNCTION
// ─────────────────────────────────────────────────────────────────────────────
// Returns the y-displacement (in px) for position wx along a row.
// depth  : 0 = at horizon, 1 = at viewer
// t      : elapsed seconds
// drift  : slow global forward phase applied to all layers (unified ocean drift)
function waveY(row, wx, depth, t, drift) {
  const amp = AMP_MIN + (AMP_MAX - AMP_MIN) * depth;
  let dy = 0;
  for (const [f, a, ph, sp] of row.layers) {
    // Far rows (depth→0) run at ~55% speed; near rows (depth→1) at full speed
    const spd = sp * row.rowSpd * (0.55 + depth * 0.45);
    dy += a * amp * Math.sin(f * wx + ph + t * spd + drift * (0.55 + depth * 0.45));
  }
  return dy;
}

// ─────────────────────────────────────────────────────────────────────────────
// COLOR HELPERS
// ─────────────────────────────────────────────────────────────────────────────
// depth 0 → deep dark navy / depth 1 → slightly brighter teal-navy
function baseRGB(depth) {
  return [
    ( 3 + depth * 10) | 0,
    ( 7 + depth * 28) | 0,
    (20 + depth * 50) | 0,
  ];
}
function crestRGB(depth) {
  return [
    ( 8 + depth * 24) | 0,
    (22 + depth * 72) | 0,
    (48 + depth * 90) | 0,
  ];
}
function shimmerRGB(depth) {
  return [
    (18 + depth * 55) | 0,
    (60 + depth * 120) | 0,
    (95 + depth * 100) | 0,
  ];
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW ONE ROW
// ─────────────────────────────────────────────────────────────────────────────
function drawRow(row, rowY, depth, halfW, t, drift) {
  if (halfW < 1.5) return;

  const x0 = W / 2 - halfW;
  const x1 = W / 2 + halfW;
  const stk = STK_MIN + (STK_MAX - STK_MIN) * depth;

  // Pre-sample wave positions along this row
  const pts = [];
  for (let px = x0; px <= x1 + STEP_PX; px += STEP_PX) {
    const sx = Math.min(px, x1);
    pts.push(sx, rowY + waveY(row, sx, depth, t, drift));
  }
  if (pts.length < 4) return;

  const [br, bg, bb] = baseRGB(depth);

  // ── Main wave stroke ──────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0], pts[1]);
  for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]);
  ctx.strokeStyle = `rgb(${br},${bg},${bb})`;
  ctx.lineWidth = stk;
  ctx.stroke();

  // ── Crest highlight (a second, brighter stroke slightly above) ────────────
  // Starts fading in at depth > 0.2 for atmospheric variation
  if (depth > 0.18) {
    const ha = ((depth - 0.18) / 0.82) ** 1.4;
    const [cr, cg, cb] = crestRGB(depth);
    ctx.beginPath();
    const off = stk * 0.65;
    ctx.moveTo(pts[0], pts[1] - off);
    for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1] - off);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(ha * 0.38).toFixed(3)})`;
    ctx.lineWidth = stk * 0.45;
    ctx.stroke();
  }

  // ── Specular shimmer dots at wave crests ──────────────────────────────────
  // Only visible for rows in the nearer half of the view
  if (depth > 0.45) {
    const sa = ((depth - 0.45) / 0.55) ** 1.6;
    const [sr, sg, sb] = shimmerRGB(depth);
    ctx.fillStyle = `rgba(${sr},${sg},${sb},${(sa * 0.75).toFixed(3)})`;
    for (let i = 2; i < pts.length - 2; i += 2) {
      const y_prev = pts[i - 1];
      const y_curr = pts[i + 1];
      const y_next = pts[i + 3];
      // Local minimum in canvas-y = wave crest (canvas y increases downward)
      if (y_curr < y_prev && y_curr < y_next) {
        const sz = (1 + depth * 3.5) * sa;
        ctx.fillRect(pts[i] - sz * 0.5, pts[i + 1] - sz * 0.5, sz, sz);
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MILKY WAY
// ─────────────────────────────────────────────────────────────────────────────
function drawMilkyWay(horizY) {
  ctx.save();
  // Clip to sky only
  ctx.beginPath();
  ctx.rect(0, 0, W, horizY);
  ctx.clip();

  for (const p of MW_PASSES) {
    const sx = p.cx * W;
    const sy = p.cy * horizY;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(p.angle);
    const bw = p.w * W;
    const bh = p.h * horizY;
    // Perpendicular gradient gives the soft band cross-section
    const g = ctx.createLinearGradient(-bw / 2, 0, bw / 2, 0);
    g.addColorStop(0,    'rgba(0,0,0,0)');
    g.addColorStop(0.20, `rgba(16,20,36,${p.a})`);
    g.addColorStop(0.42, `rgba(22,28,50,${p.a * 1.6})`);
    g.addColorStop(0.50, `rgba(26,32,58,${p.a * 2.0})`);
    g.addColorStop(0.58, `rgba(22,28,50,${p.a * 1.6})`);
    g.addColorStop(0.80, `rgba(16,20,36,${p.a})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(-bw / 2, -bh / 2, bw, bh);
    ctx.restore();
  }

  // Tiny star-dust sprinkled along the band (very faint, many small dots)
  const dustSeed = 77;
  let ds = dustSeed;
  function dr() { ds = (ds * 1664525 + 1013904223) >>> 0; return ds / 0xffffffff; }
  for (let i = 0; i < 180; i++) {
    // Place dust within a diagonal band across the sky
    const along = dr();   // 0-1 along band length
    const across = (dr() - 0.5) * 0.22;  // spread around band centre
    const bx = (0.18 + along * 0.64) * W + across * W * Math.cos(-0.38 + Math.PI/2);
    const by = (0.08 + along * 0.84) * horizY + across * W * Math.sin(-0.38 + Math.PI/2);
    const da = dr() * 0.18 + 0.04;
    ctx.fillStyle = `rgba(200,210,230,${da.toFixed(3)})`;
    ctx.fillRect(bx | 0, by | 0, 1, 1);
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// STARS & CONSTELLATIONS
// ─────────────────────────────────────────────────────────────────────────────
function drawStars(horizY, t) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, horizY);
  ctx.clip();

  // ── Constellation lines (drawn first, under stars) ──────────────────────
  for (const con of CONSTELLATIONS) {
    ctx.strokeStyle = 'rgba(140,160,210,0.08)';
    ctx.lineWidth   = 0.8;
    for (const [a, b] of con.lines) {
      const ax = con.stars[a].x * W, ay = con.stars[a].y * horizY;
      const bx = con.stars[b].x * W, by = con.stars[b].y * horizY;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();
    }
  }

  // ── Background stars ─────────────────────────────────────────────────────
  for (const s of STARS) {
    const sx = s.x * W;
    const sy = s.y * horizY;
    // Atmospheric fade: stars near the horizon dim out
    const horizFade = Math.max(0, 1 - (s.y ** 2.5) * 0.7);
    const twinkle   = 0.65 + 0.35 * Math.sin(t * s.tspd + s.tph);
    const alpha     = s.base * twinkle * horizFade;
    if (alpha < 0.02) continue;

    const r = s.warm ? 255 : Math.round(180 + (1 - s.base) * 50);
    const g = s.warm ? 220 : Math.round(195 + (1 - s.base) * 40);
    const b = s.warm ? 170 : 255;
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(3)})`;

    const sz = s.sz * (0.88 + 0.12 * twinkle);
    // Larger stars get a soft cross-glow
    if (sz > 1.1) {
      ctx.globalAlpha = alpha * 0.25;
      ctx.fillRect(sx - sz * 2, sy - 0.6, sz * 4, 1.2);
      ctx.fillRect(sx - 0.6, sy - sz * 2, 1.2, sz * 4);
      ctx.globalAlpha = 1;
    }
    ctx.fillRect(sx - sz * 0.5, sy - sz * 0.5, sz, sz);
  }

  // ── Constellation stars (brighter, on top) ───────────────────────────────
  for (const con of CONSTELLATIONS) {
    for (const s of con.stars) {
      const sx = s.x * W, sy = s.y * horizY;
      const twinkle = 0.82 + 0.18 * Math.sin(t * 1.1 + s.x * 7.3);
      const alpha   = 0.75 * twinkle * Math.max(0, 1 - (s.y ** 3) * 0.5);

      let r = 210, g = 220, b = 255;
      if (s.warm) { r = 255; g = 200; b = 140; }  // Betelgeuse orange
      if (s.blue) { r = 160; g = 190; b = 255; }  // Rigel blue-white

      // Soft glow
      ctx.fillStyle = `rgba(${r},${g},${b},${(alpha * 0.07).toFixed(3)})`;
      const glowR = s.sz * 2.2;
      ctx.beginPath();
      ctx.arc(sx, sy, glowR, 0, TAU);
      ctx.fill();

      // Core pixel
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
      ctx.fillRect(sx - s.sz * 0.5, sy - s.sz * 0.5, s.sz, s.sz);
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// BACKGROUND
// ─────────────────────────────────────────────────────────────────────────────
function drawBackground(horizY) {
  // Dark sky gradient above — subtle, almost black
  const sky = ctx.createLinearGradient(0, 0, 0, horizY);
  sky.addColorStop(0,    '#010407');
  sky.addColorStop(0.65, '#010508');
  sky.addColorStop(1,    '#020810');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, horizY);

  // Deep water gradient below horizon
  const water = ctx.createLinearGradient(0, horizY, 0, H);
  water.addColorStop(0,   '#030c1e');
  water.addColorStop(0.3, '#040e22');
  water.addColorStop(1,   '#050f24');
  ctx.fillStyle = water;
  ctx.fillRect(0, horizY, W, H - horizY);
}

// ─────────────────────────────────────────────────────────────────────────────
// HORIZON FOG / HAZE
// ─────────────────────────────────────────────────────────────────────────────
function drawHorizonFog(horizY) {
  // Atmospheric haze band centred on the horizon line
  const fogH   = H * 0.14;
  const fogTop = horizY - fogH * 0.35;
  const fog    = ctx.createLinearGradient(0, fogTop, 0, fogTop + fogH);
  fog.addColorStop(0,    'rgba(2,8,18,0)');
  fog.addColorStop(0.30, 'rgba(3,10,22,0.52)');
  fog.addColorStop(0.55, 'rgba(4,12,24,0.48)');
  fog.addColorStop(1,    'rgba(3,10,20,0)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, fogTop, W, fogH);

  // Faint luminous line right at the horizon (distant-light reflection)
  const glow = ctx.createLinearGradient(0, horizY - 2, 0, horizY + 4);
  glow.addColorStop(0, 'rgba(15,40,70,0)');
  glow.addColorStop(0.4, 'rgba(15,40,70,0.18)');
  glow.addColorStop(1,   'rgba(15,40,70,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(W * 0.1, horizY - 2, W * 0.8, 6);
}

// ─────────────────────────────────────────────────────────────────────────────
// VIGNETTE
// ─────────────────────────────────────────────────────────────────────────────
function drawVignette() {
  // Radial darkening at edges — keeps focus on the centre-depth
  const vig = ctx.createRadialGradient(W / 2, H * 0.62, H * 0.18, W / 2, H * 0.62, H * 0.92);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.48)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function frame(ms) {
  const t      = ms / 1000;
  const horizY = H * HORIZ_F;
  const waterH = H - horizY;

  // Slow global forward drift — gives unified ocean movement feeling over time.
  // All rows share this phase advancement so the surface feels like one body of water.
  const drift = t * 0.18;

  // Subtle camera sway: the whole surface gently shifts side-to-side over time.
  // Near rows are shifted more than far rows (parallax) for extra depth.
  const swayAmt = W * 0.018;
  const swayX   = Math.sin(t * 0.07) * swayAmt;

  drawBackground(horizY);
  drawMilkyWay(horizY);
  drawStars(horizY, t);

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Draw rows from horizon (i=0) to viewer (i=N_ROWS-1)
  for (let i = 0; i < N_ROWS; i++) {
    // tLin : linear depth, 0 = horizon, 1 = viewer
    const tLin = i / (N_ROWS - 1);

    // Row y-position: exponential spacing compresses many rows near the horizon,
    // creating the illusion of great depth receding into the screen.
    // rowY = horizonY + waterHeight × tLin^ROW_EXP
    const rowY = horizY + waterH * Math.pow(tLin, ROW_EXP);

    // All rows span full width — perspective is conveyed through spacing,
    // amplitude, colour and stroke weight rather than trapezoid width.
    const halfW = W / 2;

    // Parallax sway: near rows (tLin→1) sway more; far rows barely move.
    const rowCenterX = W / 2 + swayX * tLin * tLin;
    // Shift the row's world-x origin so waves stay phase-consistent with sway.
    // We pass a wx offset into the wave function instead of moving the path centre.
    const wxOffset = -swayX * tLin * tLin;

    // Draw. The wave function uses (sx + wxOffset) as the world-x coordinate,
    // so waves scroll naturally with the sway without phase discontinuities.
    drawRowWithOffset(ROWS[i], rowY, tLin, halfW, rowCenterX, wxOffset, t, drift);
  }
  ctx.restore();

  drawHorizonFog(horizY);
  drawVignette();

  requestAnimationFrame(frame);
}

// Version of drawRow that accepts a centre-x and world-x offset for sway.
function drawRowWithOffset(row, rowY, depth, halfW, centreX, wxOff, t, drift) {
  if (halfW < 1.5) return;

  const x0 = centreX - halfW;
  const x1 = centreX + halfW;
  const stk = STK_MIN + (STK_MAX - STK_MIN) * depth;

  const pts = [];
  for (let px = x0; px <= x1 + STEP_PX; px += STEP_PX) {
    const sx = Math.min(px, x1);
    pts.push(sx, rowY + waveY(row, sx + wxOff, depth, t, drift));
  }
  if (pts.length < 4) return;

  const [br, bg, bb] = baseRGB(depth);

  // Main stroke
  ctx.beginPath();
  ctx.moveTo(pts[0], pts[1]);
  for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]);
  ctx.strokeStyle = `rgb(${br},${bg},${bb})`;
  ctx.lineWidth   = stk;
  ctx.stroke();

  // Crest highlight
  if (depth > 0.18) {
    const ha = ((depth - 0.18) / 0.82) ** 1.4;
    const [cr, cg, cb] = crestRGB(depth);
    const off = stk * 0.65;
    ctx.beginPath();
    ctx.moveTo(pts[0], pts[1] - off);
    for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1] - off);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(ha * 0.38).toFixed(3)})`;
    ctx.lineWidth   = stk * 0.45;
    ctx.stroke();
  }

  // Specular shimmer
  if (depth > 0.45) {
    const sa = ((depth - 0.45) / 0.55) ** 1.6;
    const [sr, sg, sb] = shimmerRGB(depth);
    ctx.fillStyle = `rgba(${sr},${sg},${sb},${(sa * 0.75).toFixed(3)})`;
    for (let i = 2; i < pts.length - 2; i += 2) {
      if (pts[i + 1] < pts[i - 1] && pts[i + 1] < pts[i + 3]) {
        const sz = (1 + depth * 3.5) * sa;
        ctx.fillRect(pts[i] - sz * 0.5, pts[i + 1] - sz * 0.5, sz, sz);
      }
    }
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
