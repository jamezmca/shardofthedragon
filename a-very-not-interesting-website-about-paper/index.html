<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Very Not Interesting Website About Paper</title>
  <meta name="description" content="The ISO 216 paper system, explored one halving at a time — from the Planck length to the observable universe.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bar-h: 44px;
    }

    body {
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
      background: #fff;
      color: #111;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── paper: always portrait, √2 ratio, as large as stage allows ── */
    #paper {
      position: relative;
      border: 1px solid #111;
      /* size: fit within stage keeping 1:√2 ratio */
      aspect-ratio: 1 / 1.4142;
      width: min(
        calc((100vh - var(--bar-h) - 24px) / 1.4142),
        calc(100vw - 24px)
      );
      will-change: transform;
    }

    /* ghost lines: left and right borders extend upward off-screen,
       implying the other half of the parent sheet is above */
    #paper.has-parent::before,
    #paper.has-parent::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 80px;
      background: #bbb;
      bottom: 100%;
    }
    #paper.has-parent::before { left: -1px; }
    #paper.has-parent::after  { right: -1px; }

    /* ── divider: horizontal line at 50% height ── */
    #divider {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: #111;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease;
    }
    #divider.show { opacity: 1; }

    /* ── paper content (opacity controlled separately from the frame) ── */
    #paper-content {
      padding: 32px 36px;
      height: 100%;
      overflow: hidden;
    }

    #paper-content h1 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #paper-content .dims {
      font-family: monospace;
      font-size: 0.75rem;
      color: #777;
      margin-bottom: 16px;
    }

    #paper-content .body-text p {
      margin-bottom: 10px;
      max-width: 52ch;
    }
    #paper-content .body-text p:last-child { margin-bottom: 0; }

    #paper-content .math {
      font-family: monospace;
      font-size: 0.8em;
      background: #f7f7f7;
      padding: 10px 14px;
      margin: 12px 0;
      border-left: 2px solid #ddd;
      white-space: pre-wrap;
    }

    /* ── bottom bar ── */
    #bottom-bar {
      height: var(--bar-h);
      border-top: 1px solid #111;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 46px;
      height: 34px;
      border: 1.5px solid #333;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      box-shadow: 0 3px 0 #aaa, 0 4px 5px rgba(0,0,0,0.12);
      transition: box-shadow 0.07s, transform 0.07s;
      user-select: none;
      flex-shrink: 0;
      color: #111;
    }
    .nav-btn:active, .nav-btn.pressed {
      box-shadow: 0 1px 0 #aaa, 0 1px 3px rgba(0,0,0,0.12);
      transform: translateY(2px);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #scale-track {
      flex: 1;
      height: 1px;
      background: #ccc;
      position: relative;
    }
    #scale-thumb {
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #111;
      transform: translate(-50%, -50%);
      transition: left 0.25s ease;
    }
    #scale-thumb-label {
      position: absolute;
      bottom: 7px;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: #888;
      white-space: nowrap;
      font-family: monospace;
      transition: left 0.25s ease;
      pointer-events: none;
    }
    #scale-end-l, #scale-end-r {
      font-size: 0.6rem;
      color: #aaa;
      font-family: monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="stage">
  <div id="paper">
    <div id="divider"></div>
    <div id="paper-content">
      <h1 id="paper-title"></h1>
      <div class="dims" id="paper-dims"></div>
      <div class="body-text" id="paper-body"></div>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <button class="nav-btn" id="btn-left"  aria-label="Larger">&#8592;</button>
  <button class="nav-btn" id="btn-right" aria-label="Smaller">&#8594;</button>
  <span id="scale-end-l">universe</span>
  <div id="scale-track">
    <div id="scale-thumb"></div>
    <span id="scale-thumb-label"></span>
  </div>
  <span id="scale-end-r">planck</span>
</div>

<script src="data.js"></script>
<script>
  const MIN_N = -80;
  const MAX_N = 83;
  const STEP  = 300; // ms per animation phase
  const S     = Math.SQRT2; // zoom scale factor

  let current   = 0;
  let animating = false;

  const paper   = document.getElementById('paper');
  const content = document.getElementById('paper-content');
  const divider = document.getElementById('divider');
  const titleEl = document.getElementById('paper-title');
  const dimsEl  = document.getElementById('paper-dims');
  const bodyEl  = document.getElementById('paper-body');
  const btnL    = document.getElementById('btn-left');
  const btnR    = document.getElementById('btn-right');
  const thumb   = document.getElementById('scale-thumb');
  const thumbLb = document.getElementById('scale-thumb-label');

  const A0_BODY = `
<p>A0 is the foundation of the ISO 216 paper standard. Its area is defined as exactly <strong>1 square metre</strong>.</p>
<p>The system rests on one constraint: fold any sheet in half along its long side and the result must have the same proportions as the original. This lets you halve endlessly without the shape ever changing.</p>
<p>If a sheet has width <em>w</em> and height <em>h</em> (h &gt; w), the half-sheet is w × h/2. For the ratio to be preserved:</p>
<div class="math">h/w = w/(h/2)  →  h² = 2w²  →  h/w = √2 ≈ 1.4142</div>
<p>Combined with area = 1 m²:</p>
<div class="math">w × h = 1,  h = w√2
→  w = 2^(−1/4) ≈ 841 mm
→  h = 2^(+1/4) ≈ 1189 mm</div>
<p>For any size A<em>n</em>:</p>
<div class="math">width  = 2^(−(2n+1)/4) m
height = 2^(−(2n−1)/4) m
area   = 2^(−n) m²</div>
<p>A4 has area 2⁻⁴ = 1/16 m² → 210 × 297 mm. Ratio: 297/210 ≈ 1.414. The same as A0.</p>
<p>Use ← → to travel through the scale — left to go larger, right to go smaller.</p>`;

  // ── content ──────────────────────────────────────────────────────────
  function setContent(n) {
    if (n === 0) {
      titleEl.textContent = 'A0';
      dimsEl.textContent  = '841 × 1189 mm  ·  area = 1 m²';
      bodyEl.innerHTML    = A0_BODY;
      paper.className     = '';
    } else {
      const { w, h, area } = getDimensions(n);
      const { label, fact } = getFact(n);
      titleEl.textContent = label;
      dimsEl.textContent  = `${formatDim(w)} × ${formatDim(h)}  ·  area = ${formatArea(area)}`;
      bodyEl.innerHTML    = `<p>${fact}</p>`;
      paper.className     = 'has-parent';
    }
  }

  function updateBar(n) {
    const pct = ((n - MIN_N) / (MAX_N - MIN_N) * 100).toFixed(2) + '%';
    thumb.style.left    = pct;
    thumbLb.style.left  = pct;
    thumbLb.textContent = getFact(n).label;
    btnL.disabled = n <= MIN_N;
    btnR.disabled = n >= MAX_N;
  }

  // ── animation ────────────────────────────────────────────────────────
  // Going right (zoom in, dir=+1):
  //   transform-origin: 50% 75%  (center of bottom half)
  //   phase 1: translateY(-25%)              → re-center on bottom half
  //   phase 2: translateY(-25%) scale(√2)    → zoom in so half fills frame
  //   phase 3: translateY(-25%) scale(√2) rotate(-90deg)  → rotate to portrait
  //
  // Going left (zoom out, dir=-1):
  //   transform-origin: 50% 50%
  //   phase 1: rotate(90deg)                          → tilt back to landscape half
  //   phase 2: rotate(90deg) scale(1/√2)              → shrink to half size
  //   phase 3: rotate(90deg) scale(1/√2) translateY(25%)  → settle into bottom-half position
  //
  // In both cases: content is hidden before the animation starts
  // and faded back in only after the snap + content update.

  function navigate(dir) {
    if (animating) return;
    const next = current + dir;
    if (next < MIN_N || next > MAX_N) return;
    animating = true;

    // Build the three progressive transform strings
    let t1, t2, t3, origin;
    if (dir === 1) {
      origin = '50% 75%';
      t1 = `translateY(-25%)`;
      t2 = `translateY(-25%) scale(${S})`;
      t3 = `translateY(-25%) scale(${S}) rotate(-90deg)`;
    } else {
      origin = '50% 50%';
      t1 = `rotate(90deg)`;
      t2 = `rotate(90deg) scale(${1 / S})`;
      t3 = `rotate(90deg) scale(${1 / S}) translateY(25%)`;
    }

    const tr = (ms) => `transform ${ms}ms ease-in-out`;

    // ── Phase 0: hide content, show divider ──
    content.style.transition = 'opacity 150ms';
    content.style.opacity    = '0';
    divider.classList.add('show');

    paper.style.transformOrigin = origin;

    // ── Phase 1: translate ──
    setTimeout(() => {
      paper.style.transition = tr(STEP);
      paper.style.transform  = t1;
    }, 200);

    // ── Phase 2: scale ──
    setTimeout(() => {
      paper.style.transition = tr(STEP);
      paper.style.transform  = t2;
    }, 200 + STEP);

    // ── Phase 3: rotate ──
    setTimeout(() => {
      paper.style.transition = tr(STEP);
      paper.style.transform  = t3;
    }, 200 + STEP * 2);

    // ── Snap: update content, reset transform, fade content in ──
    setTimeout(() => {
      current = next;

      paper.style.transition      = 'none';
      paper.style.transform       = 'none';
      paper.style.transformOrigin = '50% 50%';

      divider.classList.remove('show');

      setContent(current);
      updateBar(current);

      // Two rAFs to ensure the browser has committed the snap before transitioning
      requestAnimationFrame(() => requestAnimationFrame(() => {
        content.style.transition = 'opacity 220ms ease';
        content.style.opacity    = '1';
        setTimeout(() => { animating = false; }, 250);
      }));
    }, 200 + STEP * 3 + 40);
  }

  // ── buttons + keyboard ───────────────────────────────────────────────
  function pressBtn(btn, dir) {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 140);
    navigate(dir);
  }

  btnL.addEventListener('click',  () => pressBtn(btnL, -1));
  btnR.addEventListener('click',  () => pressBtn(btnR, +1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { pressBtn(btnL, -1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { pressBtn(btnR, +1); e.preventDefault(); }
  });

  // ── init ─────────────────────────────────────────────────────────────
  setContent(0);
  updateBar(0);
</script>
</body>
</html>
