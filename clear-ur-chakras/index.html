<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Ur Chakras</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #ff4444;
      --c2: #ff8800;
      --c3: #ffcc00;
      --c4: #44cc88;
      --c5: #44aaff;
      --c6: #cc44ff;
      --c7: #ffaaff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #08000f;
      color: #e8e0ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      line-height: 1.8;
      /* subtle pixel grid */
      background-image: radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 8px 8px;
    }

    /* CRT scanlines overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Screens ───────────────────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s steps(5);
      overflow-y: auto;
      padding: 1.5rem;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* NES-style pixel border box */
    .px-box {
      border: 4px solid rgba(255,255,255,0.8);
      position: relative;
      background: rgba(4,0,12,0.92);
    }
    .px-box::before {
      content: '';
      position: absolute; inset: 3px;
      border: 2px solid rgba(255,255,255,0.07);
      pointer-events: none;
    }

    /* ── HOME ──────────────────────────────────────────────────── */
    #home { gap: 2rem; }

    .home-title {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: #fff;
      text-align: center;
      line-height: 1.6;
      text-shadow: 0 0 12px rgba(200,140,255,0.9), 0 0 36px rgba(200,140,255,0.4);
      letter-spacing: 0.05em;
    }
    .home-by {
      text-align: center;
      font-size: 0.625rem;
      color: rgba(200,180,255,0.35);
      letter-spacing: 0.15em;
      margin-top: 0.6rem;
    }

    /* spine */
    .spine-wrap {
      padding: 1rem 1.4rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }
    .chakra-row {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .gem-sm {
      width: 10px; height: 10px;
      transform: rotate(45deg);
      flex-shrink: 0;
      animation: gem-twinkle steps(2) 1.6s infinite;
    }
    @keyframes gem-twinkle {
      0%, 100% { opacity: 1;   }
      50%       { opacity: 0.4; }
    }
    .row-label {
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .row-sub {
      font-size: 0.55rem;
      opacity: 0.35;
      margin-left: 0.5em;
    }
    .spine-seg {
      width: 2px; height: 14px;
      margin-left: 4px;
      background: rgba(200,180,255,0.12);
      position: relative; overflow: hidden;
    }
    .spine-seg::after {
      content: '';
      position: absolute; top: -100%; left: 0; right: 0; height: 50%;
      background: rgba(200,180,255,0.65);
      animation: flow-up steps(3) 1s infinite;
    }
    @keyframes flow-up {
      from { transform: translateY(0%);   }
      to   { transform: translateY(300%); }
    }

    .home-cta {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
    }
    .home-question {
      font-size: 0.75rem;
      color: rgba(200,180,255,0.7);
      letter-spacing: 0.08em;
    }

    /* NES-style press button */
    .btn-nes {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.875rem;
      color: #08000f;
      background: #e8e0ff;
      border: none;
      padding: 0.85rem 1.8rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.9);
      transition: box-shadow 0.05s steps(1), transform 0.05s steps(1);
    }
    .btn-nes:hover  { box-shadow: 2px 2px 0 rgba(0,0,0,0.9); transform: translate(2px,2px); }
    .btn-nes:active { box-shadow: 0 0 0; transform: translate(4px,4px); }

    /* blinking cursor */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink::after { content:'█'; animation: blink steps(1) 0.9s infinite; }

    /* ── CHAKRA SCREENS ────────────────────────────────────────── */
    .chakra-screen {
      justify-content: flex-start;
      padding-top: 1.5rem;
      padding-bottom: 4rem;
    }
    .chakra-inner {
      width: 100%; max-width: 580px;
      display: flex; flex-direction: column; gap: 0.9rem;
    }

    /* progress */
    .prog-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.3rem;
    }
    .prog-gems { display: flex; gap: 7px; align-items: center; }
    .prog-gem {
      width: 8px; height: 8px;
      transform: rotate(45deg);
    }
    .prog-gem.done    { background: rgba(255,255,255,0.5); }
    .prog-gem.active  { background: #fff; box-shadow: 0 0 6px #fff, 0 0 12px #fff; }
    .prog-gem.pending { background: rgba(255,255,255,0.08); outline: 1px solid rgba(255,255,255,0.15); outline-offset: 0; }
    .prog-label { font-size: 0.5rem; opacity: 0.35; letter-spacing: 0.12em; }

    /* gem display */
    .gem-wrap {
      display: flex; justify-content: center; align-items: center;
      padding: 1.5rem 0 1rem;
      position: relative;
    }
    .gem-lg {
      width: 56px; height: 56px;
      transform: rotate(45deg);
      position: relative;
      animation: gem-glow steps(3) 1.6s infinite;
    }
    /* shine highlight */
    .gem-lg::before {
      content: '';
      position: absolute;
      top: 7px; left: 7px;
      width: 16px; height: 16px;
      background: rgba(255,255,255,0.3);
    }
    /* outer glow ring */
    .gem-lg::after {
      content: '';
      position: absolute; inset: -10px;
      background: inherit;
      opacity: 0.12;
      animation: gem-ring steps(2) 1.6s infinite;
    }
    @keyframes gem-glow {
      0%,100% { box-shadow: 0 0 0 4px #08000f, 0 0 16px currentColor, 0 0 36px currentColor; }
      50%      { box-shadow: 0 0 0 4px #08000f, 0 0 28px currentColor, 0 0 56px currentColor; }
    }
    @keyframes gem-ring {
      0%,100% { opacity:0.12; transform:scale(1);    }
      50%      { opacity:0.06; transform:scale(1.12); }
    }

    /* chakra title */
    .chakra-title-box { text-align: center; padding: 0.9rem 1rem; }
    .chakra-num {
      font-size: 0.5rem; opacity: 0.35; letter-spacing: 0.18em; margin-bottom: 0.55rem;
    }
    .chakra-name { font-size: clamp(0.75rem, 2.8vw, 1.05rem); line-height: 1.4; }
    .chakra-sanskrit { font-size: 0.48rem; opacity: 0.35; margin-top: 0.45rem; letter-spacing: 0.14em; }

    /* stat row */
    .stat-row { display: flex; gap: 0.6rem; }
    .stat-cell { flex: 1; padding: 0.6rem 0.5rem; text-align: center; }
    .stat-key {
      font-size: 0.42rem; opacity: 0.32; letter-spacing: 0.14em;
      display: block; margin-bottom: 0.45rem; text-transform: uppercase;
    }
    .stat-val { font-size: 0.625rem; line-height: 1.5; }

    /* dialogue boxes */
    .dlg { padding: 0.9rem 1rem; }
    .dlg-label {
      font-size: 0.42rem; opacity: 0.32; letter-spacing: 0.16em;
      display: block; margin-bottom: 0.55rem; text-transform: uppercase;
    }
    .dlg-text { font-size: 0.625rem; line-height: 2.2; opacity: 0.85; }

    .blocked-name { font-size: 0.75rem; letter-spacing: 0.05em; }
    .blocked-desc { font-size: 0.625rem; opacity: 0.55; margin-top: 0.4rem; line-height: 2; }

    .step-item { display: flex; gap: 0.65rem; margin-bottom: 0.85rem; }
    .step-item:last-child { margin-bottom: 0; }
    .step-n { font-size: 0.5rem; opacity: 0.28; flex-shrink: 0; margin-top: 0.25rem; }
    .step-text { font-size: 0.625rem; line-height: 2.2; opacity: 0.82; }

    /* continue */
    .continue-row { display: flex; justify-content: flex-end; padding-top: 0.4rem; }
    .btn-continue {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.62rem; letter-spacing: 0.05em;
      color: #08000f;
      border: none; padding: 0.75rem 1.5rem; cursor: pointer;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.85);
      transition: box-shadow 0.05s steps(1), transform 0.05s steps(1);
    }
    .btn-continue:hover  { box-shadow: 2px 2px 0 rgba(0,0,0,0.85); transform: translate(2px,2px); }
    .btn-continue:active { box-shadow: 0 0; transform: translate(4px,4px); }

    /* ── END ───────────────────────────────────────────────────── */
    #end { gap: 2rem; text-align: center; }

    .end-gems {
      display: flex; gap: 8px;
      justify-content: center; align-items: flex-end;
    }
    .end-gem {
      transform: rotate(45deg);
      animation: end-pulse steps(3) 1.4s infinite;
    }
    .end-gem:nth-child(1){width:14px;height:14px;background:var(--c1);animation-delay:0s}
    .end-gem:nth-child(2){width:18px;height:18px;background:var(--c2);animation-delay:.15s}
    .end-gem:nth-child(3){width:16px;height:16px;background:var(--c3);animation-delay:.3s}
    .end-gem:nth-child(4){width:22px;height:22px;background:var(--c4);animation-delay:.45s}
    .end-gem:nth-child(5){width:18px;height:18px;background:var(--c5);animation-delay:.6s}
    .end-gem:nth-child(6){width:20px;height:20px;background:var(--c6);animation-delay:.75s}
    .end-gem:nth-child(7){width:26px;height:26px;background:var(--c7);animation-delay:.9s}
    @keyframes end-pulse {
      0%,100%{box-shadow:0 0 8px currentColor,0 0 18px currentColor}
      50%    {box-shadow:0 0 18px currentColor,0 0 40px currentColor}
    }

    .end-title {
      font-size: clamp(0.85rem, 3vw, 1.25rem);
      color: #fff; line-height: 1.6;
      text-shadow: 0 0 14px rgba(200,140,255,0.9), 0 0 40px rgba(200,140,255,0.4);
    }
    .end-body {
      font-size: 0.55rem; line-height: 2.4;
      opacity: 0.55; max-width: 380px;
    }
    .end-hint {
      font-size: 0.45rem; opacity: 0.22; letter-spacing: 0.1em; margin-top: -0.8rem;
    }
  </style>
</head>
<body>

<!-- ── HOME ─────────────────────────────────────────────────── -->
<div id="home" class="screen active">
  <div>
    <h1 class="home-title">CLEAR UR<br>CHAKRAS</h1>
    <p class="home-by">WITH GURU PATHIK</p>
  </div>

  <div class="px-box spine-wrap" id="spine"></div>

  <div class="home-cta">
    <p class="home-question blink">ARE YOU READY</p>
    <button class="btn-nes" onclick="startJourney()">► I AM READY</button>
  </div>
</div>

<!-- ── CHAKRA SCREENS — built by JS ─────────────────────────── -->

<!-- ── END ──────────────────────────────────────────────────── -->
<div id="end" class="screen">
  <div class="end-gems">
    <div class="end-gem"></div><div class="end-gem"></div>
    <div class="end-gem"></div><div class="end-gem"></div>
    <div class="end-gem"></div><div class="end-gem"></div>
    <div class="end-gem"></div>
  </div>
  <h2 class="end-title">CHAKRAS<br>CLEARED!</h2>
  <p class="end-body">
    THE STREAM FLOWS FREE.<br>
    YOU ARE CONNECTED<br>
    TO ALL THINGS.
  </p>
  <button class="btn-nes" onclick="resetJourney()">► REVISIT</button>
  <p class="end-hint">RETURN WHEN THE STREAM GROWS STILL</p>
</div>

<script>
const CHAKRAS = [
  {
    name:       'EARTH CHAKRA',
    sanskrit:   'MULADHARA',
    element:    'EARTH',
    location:   'BASE OF SPINE',
    color:      '#ff4444',
    blockedBy:  'FEAR',
    blockedDesc:'Fear makes you rigid and defensive, cutting you off from your sense of safety in the world.',
    governs:    'Survival, security, and your relationship with the physical world.',
    steps: [
      'Sit quietly. Notice the fears you carry — large and small.',
      'Visualize each fear as a boulder resting in a pool at your spine\'s base.',
      'With each exhale, feel a great current loosening each boulder.',
      'Watch the water carry every fear downstream until the pool runs clear.',
      'Feel the solid earth beneath you. You are safe. You are grounded.',
    ],
  },
  {
    name:       'WATER CHAKRA',
    sanskrit:   'SVADHISTHANA',
    element:    'WATER',
    location:   'THE SACRUM',
    color:      '#ff8800',
    blockedBy:  'GUILT',
    blockedDesc:'Guilt poisons the water. It tells you that you do not deserve joy.',
    governs:    'Pleasure, creativity, and the free flow of feeling.',
    steps: [
      'Let the things you feel guilty about rise to the surface.',
      'Look at each one. Does holding this guilt serve you?',
      'Recognize that guilt only blocks the flow of love and pleasure.',
      'Forgive yourself — you are still here, and that matters.',
      'Feel the guilt dissolve like salt in the river. Let it flow.',
    ],
  },
  {
    name:       'FIRE CHAKRA',
    sanskrit:   'MANIPURA',
    element:    'FIRE',
    location:   'THE STOMACH',
    color:      '#ffcc00',
    blockedBy:  'SHAME',
    blockedDesc:'Shame dims the flame. It whispers that you are not enough.',
    governs:    'Willpower, ego, and personal strength.',
    steps: [
      'Think of the things you are ashamed of. Let them be present.',
      'Notice how shame makes you small. It is a story, not a sentence.',
      'Offer yourself the compassion you would give someone you love.',
      'Let every disappointment be consumed by fire — turned to warmth.',
      'Feel the flame steady and bright in your core. You are enough.',
    ],
  },
  {
    name:       'AIR CHAKRA',
    sanskrit:   'ANAHATA',
    element:    'AIR',
    location:   'THE HEART',
    color:      '#44cc88',
    blockedBy:  'GRIEF',
    blockedDesc:'Grief seals the heart. It is love with nowhere left to go.',
    governs:    'Love — for others, yourself, and all living things.',
    steps: [
      'Open yourself to grief. Do not turn from it.',
      'Know that love is energy. It cannot be destroyed, only transformed.',
      'When someone leaves, the love remains. It does not end with them.',
      'Let grief move through you like wind through leaves — and pass.',
      'Feel your heart open again, because of all you have loved.',
    ],
  },
  {
    name:       'SOUND CHAKRA',
    sanskrit:   'VISHUDDHA',
    element:    'SOUND',
    location:   'THE THROAT',
    color:      '#44aaff',
    blockedBy:  'LIES',
    blockedDesc:'The lies we tell ourselves tighten around the throat, silencing truth.',
    governs:    'Truth, communication, and authentic expression.',
    steps: [
      'Sit with the stories you tell yourself. Which are true?',
      'Think of the things you have left unsaid. What holds you back?',
      'In the privacy of your mind, say them clearly and without apology.',
      'Feel the vibration of honesty. Notice how the throat loosens.',
      'Commit to one small act of honest expression today.',
    ],
  },
  {
    name:       'LIGHT CHAKRA',
    sanskrit:   'AJNA',
    element:    'LIGHT',
    location:   'THE FOREHEAD',
    color:      '#cc44ff',
    blockedBy:  'ILLUSION',
    blockedDesc:'The illusion that we are separate — from each other, from the cosmos.',
    governs:    'Insight, intuition, and perception beyond the ordinary.',
    steps: [
      'Notice the lines you draw between yourself and others.',
      'Look at something living near you. It breathes the same air.',
      'Expand your awareness — to your city, your planet, your galaxy.',
      'You are the universe observing itself through temporary eyes.',
      'Let the boundary between you and everything softly dissolve.',
    ],
  },
  {
    name:       'THOUGHT CHAKRA',
    sanskrit:   'SAHASRARA',
    element:    'THOUGHT',
    location:   'THE CROWN',
    color:      '#ffaaff',
    blockedBy:  'ATTACHMENT',
    blockedDesc:'Earthly attachment anchors us so firmly the cosmic current cannot flow.',
    governs:    'Pure cosmic energy, enlightenment, and unity with all.',
    steps: [
      'This is the hardest chakra. Breathe. Do not rush.',
      'Meditate on what you are most attached to. Hold it gently.',
      'Know that loving and clinging are different. Love flows. Attachment grasps.',
      'Offer each attachment to the stream — not as loss, but as trust.',
      'Surrender, just this moment, to the current. You are the universe.',
    ],
  },
];

/* ── build home spine ── */
(function() {
  const wrap = document.getElementById('spine');
  [...CHAKRAS].reverse().forEach((ch, i) => {
    const row = document.createElement('div');
    row.className = 'chakra-row';
    row.innerHTML = `
      <div class="gem-sm" style="background:${ch.color};color:${ch.color};box-shadow:0 0 7px ${ch.color};animation-delay:${i*0.22}s"></div>
      <span class="row-label" style="color:${ch.color}">${ch.name}<span class="row-sub">${ch.sanskrit}</span></span>
    `;
    wrap.appendChild(row);
    if (i < CHAKRAS.length - 1) {
      const seg = document.createElement('div');
      seg.className = 'spine-seg';
      seg.style.animationDelay = `${i * 0.15}s`;
      wrap.appendChild(seg);
    }
  });
})();

/* ── build chakra screens ── */
CHAKRAS.forEach((ch, idx) => {
  const n = idx + 1;
  const screen = document.createElement('div');
  screen.id = `chakra-${n}`;
  screen.className = 'screen chakra-screen';

  const progGems = CHAKRAS.map((c, di) => {
    if (di < idx)       return `<div class="prog-gem done"></div>`;
    if (di === idx)     return `<div class="prog-gem active" style="background:${c.color};box-shadow:0 0 8px ${c.color},0 0 16px ${c.color}"></div>`;
    return `<div class="prog-gem pending"></div>`;
  }).join('');

  const steps = ch.steps.map((s, si) =>
    `<div class="step-item">
       <span class="step-n">${si+1}.</span>
       <span class="step-text">${s}</span>
     </div>`
  ).join('');

  screen.innerHTML = `
    <div class="chakra-inner">

      <div class="prog-row">
        <div class="prog-gems">${progGems}</div>
        <span class="prog-label">CHAKRA ${n} / 7</span>
      </div>

      <div class="gem-wrap">
        <div class="gem-lg" style="background:${ch.color};color:${ch.color}"></div>
      </div>

      <div class="px-box chakra-title-box" style="border-color:${ch.color}99">
        <p class="chakra-num">CHAKRA ${n} &nbsp;·&nbsp; ${ch.element}</p>
        <h2 class="chakra-name" style="color:${ch.color}">${ch.name}</h2>
        <p class="chakra-sanskrit">${ch.sanskrit}</p>
      </div>

      <div class="stat-row">
        <div class="stat-cell px-box" style="border-color:rgba(255,255,255,0.12)">
          <span class="stat-key">Element</span>
          <span class="stat-val">${ch.element}</span>
        </div>
        <div class="stat-cell px-box" style="border-color:rgba(255,255,255,0.12)">
          <span class="stat-key">Located at</span>
          <span class="stat-val">${ch.location}</span>
        </div>
      </div>

      <div class="px-box dlg" style="border-color:rgba(255,255,255,0.14)">
        <span class="dlg-label">Governs</span>
        <p class="dlg-text">${ch.governs}</p>
      </div>

      <div class="px-box dlg" style="border-color:${ch.color}66">
        <span class="dlg-label">Blocked by</span>
        <p class="blocked-name" style="color:${ch.color}">${ch.blockedBy}</p>
        <p class="blocked-desc">${ch.blockedDesc}</p>
      </div>

      <div class="px-box dlg" style="border-color:rgba(255,255,255,0.14)">
        <span class="dlg-label">To unblock</span>
        ${steps}
      </div>

      <div class="continue-row">
        <button class="btn-continue"
          style="background:${ch.color}"
          onclick="nextChakra(${n})">
          ${n < 7 ? '► CONTINUE' : '► COMPLETE'}
        </button>
      </div>

    </div>
  `;
  document.body.appendChild(screen);
});

/* ── nav ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop = 0;
}
function startJourney() { showScreen('chakra-1'); }
function nextChakra(n)  { showScreen(n < 7 ? `chakra-${n+1}` : 'end'); }
function resetJourney()  { showScreen('home'); }
</script>
</body>
</html>
