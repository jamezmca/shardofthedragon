<body>

<div id="home">
  <h2>Basic Algebra</h2>
  <ul id="topic-list">
  </ul>
</div>

<div id="qpage">
  <div id="top-bar">
    <span id="top-left">&larr; change subject</span>
    <span id="top-right">0</span>
  </div>
  <div id="question-wrap"></div>
  <input id="answer-input" type="text"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    placeholder="your answer">

    <button id="btn-action" onclick="submitAnswer()" style="font-size:1em;padding:8px 24px;font-family:inherit;cursor:pointer;">Submit</button>
  </div>
</div>

<script>
// ŌöĆŌöĆ Utilities ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }

// Normalise an answer string for comparison: strip spaces, lowercase, unify operators
function norm(s) {
  return String(s)
    .replace(/\s+/g, '')
    .toLowerCase()
    .replace(/\*\*/g, '^')
    .replace(/[├Ś┬Ę]/g, '')
    .replace(/\*/g, '')
    .replace(/├Ę/g, '/');
}

// Render a question string: replaces \( ... \) spans with KaTeX HTML, rest is plain text
function renderQ(str) {
  return str.replace(/\\\((.+?)\\\)/g, (_, math) =>
    katex.renderToString(math, { throwOnError: false })
  );
}

// Render an answer string as inline KaTeX
function renderA(str) {
  try { return katex.renderToString(str, { displayMode: false, throwOnError: false }); }
  catch(e) { return str; }
}

// ŌöĆŌöĆ Session state ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const KEYS = [
  'like-terms','mult-terms','single-bracket','double-bracket',
  'factorise-hcf','factorise-quad','solve-eq','substitution','rearrange',
  'index-laws','alg-fractions','inequalities','complete-square','simultaneous'
];

const TOPIC_LABELS = {
  'like-terms':      '1. Collecting Like Terms',
  'mult-terms':      '2. Multiplying & Dividing Terms',
  'single-bracket':  '3. Expanding Single Brackets',
  'double-bracket':  '4. Expanding Double Brackets',
  'factorise-hcf':   '5. Factorising (HCF)',
  'factorise-quad':  '6. Factorising Quadratics',
  'solve-eq':        '7. Solving Equations',
  'substitution':    '8. Substitution into Formulas',
  'rearrange':       '9. Rearranging Formulas',
  'index-laws':      '10. Index Laws',
  'alg-fractions':   '11. Algebraic Fractions',
  'inequalities':    '12. Inequalities',
  'complete-square': '13. Completing the Square',
  'simultaneous':    '14. Simultaneous Equations',
};

// Per-topic correct counts at each level + total completed (shared between dedicated + mix sessions)
const stats = {};
KEYS.forEach(k => { stats[k] = { c1: 0, c2: 0, c3: 0, total: 0 }; });

function saveStats() {
  localStorage.setItem('algebra-stats', JSON.stringify(stats));
}

function loadStats() {
  try {
    const saved = JSON.parse(localStorage.getItem('algebra-stats'));
    if (!saved) return;
    KEYS.forEach(k => {
      if (saved[k]) {
        stats[k].c1    = saved[k].c1    || 0;
        stats[k].c2    = saved[k].c2    || 0;
        stats[k].c3    = saved[k].c3    || 0;
        stats[k].total = saved[k].total || 0;
      }
    });
  } catch(e) {}
}

function renderTopicList() {
  const ul = document.getElementById('topic-list');
  let html = '';
  KEYS.forEach(k => {
    const t = stats[k].total;
    const count = t ? ` [${t}]` : '';
    html += `<li><a data-topic="${k}">${TOPIC_LABELS[k]}${count}</a></li>`;
  });
  html += '<hr class="sep">';
  const mixTotal = KEYS.reduce((sum, k) => sum + stats[k].total, 0);
  const mixCount = mixTotal ? ` [${mixTotal}]` : '';
  html += `<li><a data-topic="mix">Mix of All Topics${mixCount}</a></li>`;
  ul.innerHTML = html;
}

loadStats();
renderTopicList();

let totalAnswered = 0;
let currentTopic  = null;  // topic key or 'mix'
let currentQ      = null;  // { qText, aLatex, check, topicKey, level }
let attempts      = 0;
let waitingForNext = false;

// ŌöĆŌöĆ Difficulty selector ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function pickLevel(key) {
  const s = stats[key];
  if (s.c1 < 7) return 1;
  if (s.c2 < 7) return Math.random() < 0.5 ? 1 : 2;
  // Ōēź20 correct at L2: 5:5:10 ratio = 25% / 25% / 50%
  const r = Math.random();
  return r < 0.25 ? 1 : r < 0.5 ? 2 : 3;
}

// ŌöĆŌöĆ Question generators ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
// Each returns { qText (uses \(...\) for math), aLatex (answer in LaTeX), check(inp)ŌåÆbool }

// 1. Collecting Like Terms
function genLikeTerms(level) {
  const v = pick(['x','y','a','n']);
  if (level === 1) {
    // ax + bx
    const a = rnd(2,9), b = rnd(2,9), s = a + b;
    return {
      qText: `Simplify \\(${a}${v} + ${b}${v}\\)`,
      aLatex: `${s}${v}`,
      check: inp => norm(inp) === norm(`${s}${v}`)
    };
  }
  if (level === 2) {
    // merged: two variables with subtraction and a constant
    const w = v === 'x' ? 'y' : 'x';
    const a = rnd(5,9), c = rnd(2, a - 1), b = rnd(2,7), k = rnd(1,9), s = a - c;
    const a1 = `${s}${v}+${b}${w}+${k}`, a2 = `${b}${w}+${s}${v}+${k}`;
    return {
      qText: `Simplify \\(${a}${v} + ${b}${w} - ${c}${v} + ${k}\\)`,
      aLatex: `${s}${v} + ${b}${w} + ${k}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // level 3: multi-letter terms (xy) or mixed powers (ax┬▓ + bx - cx┬▓)
  if (Math.random() < 0.5) {
    const w = v === 'x' ? 'y' : 'x';
    const a = rnd(2,5), b = rnd(2,6), c = rnd(2,6), s = b + c;
    const a1 = `${a}${v}^2${w}+${s}${v}${w}`, a2 = `${s}${v}${w}+${a}${v}^2${w}`;
    return {
      qText: `Simplify \\(${a}${v}^2${w} + ${b}${v}${w} + ${c}${v}${w}\\)`,
      aLatex: `${a}${v}^2${w} + ${s}${v}${w}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // mixed powers: ax┬▓ + bx - cx┬▓
  const a = rnd(5,9), c = rnd(2, a - 1), b = rnd(2,8), s = a - c;
  const aL3 = s === 1 ? `${v}^2 + ${b}${v}` : `${s}${v}^2 + ${b}${v}`;
  const chk3a = s === 1 ? `${v}^2+${b}${v}` : `${s}${v}^2+${b}${v}`;
  const chk3b = s === 1 ? `${b}${v}+${v}^2` : `${b}${v}+${s}${v}^2`;
  return {
    qText: `Simplify \\(${a}${v}^2 + ${b}${v} - ${c}${v}^2\\)`,
    aLatex: aL3,
    check: inp => norm(inp) === norm(chk3a) || norm(inp) === norm(chk3b)
  };
}

// 2. Multiplying Terms
function genMultTerms(level) {
  const v = pick(['x','y','a','n']);
  if (level === 1) {
    const a = rnd(2,8), b = rnd(2,8), p = a * b;
    return {
      qText: `Simplify \\(${a} \\times ${b}${v}\\)`,
      aLatex: `${p}${v}`,
      check: inp => norm(inp) === norm(`${p}${v}`)
    };
  }
  if (level === 2) {
    const w = v === 'x' ? 'y' : 'x';
    const a = rnd(2,7), b = rnd(2,7), p = a * b;
    const a1 = `${p}${v}${w}`, a2 = `${p}${w}${v}`;
    return {
      qText: `Simplify \\(${a}${v} \\times ${b}${w}\\)`,
      aLatex: `${p}${v}${w}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // level 3: ax^n ├Ś bx (same variable) or ax^n ├Ś bw (different variable)
  if (Math.random() < 0.5) {
    const a = rnd(2,5), b = rnd(2,5), p = a * b;
    return {
      qText: `Simplify \\(${a}${v}^2 \\times ${b}${v}\\)`,
      aLatex: `${p}${v}^3`,
      check: inp => norm(inp) === norm(`${p}${v}^3`)
    };
  }
  const w = v === 'x' ? 'y' : 'x';
  const a = rnd(2,5), b = rnd(2,5), p = a * b, n = rnd(2,3);
  const mt3a = `${p}${v}^${n}${w}`, mt3b = `${p}${w}${v}^${n}`;
  return {
    qText: `Simplify \\(${a}${v}^${n} \\times ${b}${w}\\)`,
    aLatex: `${p}${v}^{${n}}${w}`,
    check: inp => norm(inp) === norm(mt3a) || norm(inp) === norm(mt3b)
  };
}

// 3. Expanding Single Brackets
function genSingleBracket(level) {
  const v = pick(['x','y','a','n']);
  if (level === 1) {
    // a(v + b)
    const a = rnd(2,8), b = rnd(2,9), r1 = a, r2 = a * b;
    const ans = `${r1}${v}+${r2}`;
    return {
      qText: `Expand \\(${a}(${v} + ${b})\\)`,
      aLatex: `${r1}${v} + ${r2}`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  if (level === 2) {
    // a(bv + c)
    const a = rnd(2,6), b = rnd(2,5), c = rnd(2,8), r1 = a*b, r2 = a*c;
    const ans = `${r1}${v}+${r2}`;
    return {
      qText: `Expand \\(${a}(${b}${v} + ${c})\\)`,
      aLatex: `${r1}${v} + ${r2}`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  // level 3: two single brackets ŌĆö expand and simplify
  const a3 = rnd(2,4), b3 = rnd(2,4), c3 = rnd(2,8);
  const d3 = rnd(2,3), e3 = rnd(2,3), f3 = rnd(2,7);
  if (Math.random() < 0.5) {
    const r1 = a3*b3 - d3*e3, r2 = a3*c3 - d3*f3;
    if (r1 > 0) {
      const ans = `${r1}${v}${r2 >= 0 ? '+' : ''}${r2}`;
      const aL = r2 >= 0 ? `${r1}${v} + ${r2}` : `${r1}${v} - ${Math.abs(r2)}`;
      return {
        qText: `Expand and simplify \\(${a3}(${b3}${v} + ${c3}) - ${d3}(${e3}${v} + ${f3})\\)`,
        aLatex: aL,
        check: inp => norm(inp) === norm(ans)
      };
    }
  }
  const r1 = a3*b3 + d3*e3, r2 = a3*c3 + d3*f3;
  const ans = `${r1}${v}+${r2}`;
  return {
    qText: `Expand and simplify \\(${a3}(${b3}${v} + ${c3}) + ${d3}(${e3}${v} + ${f3})\\)`,
    aLatex: `${r1}${v} + ${r2}`,
    check: inp => norm(inp) === norm(ans)
  };
}

// 4. Expanding Double Brackets
function genDoubleBracket(level) {
  if (level === 1) {
    // (x+a)(x+b) all positive
    const a = rnd(1,8), b = rnd(1,8), mid = a+b, last = a*b;
    const ans = `x^2+${mid}x+${last}`;
    return {
      qText: `Expand \\((x + ${a})(x + ${b})\\)`,
      aLatex: `x^2 + ${mid}x + ${last}`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  if (level === 2) {
    // (x+a)(x-b), a > b so middle term is positive
    const a = rnd(3,8), b = rnd(1, a-1), mid = a-b, last = a*b;
    const aStr = mid === 0 ? `x^2-${last}` : `x^2+${mid}x-${last}`;
    const aLatex = mid === 0 ? `x^2 - ${last}` : `x^2 + ${mid}x - ${last}`;
    return {
      qText: `Expand \\((x + ${a})(x - ${b})\\)`,
      aLatex,
      check: inp => norm(inp) === norm(aStr)
    };
  }
  // level 3: (x-a)(x-b)
  const a = rnd(1,6), b = rnd(1,6), mid = a+b, last = a*b;
  const ans = `x^2-${mid}x+${last}`;
  return {
    qText: `Expand \\((x - ${a})(x - ${b})\\)`,
    aLatex: `x^2 - ${mid}x + ${last}`,
    check: inp => norm(inp) === norm(ans)
  };
}

// 5. Factorising (HCF)
function genFactoriseHCF(level) {
  const v = pick(['x','y','a','n']);
  if (level === 1) {
    const f = rnd(2,9);
    const coprimePairs = [[2,3],[2,5],[3,4],[3,5],[4,5],[2,7],[3,7],[5,6],[5,7],[4,7]];
    const [pb, pc] = pick(coprimePairs);
    const n1 = f * pb, n2 = f * pc;
    if (Math.random() < 0.5) {
      return {
        qText: `Find the HCF of \\(${n1}${v}\\) and \\(${n2}${v}\\)`,
        aLatex: `${f}${v}`,
        check: inp => norm(inp) === norm(`${f}${v}`)
      };
    }
    return {
      qText: `Find the HCF of \\(${n1}\\) and \\(${n2}\\)`,
      aLatex: `${f}`,
      check: inp => norm(inp) === norm(`${f}`)
    };
  }
  if (level === 2) {
    // Number factor only OR variable factor only
    if (Math.random() < 0.5) {
      const a = rnd(2,8), b = rnd(2,8), t2 = a*b;
      const ans = `${a}(${v}+${b})`;
      return {
        qText: `Factorise \\(${a}${v} + ${t2}\\)`,
        aLatex: `${a}(${v} + ${b})`,
        check: inp => norm(inp) === norm(ans)
      };
    }
    const a = rnd(2,7), b = rnd(2,9);
    const ans = `${v}(${a}${v}+${b})`;
    return {
      qText: `Factorise \\(${a}${v}^2 + ${b}${v}\\)`,
      aLatex: `${v}(${a}${v} + ${b})`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  // level 3: full HCF (number + variable); ~40% chance the HCF steals a full term (leaving 1)
  if (Math.random() < 0.4) {
    const a = rnd(2,6), b = rnd(2,5), t1 = a*b;
    const ans = `${a}${v}(${b}${v}+1)`;
    return {
      qText: `Factorise fully \\(${t1}${v}^2 + ${a}${v}\\)`,
      aLatex: `${a}${v}(${b}${v} + 1)`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  const a = rnd(2,5), b = rnd(2,5), c = rnd(2,7), t1 = a*b, t2 = a*c;
  const ans = `${a}${v}(${b}${v}+${c})`;
  return {
    qText: `Factorise fully \\(${t1}${v}^2 + ${t2}${v}\\)`,
    aLatex: `${a}${v}(${b}${v} + ${c})`,
    check: inp => norm(inp) === norm(ans)
  };
}

// 6. Factorising Quadratics
function genFactoriseQuad(level) {
  if (level === 1) {
    // x^2 + (a+b)x + ab, both positive
    const a = rnd(1,7), b = rnd(1,7), mid = a+b, last = a*b;
    const a1 = `(x+${a})(x+${b})`, a2 = `(x+${b})(x+${a})`;
    return {
      qText: `Factorise \\(x^2 + ${mid}x + ${last}\\)`,
      aLatex: `(x + ${a})(x + ${b})`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  if (level === 2) {
    // (x+a)(x-b), a > b ŌåÆ x^2 + (a-b)x - ab
    const a = rnd(3,8), b = rnd(1, a-1), mid = a-b, last = a*b;
    const midStr = mid === 0 ? '' : `+ ${mid}x `;
    const qStr = `x^2 ${midStr}- ${last}`;
    const a1 = `(x+${a})(x-${b})`, a2 = `(x-${b})(x+${a})`;
    return {
      qText: `Factorise \\(${qStr}\\)`,
      aLatex: `(x + ${a})(x - ${b})`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // level 3: (x-a)(x-b)
  const a = rnd(1,7), b = rnd(1,7), mid = a+b, last = a*b;
  const a1 = `(x-${a})(x-${b})`, a2 = `(x-${b})(x-${a})`;
  return {
    qText: `Factorise \\(x^2 - ${mid}x + ${last}\\)`,
    aLatex: `(x - ${a})(x - ${b})`,
    check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
  };
}

// 7. Solving Equations
function genSolveEq(level) {
  const v = pick(['x','n','k']);
  function eqCheck(x) {
    return inp => norm(inp) === norm(`${x}`) || norm(inp) === norm(`${v}=${x}`);
  }
  if (level === 1) {
    if (Math.random() < 0.5) {
      // v + a = b
      const x = rnd(-4,9), a = rnd(2,8), b = x + a;
      return {
        qText: `Solve \\(${v} + ${a} = ${b}\\)`,
        aLatex: `${v} = ${x}`,
        check: eqCheck(x)
      };
    }
    // av = b
    const x = rnd(2,9), a = rnd(2,8), b = x * a;
    return {
      qText: `Solve \\(${a}${v} = ${b}\\)`,
      aLatex: `${v} = ${x}`,
      check: eqCheck(x)
    };
  }
  if (level === 2) {
    // av + b = c
    const x = rnd(1,8), a = rnd(2,6), b = rnd(1,9), c = a*x + b;
    return {
      qText: `Solve \\(${a}${v} + ${b} = ${c}\\)`,
      aLatex: `${v} = ${x}`,
      check: eqCheck(x)
    };
  }
  // level 3: av + b = cv + d (variables on both sides)
  const x = rnd(1,8), a = rnd(4,9), c = rnd(1, a-2), d = rnd(2,8);
  const b = (c - a) * x + d; // derive b so ax+b = cx+d holds
  const bAbs = Math.abs(b);
  const qStr = b >= 0
    ? `${a}${v} + ${b} = ${c}${v} + ${d}`
    : `${a}${v} - ${bAbs} = ${c}${v} + ${d}`;
  return {
    qText: `Solve \\(${qStr}\\)`,
    aLatex: `${v} = ${x}`,
    check: eqCheck(x)
  };
}

// 8. Substitution into Formulas
function genSubstitution(level) {
  if (level === 1) {
    const m = rnd(2,6), c = rnd(1,8), x = rnd(1,6), y = m*x + c;
    return {
      qText: `If \\(y = ${m}x + ${c}\\), find \\(y\\) when \\(x = ${x}\\)`,
      aLatex: `${y}`,
      check: inp => norm(inp) === norm(`${y}`) || norm(inp) === norm(`y=${y}`)
    };
  }
  if (level === 2) {
    const l = rnd(3,12), w = rnd(2,10), A = l*w;
    return {
      qText: `If \\(A = lw\\), find \\(A\\) when \\(l = ${l}\\) and \\(w = ${w}\\)`,
      aLatex: `${A}`,
      check: inp => norm(inp) === norm(`${A}`) || norm(inp) === norm(`a=${A}`)
    };
  }
  const u = rnd(2,10), a = rnd(2,6), t = rnd(2,8), vv = u + a*t;
  return {
    qText: `If \\(v = u + at\\), find \\(v\\) when \\(u = ${u}\\), \\(a = ${a}\\), \\(t = ${t}\\)`,
    aLatex: `${vv}`,
    check: inp => norm(inp) === norm(`${vv}`) || norm(inp) === norm(`v=${vv}`)
  };
}

// 9. Rearranging Formulas
function genRearrange(level) {
  if (level === 1) {
    // y = x + a  ŌåÆ  x = y - a
    const a = rnd(2,9);
    const ans = `x=y-${a}`;
    return {
      qText: `Make \\(x\\) the subject of \\(y = x + ${a}\\)`,
      aLatex: `x = y - ${a}`,
      check: inp => norm(inp) === norm(ans)
    };
  }
  if (level === 2) {
    // y = mx + c  ŌåÆ  x = (y-c)/m
    const m = rnd(2,7), c = rnd(2,8);
    const a1 = `x=(y-${c})/${m}`, a2 = `(y-${c})/${m}`;
    return {
      qText: `Make \\(x\\) the subject of \\(y = ${m}x + ${c}\\)`,
      aLatex: `x = \\dfrac{y - ${c}}{${m}}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // level 3: v = u + at  ŌåÆ  a = (v-u)/t
  return {
    qText: `Make \\(a\\) the subject of \\(v = u + at\\)`,
    aLatex: `a = \\dfrac{v - u}{t}`,
    check: inp => norm(inp) === norm('a=(v-u)/t') || norm(inp) === norm('(v-u)/t')
  };
}

// 10. Index Laws
function genIndexLaws(level) {
  const v = pick(['x','y','a','m']);
  if (level === 1) {
    // multiplication: v^a ├Ś v^b = v^(a+b)
    const a = rnd(2,6), b = rnd(2,6), s = a + b;
    return {
      qText: `Simplify \\(${v}^${a} \\times ${v}^${b}\\)`,
      aLatex: `${v}^{${s}}`,
      check: inp => norm(inp) === norm(`${v}^${s}`) || norm(inp) === norm(`${v}^{${s}}`)
    };
  }
  if (level === 2) {
    const type = pick(['div','power','coef']);
    if (type === 'div') {
      // v^a ├Ę v^b = v^(a-b)
      const b = rnd(2,5), a = b + rnd(2,5), d = a - b;
      return {
        qText: `Simplify \\(${v}^${a} \\div ${v}^${b}\\)`,
        aLatex: `${v}^{${d}}`,
        check: inp => norm(inp) === norm(`${v}^${d}`) || norm(inp) === norm(`${v}^{${d}}`)
      };
    }
    if (type === 'power') {
      // (v^a)^b = v^(ab)
      const a = rnd(2,5), b = rnd(2,4), p = a * b;
      return {
        qText: `Simplify \\((${v}^${a})^${b}\\)`,
        aLatex: `${v}^{${p}}`,
        check: inp => norm(inp) === norm(`${v}^${p}`) || norm(inp) === norm(`${v}^{${p}}`)
      };
    }
    // coef: c*v^a ├Ś d*v^b
    const c = rnd(2,5), d = rnd(2,5), a = rnd(2,4), b = rnd(2,4), p = c*d, s = a+b;
    return {
      qText: `Simplify \\(${c}${v}^${a} \\times ${d}${v}^${b}\\)`,
      aLatex: `${p}${v}^{${s}}`,
      check: inp => norm(inp) === norm(`${p}${v}^${s}`) || norm(inp) === norm(`${p}${v}^{${s}}`)
    };
  }
  // level 3: negative and fractional indices
  const type = pick(['neg','frac','negfrac']);
  if (type === 'neg') {
    // v^-a = 1/v^a
    const a = rnd(2,4);
    const a1 = `1/${v}^${a}`, a2 = `1/${v}^{${a}}`;
    return {
      qText: `Write \\(${v}^{-${a}}\\) without negative indices`,
      aLatex: `\\dfrac{1}{${v}^${a}}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  if (type === 'frac') {
    // v^(1/2) = sqrt(v),  v^(1/3) = cbrt
    const n = pick([2,3]);
    const rootStr = n === 2 ? `\\sqrt{${v}}` : `\\sqrt[3]{${v}}`;
    const a1 = n === 2 ? `sqrt(${v})` : `${v}^(1/3)`;
    const a2 = `${v}^(1/${n})`;
    return {
      qText: `Write \\(${v}^{1/${n}}\\) in surd/root form`,
      aLatex: rootStr,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2) ||
                   norm(inp) === norm(`${v}^{1/${n}}`)
    };
  }
  // negfrac: v^(-1/2) = 1/sqrt(v)
  const a1 = `1/sqrt(${v})`, a2 = `1/${v}^(1/2)`;
  return {
    qText: `Write \\(${v}^{-1/2}\\) without negative indices`,
    aLatex: `\\dfrac{1}{\\sqrt{${v}}}`,
    check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2) ||
                 norm(inp) === norm(`1/${v}^{1/2}`)
  };
}

// 11. Algebraic Fractions
function genAlgFractions(level) {
  const v = pick(['x','n','a']);
  if (level === 1) {
    // simplify: (ab*v) / (a*v) = b, or (a*v^2)/(b*v) = (a/b)*v
    const a = rnd(2,6), b = rnd(2,6), p = a * b;
    return {
      qText: `Simplify \\(\\dfrac{${p}${v}}{${a}}\\)`,
      aLatex: `${b}${v}`,
      check: inp => norm(inp) === norm(`${b}${v}`)
    };
  }
  if (level === 2) {
    // simplify: (a*v^2) / (b*v) = (a/b)*v  ŌĆö pick a,b with common factor so answer is integer coef
    const k = rnd(2,5), c = rnd(2,4), d = rnd(2,4), num = k*c, den = k*d;
    // gcd already k; result is (c/d)v ŌĆö only generate if c/d is integer
    const g = gcd(num, den), rn = num/g, rd = den/g;
    if (rd === 1) {
      return {
        qText: `Simplify \\(\\dfrac{${num}${v}^2}{${den}${v}}\\)`,
        aLatex: `${rn}${v}`,
        check: inp => norm(inp) === norm(`${rn}${v}`)
      };
    }
    // fallback: plain coefficient fraction
    const a2 = rnd(2,8), b2 = rnd(2,8), p2 = a2*b2;
    return {
      qText: `Simplify \\(\\dfrac{${p2}${v}^2}{${a2}${v}}\\)`,
      aLatex: `${b2}${v}`,
      check: inp => norm(inp) === norm(`${b2}${v}`)
    };
  }
  // level 3: add two fractions with different denominators: a/(bv) + c/(dv) = (ad+bc)/(bdv)
  const b = rnd(2,5), d = rnd(2,5), a = rnd(1,5), c = rnd(1,5);
  const numVal = a*d + b*c, denVal = b*d;
  const g = gcd(numVal, denVal), rn = numVal/g, rd = denVal/g;
  const aLatex = rd === 1 ? `\\dfrac{${rn}}{${v}}` : `\\dfrac{${rn}}{${rd}${v}}`;
  const a1 = rd === 1 ? `${rn}/${v}` : `${rn}/(${rd}${v})`;
  const a2 = rd === 1 ? `${rn}/${v}` : `${rn}/${rd}${v}`;
  return {
    qText: `Simplify \\(\\dfrac{${a}}{${b}${v}} + \\dfrac{${c}}{${d}${v}}\\)`,
    aLatex,
    check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
  };
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

// 12. Inequalities
function genInequalities(level) {
  const v = pick(['x','n','k']);
  const ops = ['<', '>', '\\leq', '\\geq'];
  const opSym = (o) => ({ '<':'<', '>':'>','\\leq':'<=','\\geq':'>=' }[o]);
  if (level === 1) {
    // v + a > b  ŌåÆ  v > b-a
    const op = pick(ops), a = rnd(2,8), x = rnd(1,8), b = x + a;
    const rhs = b - a;
    const a1 = `${v}${opSym(op)}${rhs}`, a2 = `${v} ${opSym(op)} ${rhs}`;
    return {
      qText: `Solve \\(${v} + ${a} ${op} ${b}\\)`,
      aLatex: `${v} ${op} ${rhs}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  if (level === 2) {
    // av + b > c  ŌåÆ  v > (c-b)/a
    const op = pick(ops), a = rnd(2,6), x = rnd(1,7), b = rnd(1,8), c = a*x + b;
    const a1 = `${v}${opSym(op)}${x}`, a2 = `${v} ${opSym(op)} ${x}`;
    return {
      qText: `Solve \\(${a}${v} + ${b} ${op} ${c}\\)`,
      aLatex: `${v} ${op} ${x}`,
      check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
    };
  }
  // level 3: variables on both sides, or dividing by negative flips sign
  // divide by negative: -av < b  ŌåÆ  v > -b/a
  const a = rnd(2,6), b = rnd(2,12), x = Math.ceil(b / a);
  // -av < b  ŌåÆ  v > -b/a; use b as multiple of a for clean answer
  const aa = rnd(2,5), bb = aa * rnd(1,6);
  const xval = bb / aa; // integer
  // question: -aa*v < bb ŌåÆ v > -xval  (flip: > becomes <)
  // or: av + b > cv + d
  const av = rnd(4,8), cv = rnd(1, av-2), d = rnd(1,8), bv = (cv - av)*xval + d;
  const bvAbs = Math.abs(bv);
  const op = pick(['<','>']);
  const flip = (o) => o === '<' ? '>' : '<';
  const qStr = bv >= 0
    ? `${av}${v} + ${bv} ${op} ${cv}${v} + ${d}`
    : `${av}${v} - ${bvAbs} ${op} ${cv}${v} + ${d}`;
  const a1 = `${v}${flip(op)}${xval}`, a2 = `${v} ${flip(op)} ${xval}`;
  return {
    qText: `Solve \\(${qStr}\\)`,
    aLatex: `${v} ${flip(op)} ${xval}`,
    check: inp => norm(inp) === norm(a1) || norm(inp) === norm(a2)
  };
}

// 13. Completing the Square
function genCompleteSquare(level) {
  if (level === 1) {
    // x^2 + 2bx + c = (x+b)^2 - b^2 + c, where c = 0 (just x^2 + 2bx)
    const b = rnd(2,7), sq = b*b;
    return {
      qText: `Complete the square: \\(x^2 + ${2*b}x\\)`,
      aLatex: `(x + ${b})^2 - ${sq}`,
      check: inp => norm(inp) === norm(`(x+${b})^2-${sq}`) ||
                   norm(inp) === norm(`(x+${b})^2-${sq}`)
    };
  }
  if (level === 2) {
    // x^2 + 2bx + c = (x+b)^2 + (c - b^2)
    const b = rnd(2,6), c = rnd(1,12), k = c - b*b;
    const kStr = k >= 0 ? `+ ${k}` : `- ${Math.abs(k)}`;
    const aStr = k >= 0 ? `(x+${b})^2+${k}` : `(x+${b})^2-${Math.abs(k)}`;
    return {
      qText: `Complete the square: \\(x^2 + ${2*b}x + ${c}\\)`,
      aLatex: `(x + ${b})^2 ${kStr}`,
      check: inp => norm(inp) === norm(aStr)
    };
  }
  // level 3: x^2 - 2bx + c (negative middle term)
  const b = rnd(2,6), c = rnd(1,12), k = c - b*b;
  const kStr = k >= 0 ? `+ ${k}` : `- ${Math.abs(k)}`;
  const aStr = k >= 0 ? `(x-${b})^2+${k}` : `(x-${b})^2-${Math.abs(k)}`;
  return {
    qText: `Complete the square: \\(x^2 - ${2*b}x + ${c}\\)`,
    aLatex: `(x - ${b})^2 ${kStr}`,
    check: inp => norm(inp) === norm(aStr)
  };
}

// 14. Simultaneous Equations
function genSimultaneous(level) {
  if (level === 1) {
    // substitution: y = ax + b, y = cx + d  ŌåÆ  ax+b = cx+d ŌåÆ x = (d-b)/(a-c)
    const x = rnd(1,6), a = rnd(2,5), b = rnd(1,8), c = rnd(1, a-1), d = a*x + b - c*x;
    return {
      qText: `Solve simultaneously:\\(y = ${a}x + ${b}\\) and \\(y = ${c}x + ${d}\\)`,
      aLatex: `x = ${x},\\; y = ${a*x + b}`,
      check: inp => {
        const n = norm(inp);
        const yv = a*x + b;
        return (n.includes(`x=${x}`) && n.includes(`y=${yv}`)) ||
               (n.includes(`${x}`) && n.includes(`${yv}`));
      }
    };
  }
  if (level === 2) {
    // linear + quadratic: y = x^2 + c and y = bx
    const r = rnd(1,4), s = rnd(1,4);
    const bv = r + s, cv = -(r * s);
    const x1 = r, x2 = -s, y1 = bv*x1, y2 = bv*x2;
    const cvStr = cv >= 0 ? `+ ${cv}` : `- ${Math.abs(cv)}`;
    return {
      qText: `Solve simultaneously: \\(y = x^2 ${cvStr}\\) and \\(y = ${bv}x\\)`,
      aLatex: `(${x1},\\,${y1}) \\text{ and } (${x2},\\,${y2})`,
      check: inp => {
        const n = norm(inp);
        const pair1 = `(${x1},${y1})`, pair2 = `(${x2},${y2})`;
        return (n.includes(norm(pair1)) && n.includes(norm(pair2)));
      }
    };
  }
  // level 3: elimination ŌĆö ax + by = p, cx + dy = q
  const x = rnd(1,6), y = rnd(1,6);
  const a = rnd(1,4), b = rnd(1,4), c = rnd(1,4), d = rnd(1,4);
  const p = a*x + b*y, q = c*x + d*y;
  return {
    qText: `Solve simultaneously:\\(${a}x + ${b}y = ${p}\\) and \\(${c}x + ${d}y = ${q}\\)`,
    aLatex: `x = ${x},\\; y = ${y}`,
    check: inp => {
      const n = norm(inp);
      return (n.includes(`x=${x}`) && n.includes(`y=${y}`)) ||
             (n.includes(`${x}`) && n.includes(`${y}`));
    }
  };
}

function toggleExplanation() {
  if (!currentQ) return;
  const el = document.getElementById('explanation');
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  const lines = EXPLANATIONS[currentQ.topicKey];
  if (!lines) return;
  const s = stats[currentQ.topicKey];
  const maxLevel = s.c1 < 7 ? 1 : s.c2 < 7 ? 2 : 3;
  const visible = lines.slice(0, maxLevel + 1); // index 0 = overview, 1ŌĆō3 = L1ŌĆōL3
  el.innerHTML = visible.map((l, i) => {
    const html = renderQ(l).replace(/&ensp; ┬Ę &ensp;/g, '<br>&emsp;');
    return `<div${i === 0 ? ' class="expl-overview"' : ''}>${html}</div>`;
  }).join('');
  el.style.display = 'block';
}

// ŌöĆŌöĆ Generator map ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const GEN = {
  'like-terms':      genLikeTerms,
  'mult-terms':      genMultTerms,
  'single-bracket':  genSingleBracket,
  'double-bracket':  genDoubleBracket,
  'factorise-hcf':   genFactoriseHCF,
  'factorise-quad':  genFactoriseQuad,
  'solve-eq':        genSolveEq,
  'substitution':    genSubstitution,
  'rearrange':       genRearrange,
  'index-laws':      genIndexLaws,
  'alg-fractions':   genAlgFractions,
  'inequalities':    genInequalities,
  'complete-square': genCompleteSquare,
  'simultaneous':    genSimultaneous,
};

// ŌöĆŌöĆ Next question ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function nextQuestion() {
  const key   = currentTopic === 'mix' ? pick(KEYS) : currentTopic;
  const level = pickLevel(key);
  const q     = GEN[key](level);
  currentQ    = { ...q, topicKey: key, level };
  attempts    = 0;
  waitingForNext = false;

  document.getElementById('question-wrap').innerHTML = renderQ(currentQ.qText);
  document.getElementById('feedback').textContent    = '';
  document.getElementById('answer-reveal').innerHTML = '';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('hint').textContent        = 'Enter to submit  ┬Ę  Shift+Z to explain';
  document.getElementById('btn-action').textContent  = 'Submit';

  const inp = document.getElementById('answer-input');
  inp.value    = '';
  inp.disabled = false;
  inp.focus();
}

// ŌöĆŌöĆ Submit / advance ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function submitAnswer() {
  if (waitingForNext) {
    waitingForNext = false;
    nextQuestion();
    return;
  }

  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if (!val) return;

  totalAnswered++;
  document.getElementById('top-right').textContent = `${totalAnswered}`;

  const correct = currentQ.check(val);

  if (correct) {
    const s = stats[currentQ.topicKey];
    if      (currentQ.level === 1) s.c1++;
    else if (currentQ.level === 2) s.c2++;
    else                           s.c3++;

    document.getElementById('feedback').textContent   = 'Ō£ģ';
    document.getElementById('hint').textContent       = 'press Enter for next';
    document.getElementById('btn-action').textContent = 'Next question';
    inp.disabled   = true;
    waitingForNext = true;
    stats[currentQ.topicKey].total++;
    saveStats();
  } else {
    attempts++;
    if (attempts >= 2) {
      document.getElementById('feedback').textContent    = 'ŌØī';
      document.getElementById('answer-reveal').innerHTML = 'Answer: ' + renderA(currentQ.aLatex);
      document.getElementById('hint').textContent        = 'press Enter for next';
      document.getElementById('btn-action').textContent  = 'Next question';
      inp.disabled   = true;
      waitingForNext = true;
      stats[currentQ.topicKey].total++;
      saveStats();
    } else {
      document.getElementById('feedback').textContent = 'ŌØī try again';
      inp.value = '';
      inp.focus();
    }
  }
}

// ŌöĆŌöĆ Navigation ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const home  = document.getElementById('home');
const qpage = document.getElementById('qpage');

function goHome() {
  qpage.style.display = 'none';
  home.style.display  = '';
  currentTopic   = null;
  waitingForNext = false;
  renderTopicList();
}

function startTopic(key) {
  currentTopic  = key;
  totalAnswered = key === 'mix'
    ? KEYS.reduce((sum, k) => sum + stats[k].total, 0)
    : stats[key].total;
  home.style.display  = 'none';
  qpage.style.display = 'block';
  document.getElementById('top-right').textContent = `${totalAnswered}`;
  nextQuestion();
}

document.getElementById('topic-list').addEventListener('click', e => {
  const a = e.target.closest('[data-topic]');
  if (a) startTopic(a.dataset.topic);
});

document.getElementById('top-left').addEventListener('click', goHome);

document.addEventListener('keydown', e => {
  if (qpage.style.display === 'none') return;
  if (e.key === 'Enter') {
    e.preventDefault();
    submitAnswer();
  }
  if (e.shiftKey && e.key === 'Z') {
    e.preventDefault();
    toggleExplanation();
  }
});
</script>
