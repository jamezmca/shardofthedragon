<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Daddy Read To Me | Free Text to Speech, No Ads, No Sign Up</title>
  <meta name="description" content="Free text to speech in your browser. Paste any text and hear it read aloud instantly — no ads, no sign up, no server. Your text never leaves your device.">
  <meta property="og:title" content="Big Daddy Read To Me">
  <meta property="og:description" content="Free text to speech in your browser. No ads, no sign up, no server. Your text never leaves your device.">
<style>
  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid #ccc;
    border-top-color: #333;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  [hidden] { display: none !important; }
  #word-ticker {
    margin-top: 0.5rem;
    font-size: 0.88rem;
    display: flex;
    gap: 0.4rem;
    align-items: baseline;
    min-height: 1.4em;
    user-select: none;
  }
  #word-ticker span {
    transition: color 0.12s ease, font-weight 0.12s ease;
    white-space: nowrap;
  }
  .tw-past2  { color: #777; }
  .tw-past1  { color: #555; }
  .tw-cur    { color: #111; font-weight: 600; }
  .tw-next1  { color: #aaa; }
  .tw-next2  { color: #ccc; }
  .tw-empty  { color: transparent; }
</style>
</head>

<body>

  <h1>Big Daddy Read To Me</h1>

  <p><i><strong>100%</strong> local — runs entirely in your browser, no server, no sign up</i></p>

  <div>
    <label for="voice-select">Voice: </label>
    <select id="voice-select"></select>
  </div>

  <br>

  <div>
    <textarea id="text-input" rows="6" cols="60" placeholder="Enter text to read aloud..."></textarea>
  </div>

  <div>
    <label for="file-input">or upload a .txt file: </label>
    <input type="file" id="file-input" accept=".txt,text/plain">
  </div>

  <br>

  <div>
    <button id="speak-btn">Read to Me</button>
    <button id="download-btn" hidden disabled>Download WAV</button>
    <button id="reset-btn" hidden>Reset</button>
    <span id="spinner" class="spinner" hidden></span><span id="status-text"></span>
  </div>

  <div id="word-ticker" hidden></div>

  <div id="output" hidden>
    <br>
    <audio id="audio-player" controls></audio>
  </div>

  <script type="module" src="./utils/app.js"></script>
</body>

</html>
