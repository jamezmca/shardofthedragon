<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Mowing Madness — mow the entire lawn as fast as you can while avoiding obstacles. A top-down 2D speedrunner.">
<title>Mowing Madness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Constants ──────────────────────────────────────────────────────────────
const TILE     = 16;
const MAP_COLS = 64;
const MAP_ROWS = 48;
const MAP_W    = MAP_COLS * TILE;
const MAP_H    = MAP_ROWS * TILE;
const BANNER_H = 30;

// GAME_SCALE: screen pixels per world pixel. Recomputed on resize so ~28 tiles
// are visible across the shorter viewport dimension, giving a scrollable world.
let GAME_SCALE = 2;
let VW = 0, VH = 0;

function resize() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width  = VW;
  canvas.height = VH;
  // target ~28 tiles visible on the narrow axis
  const minDim = Math.min(VW, VH);
  GAME_SCALE = Math.max(1.5, Math.min(4, minDim / (28 * TILE)));
}
resize();
window.addEventListener('resize', resize);

// ── Tile types ─────────────────────────────────────────────────────────────
const T = { GRASS: 0, MOWED: 1, PATH: 2, SOLID: 3, BORDER: 5, FLOWER: 6 };

// ── Map ────────────────────────────────────────────────────────────────────
const map = new Uint8Array(MAP_COLS * MAP_ROWS).fill(T.GRASS);

function ti(c, r) { return r * MAP_COLS + c; }
function setRect(c0, r0, c1, r1, t) {
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      map[ti(c, r)] = t;
}
function setTile(c, r, t) {
  if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) map[ti(c, r)] = t;
}

// Border
setRect(0, 0, MAP_COLS-1, 0, T.BORDER);
setRect(0, MAP_ROWS-1, MAP_COLS-1, MAP_ROWS-1, T.BORDER);
setRect(0, 0, 0, MAP_ROWS-1, T.BORDER);
setRect(MAP_COLS-1, 0, MAP_COLS-1, MAP_ROWS-1, T.BORDER);

// House
setRect(4, 3, 14, 13, T.SOLID);
setRect(8, 13, 10, 18, T.PATH);

// Orchard
const orchardTrees = [
  [48,4],[51,4],[54,4],[57,4],[60,4],
  [48,8],[51,8],[54,8],[57,8],[60,8],
  [48,12],[51,12],[54,12],
];
orchardTrees.forEach(([c,r]) => {
  setTile(c,r,T.SOLID); setTile(c+1,r,T.SOLID);
  setTile(c,r+1,T.SOLID); setTile(c+1,r+1,T.SOLID);
});

// Trees
const trees = [
  [20,3],[22,6],[35,3],[40,5],
  [5,20],[3,30],[7,38],[18,42],[30,44],[45,40],[55,35],[60,28],[62,18],
];
trees.forEach(([c,r]) => {
  setTile(c,r,T.SOLID); setTile(c+1,r,T.SOLID);
  setTile(c,r+1,T.SOLID); setTile(c+1,r+1,T.SOLID);
});

// Stumps
const stumps = [[26,8],[33,15],[50,22],[15,33],[40,38]];
stumps.forEach(([c,r]) => setTile(c,r,T.SOLID));

// Gravestones — scattered around the map
const graves = [[25,10],[43,17],[16,30],[38,36],[52,28],[20,45],[58,16],[10,40]];
graves.forEach(([c,r]) => setTile(c,r,T.SOLID));

// Tent + campfire
setRect(5,38,9,43,T.SOLID);
setTile(12,41,T.SOLID);

// Kennel + dog — above the path
setRect(18,14,21,17,T.SOLID);
setTile(23,15,T.SOLID);

// Animals
[[30,20],[32,22],[28,25],[42,30],[44,28],[46,32]].forEach(([c,r]) => setTile(c,r,T.SOLID));

// Path — exits house south, runs east across map, then a rectangular loop
for (let r = 13; r <= 19; r++) setTile(9, r, T.PATH);          // house exit (vertical join)
for (let c = 2; c <= 62; c++) setTile(c, 19, T.PATH);          // main east-west path
for (let r = 20; r <= 28; r++) setTile(26, r, T.PATH);         // loop west leg
for (let c = 26; c <= 38; c++) setTile(c, 28, T.PATH);         // loop bottom
for (let r = 20; r <= 28; r++) setTile(38, r, T.PATH);         // loop east leg

// Flowers — scattered around, hitting one ends the game
const flowers = [
  [15,5],[28,3],[44,7],[45,10],
  [17,15],[36,10],[55,14],[40,15],
  [60,24],[6,25],[14,28],[38,28],[50,29],[57,26],
  [3,34],[25,37],[45,37],[60,37],
  [12,44],[36,44],[50,44],[62,44],
  [2,8],[2,16],[25,17],
];
flowers.forEach(([c,r]) => setTile(c,r,T.FLOWER));

function countMowable() {
  let n = 0;
  for (let i = 0; i < map.length; i++) if (map[i] === T.GRASS) n++;
  return n;
}
const TOTAL_GRASS = countMowable();

// ── Per-tile grass noise (kept for minimap / border variation) ─────────────
const grassNoise = new Uint8Array(MAP_COLS * MAP_ROWS);
{
  let seed = 42;
  const lcg = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 4294967296; };
  for (let i = 0; i < grassNoise.length; i++) grassNoise[i] = Math.floor(lcg() * 38);
}

// ── Image assets ──────────────────────────────────────────────────────────────
const IMG = {};
[
  'grass','grass_mowed','path_cobble',
  'tree','tree_orchard','stump','grave','campfire',
  'kennel','tent','cottage',
  'sheep','chicken','dog','mower_n',
  'flower_red','flower_yellow','flower_purple','flower_pink','flower_white',
].forEach(name => {
  const img = new Image();
  img.src = `assets/sprites/${name}.png`;
  IMG[name] = img;
});
const FLOWER_IMGS = ['flower_red','flower_yellow','flower_purple','flower_pink','flower_white'];

// ── Sprite drawing ─────────────────────────────────────────────────────────

function drawMower(screenX, screenY, angle) {
  const s = TILE * GAME_SCALE;
  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.rotate(angle + Math.PI / 2); // sprite faces north; offset so angle=0 faces east
  ctx.drawImage(IMG.mower_n, -s*0.5, -s*0.5, s, s);
  ctx.restore();
}

function drawTree(sx, sy)        { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.tree,         sx, sy,  2*s,  2*s); }
function drawOrchardTree(sx, sy) { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.tree_orchard, sx, sy,  2*s,  2*s); }
function drawStump(sx, sy)       { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.stump,        sx, sy,    s,    s); }
function drawGrave(sx, sy)       { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.grave,        sx, sy,    s,    s); }
function drawDog(sx, sy)         { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.dog,          sx, sy,    s,    s); }
function drawSheep(sx, sy)       { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.sheep,        sx, sy,    s,    s); }
function drawChicken(sx, sy)     { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.chicken,      sx, sy,    s,    s); }
function drawCampfire(sx, sy)    { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.campfire,     sx, sy,    s,    s); }
function drawHouse(sx, sy)       { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.cottage,      sx, sy, 11*s, 11*s); }
function drawKennel(sx, sy)      { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.kennel,       sx, sy,  4*s,  4*s); }
function drawTent(sx, sy)        { const s=TILE*GAME_SCALE; ctx.drawImage(IMG.tent,         sx, sy,  5*s,  6*s); }
function drawFlower(sx, sy, ci)  { const s=TILE*GAME_SCALE; ctx.drawImage(IMG[FLOWER_IMGS[ci]], sx, sy, s, s); }

// ── Sprites list ───────────────────────────────────────────────────────────
const sprites = [];
sprites.push({ type: 'house',    col: 4,  row: 3  });
sprites.push({ type: 'kennel',   col: 18, row: 14 });
sprites.push({ type: 'dog',      col: 23, row: 15 });
sprites.push({ type: 'tent',     col: 5,  row: 38 });
sprites.push({ type: 'campfire', col: 12, row: 41 });
orchardTrees.forEach(([c,r])  => sprites.push({ type: 'otree',   col: c, row: r }));
trees.forEach(([c,r])         => sprites.push({ type: 'tree',    col: c, row: r }));
stumps.forEach(([c,r])        => sprites.push({ type: 'stump',   col: c, row: r }));
graves.forEach(([c,r])        => sprites.push({ type: 'grave',   col: c, row: r }));
[[30,20],[32,22],[28,25]].forEach(([c,r]) => sprites.push({ type: 'sheep',   col: c, row: r }));
[[42,30],[44,28],[46,32]].forEach(([c,r]) => sprites.push({ type: 'chicken', col: c, row: r }));

// ── Mower ──────────────────────────────────────────────────────────────────
const mower = { x: 9.5*TILE, y: 16.5*TILE, angle: 0, speed: 0 };
const MOWER_SPEED = 4.5 * TILE;
const TURN_SPEED  = 3.2;

// ── Scores ─────────────────────────────────────────────────────────────────
function loadScores() {
  try { return JSON.parse(localStorage.getItem('mm_scores') || '[]'); } catch { return []; }
}
function saveScore(ms) {
  const s = loadScores(); s.push(ms); s.sort((a,b) => a-b); s.splice(5);
  localStorage.setItem('mm_scores', JSON.stringify(s));
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), ss = s%60;
  return `${String(m).padStart(2,'0')}m${String(ss).padStart(2,'0')}s`;
}

// ── Banner ─────────────────────────────────────────────────────────────────
let bannerText = '', bannerScroll = 0;
function buildBanner() {
  const s = loadScores();
  bannerText = s.length
    ? '  TOP SCORES:  ' + s.slice(0,5).map((t,i) => `#${i+1} ${fmtTime(t)}`).join('   ') + '  '
    : '  MOWING MADNESS — NO SCORES YET — MOW THE LAWN!  ';
}
buildBanner();

// ── Game state ─────────────────────────────────────────────────────────────
const STATE = { HOME: 0, PLAYING: 1, END: 2 };
let gameState = STATE.HOME;
let startTime = 0, endTime = 0, mowedCount = 0, lastMs = 0, endReason = '';

const keys = {};
document.addEventListener('keydown', e => {
  // Don't capture keys used for page scroll when game isn't focused on movement
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (gameState === STATE.HOME && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) { startGame(); return; }
  if (gameState === STATE.END && e.code === 'Space')         { startGame(); return; }
  if (gameState === STATE.PLAYING && e.code === 'Escape')    { endGame('quit'); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── On-screen D-pad ────────────────────────────────────────────────────────
const BTN = { up: false, down: false, left: false, right: false };

function btnSize() { return Math.round(Math.max(36, Math.min(56, VW * 0.065))); }

function dpadLayout() {
  const bs = btnSize();
  const pad = 14;
  const bx = VW - bs*3 - pad;
  const by = VH - bs*3 - pad;
  return {
    up:    { x: bx+bs,   y: by       },
    down:  { x: bx+bs,   y: by+bs*2  },
    left:  { x: bx,      y: by+bs    },
    right: { x: bx+bs*2, y: by+bs    },
    bs,
  };
}

function hitButton(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (VW / rect.width);
  const my = (e.clientY - rect.top)  * (VH / rect.height);
  const d = dpadLayout();
  const { bs } = d;
  for (const dir of ['up','down','left','right']) {
    const b = d[dir];
    if (mx >= b.x && mx <= b.x+bs && my >= b.y && my <= b.y+bs) return dir;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  const b = hitButton(e); if (b) { BTN[b] = true; e.preventDefault(); }
});
canvas.addEventListener('pointermove', e => {
  // allow sliding between buttons
  if (e.buttons === 0) return;
  const b = hitButton(e);
  Object.keys(BTN).forEach(k => BTN[k] = false);
  if (b) BTN[b] = true;
});
canvas.addEventListener('pointerup',     () => Object.keys(BTN).forEach(k => BTN[k] = false));
canvas.addEventListener('pointercancel', () => Object.keys(BTN).forEach(k => BTN[k] = false));

// ── Game flow ──────────────────────────────────────────────────────────────
function startGame() {
  for (let i = 0; i < map.length; i++) if (map[i] === T.MOWED) map[i] = T.GRASS;
  mower.x = 9.5*TILE; mower.y = 16.5*TILE; mower.angle = 0; mower.speed = 0;
  mowedCount = 0;
  startTime = performance.now();
  gameState = STATE.PLAYING;
  updateMinimap();
  buildBanner();
}

function endGame(reason) {
  if (gameState !== STATE.PLAYING) return;
  endReason = reason || 'quit';
  endTime = performance.now();
  if (mowedCount >= TOTAL_GRASS) saveScore(endTime - startTime);
  buildBanner();
  gameState = STATE.END;
}

// ── Camera ─────────────────────────────────────────────────────────────────
// Returns camera offset in screen pixels (top-left world pixel that maps to screen (0,0))
function getCam() {
  let cx = mower.x * GAME_SCALE - VW / 2;
  let cy = mower.y * GAME_SCALE - VH / 2;
  cx = Math.max(0, Math.min(MAP_W * GAME_SCALE - VW, cx));
  cy = Math.max(0, Math.min(MAP_H * GAME_SCALE - VH, cy));
  return { cx, cy };
}

// ── Map rendering ──────────────────────────────────────────────────────────
function drawMap(cam) {
  const { cx, cy } = cam;
  const tS = TILE * GAME_SCALE;

  const c0 = Math.max(0, Math.floor(cx / tS));
  const r0 = Math.max(0, Math.floor(cy / tS));
  const c1 = Math.min(MAP_COLS-1, Math.ceil((cx + VW) / tS));
  const r1 = Math.min(MAP_ROWS-1, Math.ceil((cy + VH) / tS));

  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      const t  = map[ti(c, r)];
      const sx = Math.round(c * tS - cx);
      const sy = Math.round(r * tS - cy);
      const sw = Math.ceil(tS);
      const sh = Math.ceil(tS);

      if (t === T.GRASS) {
        ctx.drawImage(IMG.grass, sx, sy, sw, sh);
      } else if (t === T.MOWED) {
        ctx.drawImage(IMG.grass_mowed, sx, sy, sw, sh);
      } else if (t === T.PATH) {
        ctx.drawImage(IMG.path_cobble, sx, sy, sw, sh);
      } else if (t === T.FLOWER) {
        ctx.drawImage(IMG.grass, sx, sy, sw, sh);
        drawFlower(sx, sy, (c*5 + r*7) % 5);
      } else if (t === T.BORDER) {
        ctx.fillStyle = '#4a3820';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.fillStyle = '#7a5e38';
        if ((c+r) % 4 === 0) ctx.fillRect(sx+sw*0.15, sy+sh*0.08, sw*0.7, sh*0.84);
      } else if (t === T.SOLID) {
        ctx.drawImage(IMG.grass, sx, sy, sw, sh);
      }
    }
  }

  // Sprites
  for (const sp of sprites) {
    const sx = sp.col * tS - cx;
    const sy = sp.row * tS - cy;
    if (sx > VW + tS*3 || sy > VH + tS*3 || sx < -tS*4 || sy < -tS*4) continue;
    switch(sp.type) {
      case 'house':    drawHouse(sx, sy);    break;
      case 'kennel':   drawKennel(sx, sy);   break;
      case 'dog':      drawDog(sx, sy);      break;
      case 'tent':     drawTent(sx, sy);     break;
      case 'campfire': drawCampfire(sx, sy); break;
      case 'otree':    drawOrchardTree(sx, sy); break;
      case 'tree':     drawTree(sx, sy);     break;
      case 'stump':    drawStump(sx, sy);    break;
      case 'grave':    drawGrave(sx, sy);    break;
      case 'sheep':    drawSheep(sx, sy);    break;
      case 'chicken':  drawChicken(sx, sy);  break;
    }
  }
}

function drawMowerOnScreen(cam) {
  drawMower(mower.x * GAME_SCALE - cam.cx, mower.y * GAME_SCALE - cam.cy, mower.angle);
}

// ── Minimap (top-left) ─────────────────────────────────────────────────────
const MM_W = 150;
const MM_H = Math.round(MM_W * MAP_ROWS / MAP_COLS);
const mmCanvas = document.createElement('canvas');
mmCanvas.width  = MAP_COLS;
mmCanvas.height = MAP_ROWS;
const mmCtx = mmCanvas.getContext('2d');
const mmImg = mmCtx.createImageData(MAP_COLS, MAP_ROWS);

function updateMinimap() {
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const i = (r * MAP_COLS + c) * 4;
      let col;
      switch(map[ti(c,r)]) {
        case T.GRASS:  col = [42,90,36];    break;
        case T.MOWED:  col = [122,191,94];  break;
        case T.PATH:   col = [178,148,98];  break;
        case T.SOLID:  col = [120,80,50];   break;
        case T.BORDER: col = [74,58,32];    break;
        case T.FLOWER: col = [200,80,200];  break;
        default:       col = [60,60,60];
      }
      mmImg.data[i]=col[0]; mmImg.data[i+1]=col[1]; mmImg.data[i+2]=col[2]; mmImg.data[i+3]=255;
    }
  }
  mmCtx.putImageData(mmImg, 0, 0);
}
updateMinimap();

function drawMinimap(cam) {
  const pad = 10;
  const x = VW - MM_W - pad;
  const y = BANNER_H + pad;

  // Hide if the mower's screen position is over the minimap area
  const msx = mower.x * GAME_SCALE - cam.cx;
  const msy = mower.y * GAME_SCALE - cam.cy;
  const margin = TILE * GAME_SCALE;
  if (msx > x - margin && msx < x + MM_W + margin &&
      msy > y - margin && msy < y + MM_H + margin) return;

  // Border
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x-2, y-2, MM_W+4, MM_H+4);

  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.drawImage(mmCanvas, x, y, MM_W, MM_H);
  ctx.restore();

  // Mower dot
  const mx = x + (mower.x / MAP_W) * MM_W;
  const my = y + (mower.y / MAP_H) * MM_H;
  ctx.fillStyle = '#ff3333';
  ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI*2); ctx.fill();

  // Viewport rect
  const vx = x + (cam.cx / (MAP_W * GAME_SCALE)) * MM_W;
  const vy = y + (cam.cy / (MAP_H * GAME_SCALE)) * MM_H;
  const vw = (VW / (MAP_W * GAME_SCALE)) * MM_W;
  const vh = (VH / (MAP_H * GAME_SCALE)) * MM_H;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);
}

// ── Banner ─────────────────────────────────────────────────────────────────
function drawBanner(dt) {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, VW, BANNER_H);
  // Pixel-art bottom edge line
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(0, BANNER_H-2, VW, 2);

  ctx.font = '9px "Press Start 2P"';
  const tw = ctx.measureText(bannerText).width;
  bannerScroll -= 55 * dt;
  if (bannerScroll < -tw) bannerScroll = VW;
  ctx.fillStyle = '#ffdd44';
  ctx.fillText(bannerText + bannerText, bannerScroll, BANNER_H - 9);
}

// ── Pixel-art D-pad buttons ────────────────────────────────────────────────
function drawPixelKey(x, y, size, dir, active) {
  const bv = Math.max(3, Math.round(size * 0.1));

  // Outermost dark border
  ctx.fillStyle = '#06060c';
  ctx.fillRect(x, y, size, size);
  // Shadow plane (bottom-right exposed edge)
  ctx.fillStyle = active ? '#0a140a' : '#10101a';
  ctx.fillRect(x+1, y+1, size-2, size-2);
  // Highlight plane (top-left exposed edge)
  ctx.fillStyle = active ? '#284a28' : '#2c2c3e';
  ctx.fillRect(x+1, y+1, size-1-bv, size-1-bv);
  // Face
  ctx.fillStyle = active ? '#162816' : '#1a1a26';
  ctx.fillRect(x+bv, y+bv, size-bv*2, size-bv*2);
  // Sparkle pixel cluster (top-left of face — classic retro key sheen)
  ctx.fillStyle = active ? '#4a7a4a' : '#404058';
  ctx.fillRect(x+bv+1, y+bv+1, 3, 3);
  ctx.fillStyle = active ? '#5a9a5a' : '#505070';
  ctx.fillRect(x+bv+1, y+bv+1, 1, 1);

  // Arrow with stem — proper directional arrow shape
  const ox = active ? 1 : 0; // press offset
  const acx = x + size/2 + ox;
  const acy = y + size/2 + ox;
  const aw = size * 0.26; // arrowhead half-width
  const ah = size * 0.24; // arrowhead depth
  const sw2 = size * 0.1; // stem half-width

  ctx.fillStyle = active ? '#68ee38' : '#7070a0';
  ctx.beginPath();
  switch(dir) {
    case 'up':
      ctx.moveTo(acx,       acy - ah*1.35);
      ctx.lineTo(acx + aw,  acy - ah*0.1);
      ctx.lineTo(acx + sw2, acy - ah*0.1);
      ctx.lineTo(acx + sw2, acy + ah*1.0);
      ctx.lineTo(acx - sw2, acy + ah*1.0);
      ctx.lineTo(acx - sw2, acy - ah*0.1);
      ctx.lineTo(acx - aw,  acy - ah*0.1);
      break;
    case 'down':
      ctx.moveTo(acx,       acy + ah*1.35);
      ctx.lineTo(acx + aw,  acy + ah*0.1);
      ctx.lineTo(acx + sw2, acy + ah*0.1);
      ctx.lineTo(acx + sw2, acy - ah*1.0);
      ctx.lineTo(acx - sw2, acy - ah*1.0);
      ctx.lineTo(acx - sw2, acy + ah*0.1);
      ctx.lineTo(acx - aw,  acy + ah*0.1);
      break;
    case 'left':
      ctx.moveTo(acx - ah*1.35, acy);
      ctx.lineTo(acx - ah*0.1,  acy - aw);
      ctx.lineTo(acx - ah*0.1,  acy - sw2);
      ctx.lineTo(acx + ah*1.0,  acy - sw2);
      ctx.lineTo(acx + ah*1.0,  acy + sw2);
      ctx.lineTo(acx - ah*0.1,  acy + sw2);
      ctx.lineTo(acx - ah*0.1,  acy + aw);
      break;
    case 'right':
      ctx.moveTo(acx + ah*1.35, acy);
      ctx.lineTo(acx + ah*0.1,  acy - aw);
      ctx.lineTo(acx + ah*0.1,  acy - sw2);
      ctx.lineTo(acx - ah*1.0,  acy - sw2);
      ctx.lineTo(acx - ah*1.0,  acy + sw2);
      ctx.lineTo(acx + ah*0.1,  acy + sw2);
      ctx.lineTo(acx + ah*0.1,  acy + aw);
      break;
  }
  ctx.closePath();
  ctx.fill();
}

function drawButtons() {
  const d = dpadLayout();
  const { bs } = d;
  const isUp    = keys['ArrowUp']    || BTN.up;
  const isDown  = keys['ArrowDown']  || BTN.down;
  const isLeft  = keys['ArrowLeft']  || BTN.left;
  const isRight = keys['ArrowRight'] || BTN.right;
  drawPixelKey(d.up.x,    d.up.y,    bs, 'up',    isUp);
  drawPixelKey(d.down.x,  d.down.y,  bs, 'down',  isDown);
  drawPixelKey(d.left.x,  d.left.y,  bs, 'left',  isLeft);
  drawPixelKey(d.right.x, d.right.y, bs, 'right', isRight);
}

// ── Timer + progress bar ───────────────────────────────────────────────────
function drawHUD() {
  const elapsed = performance.now() - startTime;
  const s = Math.floor(elapsed/1000), m = Math.floor(s/60), ss = s%60;
  const cs = Math.floor((elapsed%1000)/10);
  const str = `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;

  // Timer pill background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(10, BANNER_H + 4, 168, 36);
  ctx.font = '11px "Press Start 2P"';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(str, 18, BANNER_H + 22);

  // Progress bar
  const pct = Math.min(1, mowedCount / TOTAL_GRASS);
  const bx = 18, by = BANNER_H + 28, bw = 148, bh = 7;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = pct > 0.9 ? '#ffdd44' : '#7abf5e';
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
}

// ── Mowing + collision ─────────────────────────────────────────────────────
function mowUnder() {
  const hw = TILE * 0.44;
  const pts = [
    { x: mower.x, y: mower.y },
    { x: mower.x + Math.cos(mower.angle)*hw*0.7,       y: mower.y + Math.sin(mower.angle)*hw*0.7 },
    { x: mower.x - Math.cos(mower.angle)*hw*0.7,       y: mower.y - Math.sin(mower.angle)*hw*0.7 },
    { x: mower.x + Math.cos(mower.angle+Math.PI/2)*hw*0.5, y: mower.y + Math.sin(mower.angle+Math.PI/2)*hw*0.5 },
    { x: mower.x - Math.cos(mower.angle+Math.PI/2)*hw*0.5, y: mower.y - Math.sin(mower.angle+Math.PI/2)*hw*0.5 },
  ];
  let changed = false;
  for (const p of pts) {
    const c = Math.floor(p.x / TILE), r = Math.floor(p.y / TILE);
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) {
      const idx = ti(c, r);
      if (map[idx] === T.GRASS) { map[idx] = T.MOWED; mowedCount++; changed = true; }
    }
  }
  if (changed) updateMinimap();
}

function solidAt(wx, wy) {
  const c = Math.floor(wx/TILE), r = Math.floor(wy/TILE);
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return true;
  const t = map[ti(c,r)];
  return t === T.SOLID || t === T.BORDER;
}

function mowerCollides(nx, ny) {
  const h = TILE * 0.38;
  return [
    [nx+h, ny], [nx-h, ny], [nx, ny+h], [nx, ny-h],
    [nx+h*0.7, ny+h*0.7], [nx-h*0.7, ny+h*0.7],
    [nx+h*0.7, ny-h*0.7], [nx-h*0.7, ny-h*0.7],
  ].some(([x,y]) => solidAt(x, y));
}

function checkFlower() {
  const hw = TILE * 0.38;
  const pts = [
    { x: mower.x, y: mower.y },
    { x: mower.x + Math.cos(mower.angle)*hw*0.6, y: mower.y + Math.sin(mower.angle)*hw*0.6 },
    { x: mower.x - Math.cos(mower.angle)*hw*0.6, y: mower.y - Math.sin(mower.angle)*hw*0.6 },
  ];
  for (const p of pts) {
    const c = Math.floor(p.x / TILE), r = Math.floor(p.y / TILE);
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS && map[ti(c,r)] === T.FLOWER) {
      endGame('flower'); return;
    }
  }
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(dt) {
  const fwd   = keys['ArrowUp']    || BTN.up;
  const back  = keys['ArrowDown']  || BTN.down;
  const left  = keys['ArrowLeft']  || BTN.left;
  const right = keys['ArrowRight'] || BTN.right;

  if (fwd)       mower.speed =  MOWER_SPEED;
  else if (back) mower.speed = -MOWER_SPEED * 0.7;
  else           mower.speed *= 0.7;

  if (Math.abs(mower.speed) > 10) {
    const dir = mower.speed > 0 ? 1 : -1;
    if (left)  mower.angle -= TURN_SPEED * dt * dir;
    if (right) mower.angle += TURN_SPEED * dt * dir;
  }

  const nx = mower.x + Math.cos(mower.angle) * mower.speed * dt;
  const ny = mower.y + Math.sin(mower.angle) * mower.speed * dt;
  if (!mowerCollides(nx, mower.y)) mower.x = nx;
  if (!mowerCollides(mower.x, ny)) mower.y = ny;

  mowUnder();
  checkFlower();
  if (mowedCount >= TOTAL_GRASS) endGame('win');
}

// ── Home screen ────────────────────────────────────────────────────────────
function drawHome(dt) {
  const cam = getCam();
  drawMap(cam);
  drawMowerOnScreen(cam);
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(0, BANNER_H, VW, VH - BANNER_H);

  const tsz = Math.max(16, Math.min(30, VW * 0.038));
  ctx.textAlign = 'center';
  ctx.font = `${tsz}px "Press Start 2P"`;
  ctx.fillStyle = '#7bff4e';
  ctx.fillText('MOWING MADNESS', VW/2, VH/2 - tsz*2.2);

  const isz = Math.max(8, Math.min(11, VW * 0.014));
  ctx.font = `${isz}px "Press Start 2P"`;
  ctx.fillStyle = '#fff';
  ctx.fillText('▲ / ▼   FORWARD & REVERSE', VW/2, VH/2 + isz*0.5);
  ctx.fillText('◀ / ▶   TURN', VW/2, VH/2 + isz*3);
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('PRESS ANY ARROW TO START', VW/2, VH/2 + isz*7);
  ctx.textAlign = 'left';
}

// ── End screen ─────────────────────────────────────────────────────────────
function drawEnd() {
  const cam = getCam();
  drawMap(cam);
  drawMowerOnScreen(cam);
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, BANNER_H, VW, VH - BANNER_H);

  const won = endReason === 'win';
  const elapsed = endTime - startTime;
  const tsz = Math.max(14, Math.min(26, VW * 0.032));

  let titleText, titleColor;
  if (endReason === 'flower') { titleText = 'FLOWER CRUSHED!'; titleColor = '#ff44cc'; }
  else if (won)               { titleText = 'LAWN MOWED!';     titleColor = '#7bff4e'; }
  else                        { titleText = 'QUIT';            titleColor = '#ff6644'; }

  ctx.textAlign = 'center';
  ctx.font = `${tsz}px "Press Start 2P"`;
  ctx.fillStyle = titleColor;
  ctx.fillText(titleText, VW/2, VH/2 - tsz*2);

  ctx.font = `${Math.max(9, tsz*0.58)}px "Press Start 2P"`;
  ctx.fillStyle = '#fff';
  ctx.fillText('TIME: ' + fmtTime(elapsed), VW/2, VH/2 + tsz*0.2);

  if (won) {
    const sc = loadScores();
    const rank = sc.findIndex(v => v === elapsed) + 1;
    if (rank > 0) ctx.fillText(`RANK #${rank} OF ${sc.length}`, VW/2, VH/2 + tsz*1.6);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = `${Math.max(7, tsz*0.4)}px "Press Start 2P"`;
  ctx.fillText('PRESS SPACE TO MOW AGAIN', VW/2, VH/2 + tsz*3.2);
  ctx.textAlign = 'left';
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop(ms) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (ms - lastMs) / 1000);
  lastMs = ms;

  ctx.clearRect(0, 0, VW, VH);
  ctx.imageSmoothingEnabled = false;

  if (gameState === STATE.HOME) {
    drawHome(dt);
    drawBanner(dt);
    drawButtons();
  } else if (gameState === STATE.PLAYING) {
    const cam = getCam();
    drawMap(cam);
    drawMowerOnScreen(cam);
    drawBanner(dt);
    drawHUD();
    drawMinimap(cam);
    drawButtons();
    update(dt);
  } else {
    drawEnd();
    drawBanner(dt);
    drawButtons();
  }
}

requestAnimationFrame(ts => { lastMs = ts; requestAnimationFrame(loop); });
</script>
