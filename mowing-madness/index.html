<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Mowing Madness — mow the entire lawn as fast as you can while avoiding obstacles. A top-down 2D speedrunner.">
<title>Mowing Madness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Constants ──────────────────────────────────────────────────────────────
const TILE     = 16;
const MAP_COLS = 64;
const MAP_ROWS = 48;
const MAP_W    = MAP_COLS * TILE;
const MAP_H    = MAP_ROWS * TILE;
const BANNER_H = 30;

// GAME_SCALE: screen pixels per world pixel. Recomputed on resize so ~28 tiles
// are visible across the shorter viewport dimension, giving a scrollable world.
let GAME_SCALE = 2;
let VW = 0, VH = 0;

function resize() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width  = VW;
  canvas.height = VH;
  // target ~28 tiles visible on the narrow axis
  const minDim = Math.min(VW, VH);
  GAME_SCALE = Math.max(1.5, Math.min(4, minDim / (28 * TILE)));
}
resize();
window.addEventListener('resize', resize);

// ── Tile types ─────────────────────────────────────────────────────────────
const T = { GRASS: 0, MOWED: 1, PATH: 2, SOLID: 3, BORDER: 5 };

// ── Map ────────────────────────────────────────────────────────────────────
const map = new Uint8Array(MAP_COLS * MAP_ROWS).fill(T.GRASS);

function ti(c, r) { return r * MAP_COLS + c; }
function setRect(c0, r0, c1, r1, t) {
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      map[ti(c, r)] = t;
}
function setTile(c, r, t) {
  if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) map[ti(c, r)] = t;
}

// Border
setRect(0, 0, MAP_COLS-1, 0, T.BORDER);
setRect(0, MAP_ROWS-1, MAP_COLS-1, MAP_ROWS-1, T.BORDER);
setRect(0, 0, 0, MAP_ROWS-1, T.BORDER);
setRect(MAP_COLS-1, 0, MAP_COLS-1, MAP_ROWS-1, T.BORDER);

// House
setRect(4, 3, 14, 13, T.SOLID);
setRect(8, 13, 10, 18, T.PATH);

// Orchard
const orchardTrees = [
  [48,4],[51,4],[54,4],[57,4],[60,4],
  [48,8],[51,8],[54,8],[57,8],[60,8],
  [48,12],[51,12],[54,12],
];
orchardTrees.forEach(([c,r]) => {
  setTile(c,r,T.SOLID); setTile(c+1,r,T.SOLID);
  setTile(c,r+1,T.SOLID); setTile(c+1,r+1,T.SOLID);
});

// Trees
const trees = [
  [20,3],[22,6],[35,3],[40,5],
  [5,20],[3,30],[7,38],[18,42],[30,44],[45,40],[55,35],[60,28],[62,18],
];
trees.forEach(([c,r]) => {
  setTile(c,r,T.SOLID); setTile(c+1,r,T.SOLID);
  setTile(c,r+1,T.SOLID); setTile(c+1,r+1,T.SOLID);
});

// Stumps
const stumps = [[26,8],[33,15],[50,22],[15,33],[40,38]];
stumps.forEach(([c,r]) => setTile(c,r,T.SOLID));

// Gravestones — scattered around the map
const graves = [[25,10],[43,17],[16,30],[38,36],[52,28],[20,45],[58,16],[10,40]];
graves.forEach(([c,r]) => setTile(c,r,T.SOLID));

// Tent + campfire
setRect(5,38,9,43,T.SOLID);
setTile(12,41,T.SOLID);

// Kennel + dog
setRect(18,20,21,23,T.SOLID);
setTile(23,21,T.SOLID);

// Animals
[[30,20],[32,22],[28,25],[42,30],[44,28],[46,32]].forEach(([c,r]) => setTile(c,r,T.SOLID));

// Paths
for (let c = 1; c < MAP_COLS-1; c++) setTile(c, 22, T.PATH);
for (let r = 14; r < 46; r++) setTile(32, r, T.PATH);

function countMowable() {
  let n = 0;
  for (let i = 0; i < map.length; i++) if (map[i] === T.GRASS) n++;
  return n;
}
const TOTAL_GRASS = countMowable();

// ── Per-tile grass noise ───────────────────────────────────────────────────
const grassNoise = new Uint8Array(MAP_COLS * MAP_ROWS);
{
  let seed = 42;
  const lcg = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 4294967296; };
  for (let i = 0; i < grassNoise.length; i++) grassNoise[i] = Math.floor(lcg() * 38);
}

// ── Sprite drawing ─────────────────────────────────────────────────────────
// All take world-pixel (sx, sy) = top-left of tile, and use TILE * GAME_SCALE.

function drawMower(screenX, screenY, angle) {
  const s = TILE * GAME_SCALE;
  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.rotate(angle);
  ctx.fillStyle = '#d42b2b';
  ctx.fillRect(-s*0.45, -s*0.35, s*0.9, s*0.7);
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(-s*0.1, s*0.25, s*0.2, s*0.25);
  ctx.fillStyle = '#222';
  ctx.fillRect(-s*0.45, -s*0.42, s*0.22, s*0.14);
  ctx.fillRect( s*0.23, -s*0.42, s*0.22, s*0.14);
  ctx.fillRect(-s*0.45,  s*0.28, s*0.22, s*0.14);
  ctx.fillRect( s*0.23,  s*0.28, s*0.22, s*0.14);
  ctx.fillStyle = '#bbb';
  ctx.fillRect(-s*0.25, -s*0.09, s*0.5, s*0.05);
  ctx.restore();
}

function drawTree(sx, sy) {
  const s = TILE * GAME_SCALE;
  // Trunk — dark outline then grain
  ctx.fillStyle = '#2e1508';
  ctx.fillRect(sx+s*0.3, sy+s*0.42, s*0.4, s*0.62);
  ctx.fillStyle = '#7a4e28';
  ctx.fillRect(sx+s*0.34, sy+s*0.45, s*0.32, s*0.58);
  ctx.fillStyle = '#5a3618';
  ctx.fillRect(sx+s*0.44, sy+s*0.52, s*0.07, s*0.46);
  // Knot
  ctx.fillStyle = '#3a2010';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.68, s*0.08, s*0.06, 0, 0, Math.PI*2); ctx.fill();
  // Root flares
  ctx.fillStyle = '#4a2e10';
  ctx.fillRect(sx+s*0.12, sy+s*0.88, s*0.22, s*0.12);
  ctx.fillRect(sx+s*0.66, sy+s*0.88, s*0.22, s*0.12);
  // Canopy — 3-layer Terraria pom-pom
  ctx.fillStyle = '#0d4008';
  ctx.beginPath(); ctx.arc(sx+s*0.22, sy+s*0.5,  s*0.3,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.78, sy+s*0.46, s*0.28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.5,  sy+s*0.62, s*0.26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a6e14';
  ctx.beginPath(); ctx.arc(sx+s*0.18, sy+s*0.4,  s*0.32, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.82, sy+s*0.36, s*0.29, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.5,  sy+s*0.24, s*0.38, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.5,  sy+s*0.5,  s*0.28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2ea020';
  ctx.beginPath(); ctx.arc(sx+s*0.5,  sy+s*0.14, s*0.3,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.2,  sy+s*0.3,  s*0.24, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.8,  sy+s*0.27, s*0.22, 0, Math.PI*2); ctx.fill();
  // Highlight specks
  ctx.fillStyle = '#50cc40';
  ctx.beginPath(); ctx.arc(sx+s*0.42, sy+s*0.09, s*0.14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*0.18, sy+s*0.24, s*0.1,  0, Math.PI*2); ctx.fill();
}

function drawStump(sx, sy) {
  const s = TILE * GAME_SCALE;
  // Side roots
  ctx.fillStyle = '#3e2008';
  ctx.fillRect(sx+s*0.02, sy+s*0.55, s*0.2,  s*0.38);
  ctx.fillRect(sx+s*0.78, sy+s*0.55, s*0.2,  s*0.38);
  ctx.fillRect(sx+s*0.22, sy+s*0.78, s*0.56, s*0.2);
  // Trunk body
  ctx.fillStyle = '#2e1508';
  ctx.fillRect(sx+s*0.12, sy+s*0.18, s*0.76, s*0.7);
  ctx.fillStyle = '#7a4e28';
  ctx.fillRect(sx+s*0.16, sy+s*0.22, s*0.68, s*0.64);
  // Grain lines
  ctx.fillStyle = '#5a3618';
  ctx.fillRect(sx+s*0.36, sy+s*0.28, s*0.06, s*0.5);
  ctx.fillRect(sx+s*0.58, sy+s*0.28, s*0.06, s*0.5);
  // Cross-section top
  ctx.fillStyle = '#3e2008';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.3, s*0.34, s*0.14, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#9a6840';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.28, s*0.28, s*0.11, 0, 0, Math.PI*2); ctx.fill();
  // Ring
  ctx.strokeStyle = '#6a4020';
  ctx.lineWidth = Math.max(1, s*0.04);
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.28, s*0.17, s*0.07, 0, 0, Math.PI*2); ctx.stroke();
  // Heartwood dot
  ctx.fillStyle = '#4e2c10';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.28, s*0.06, s*0.025, 0, 0, Math.PI*2); ctx.fill();
}

function drawGrave(sx, sy) {
  const s = TILE * GAME_SCALE;
  // Earth mound shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.96, s*0.44, s*0.1, 0, 0, Math.PI*2); ctx.fill();
  // Mound
  ctx.fillStyle = '#4a6a28';
  ctx.beginPath(); ctx.ellipse(sx+s*0.5, sy+s*0.93, s*0.38, s*0.08, 0, 0, Math.PI*2); ctx.fill();
  // Stone outline (dark border)
  ctx.fillStyle = '#282830';
  ctx.fillRect(sx+s*0.2, sy+s*0.1, s*0.6, s*0.82);
  ctx.beginPath(); ctx.arc(sx+s*0.5, sy+s*0.22, s*0.3, Math.PI, 0); ctx.fill();
  // Stone face
  ctx.fillStyle = '#6a6a7a';
  ctx.fillRect(sx+s*0.24, sy+s*0.14, s*0.52, s*0.76);
  ctx.beginPath(); ctx.arc(sx+s*0.5, sy+s*0.22, s*0.26, Math.PI, 0); ctx.fill();
  // Left-edge highlight
  ctx.fillStyle = '#8a8a9a';
  ctx.fillRect(sx+s*0.24, sy+s*0.14, s*0.07, s*0.7);
  ctx.fillRect(sx+s*0.24, sy+s*0.14, s*0.52, s*0.05);
  // Cross
  ctx.fillStyle = '#30303a';
  ctx.fillRect(sx+s*0.46, sy+s*0.3,  s*0.08, s*0.38); // vertical
  ctx.fillRect(sx+s*0.33, sy+s*0.42, s*0.34, s*0.08); // horizontal
  // Crack detail
  ctx.fillStyle = '#50505e';
  ctx.fillRect(sx+s*0.58, sy+s*0.55, s*0.03, s*0.2);
}

function drawHouse(sx, sy) {
  const s = TILE * GAME_SCALE;
  const w = 11*s, h = 11*s;

  // Stone foundation — bottom 2 tile rows
  for (let fc = 0; fc < 11; fc++) {
    for (let fr = 9; fr < 11; fr++) {
      const fx = sx+fc*s, fy = sy+fr*s;
      ctx.fillStyle = '#48484e'; ctx.fillRect(fx, fy, s, s);
      ctx.fillStyle = '#707078'; ctx.fillRect(fx+2, fy+2, s-4, s-4);
      ctx.fillStyle = '#888890'; ctx.fillRect(fx+2, fy+2, s-4, 2);
      ctx.fillStyle = '#888890'; ctx.fillRect(fx+2, fy+2, 2, s-4);
      ctx.fillStyle = '#38383e'; ctx.fillRect(fx+2, fy+s-4, s-4, 2);
      ctx.fillStyle = '#38383e'; ctx.fillRect(fx+s-4, fy+2, 2, s-4);
    }
  }
  // Wooden plank walls — rows 1-8
  ctx.fillStyle = '#5a3010'; ctx.fillRect(sx, sy+s, w, 8*s);
  ctx.fillStyle = '#8a5428'; ctx.fillRect(sx+2, sy+s+2, w-4, 8*s-4);
  // Horizontal plank lines
  ctx.fillStyle = '#5a3010';
  for (let row = 1; row <= 8; row++) ctx.fillRect(sx+2, sy+row*s, w-4, 2);
  // Vertical post lines every 2 tiles
  for (let col = 0; col <= 10; col += 2) ctx.fillRect(sx+col*s, sy+s, 3, 8*s);

  // Chimney (behind roof)
  ctx.fillStyle = '#38383e'; ctx.fillRect(sx+w*0.71, sy-s*1.6, s*1.2, s*2.2);
  ctx.fillStyle = '#646470'; ctx.fillRect(sx+w*0.71+2, sy-s*1.6+2, s*1.2-4, s*2.2-2);
  // Chimney mortar lines
  ctx.fillStyle = '#38383e';
  for (let i = 0; i < 3; i++) ctx.fillRect(sx+w*0.71+2, sy-s*1.6 + i*s*0.7 + s*0.5, s*1.2-4, 2);

  // Roof — dark outline then fill
  ctx.fillStyle = '#1e0e08';
  ctx.beginPath();
  ctx.moveTo(sx-s*0.6, sy+s*0.7); ctx.lineTo(sx+w/2, sy-s*2.2); ctx.lineTo(sx+w+s*0.6, sy+s*0.7);
  ctx.closePath(); ctx.fill();
  // Left face (lighter red)
  ctx.fillStyle = '#aa2828';
  ctx.beginPath();
  ctx.moveTo(sx-s*0.45, sy+s*0.65); ctx.lineTo(sx+w/2, sy-s*2.0); ctx.lineTo(sx+w/2, sy+s*0.65);
  ctx.closePath(); ctx.fill();
  // Right face (darker)
  ctx.fillStyle = '#882020';
  ctx.beginPath();
  ctx.moveTo(sx+w/2, sy-s*2.0); ctx.lineTo(sx+w+s*0.45, sy+s*0.65); ctx.lineTo(sx+w/2, sy+s*0.65);
  ctx.closePath(); ctx.fill();
  // Ridge cap
  ctx.fillStyle = '#cc3838';
  ctx.fillRect(sx+w/2-s*0.1, sy-s*2.15, s*0.2, s*2.8);
  // Smoke puffs
  ctx.fillStyle = 'rgba(200,200,200,0.35)';
  ctx.beginPath(); ctx.arc(sx+w*0.77, sy-s*1.85, s*0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+w*0.73, sy-s*2.18, s*0.13, 0, Math.PI*2); ctx.fill();

  // Windows (glowing yellow-white interior)
  const wins = [[sx+w*0.1, sy+h*0.14], [sx+w*0.64, sy+h*0.14]];
  wins.forEach(([wx, wy]) => {
    const ww = s*2.2, wh = s*2.0;
    ctx.fillStyle = '#2a1a08'; ctx.fillRect(wx-2, wy-2, ww+4, wh+4);
    ctx.fillStyle = '#ffe878'; ctx.fillRect(wx, wy, ww, wh);
    ctx.fillStyle = 'rgba(255,220,80,0.5)'; ctx.fillRect(wx, wy, ww, wh);
    // Frame cross
    ctx.fillStyle = '#4a2c10';
    ctx.fillRect(wx+ww/2-2, wy, 4, wh);
    ctx.fillRect(wx, wy+wh/2-2, ww, 4);
    // Frame border
    ctx.strokeStyle = '#4a2c10'; ctx.lineWidth = Math.max(2, s*0.12);
    ctx.strokeRect(wx, wy, ww, wh);
  });

  // Door
  const dx = sx+w*0.42, dy = sy+h*0.54, dw = s*2.0, dh = h*0.46;
  ctx.fillStyle = '#1e0e06'; ctx.fillRect(dx-2, dy-2, dw+4, dh+2);
  ctx.fillStyle = '#5a3010'; ctx.fillRect(dx, dy, dw, dh);
  ctx.fillStyle = '#7a4820'; ctx.fillRect(dx+3, dy+3, dw-6, dh-3);
  // Door panel lines
  ctx.fillStyle = '#5a3010';
  ctx.fillRect(dx+3, dy+dh*0.45, dw-6, 2);
  ctx.fillRect(dx+dw*0.5-1, dy+3, 2, dh-3);
  // Knob
  ctx.fillStyle = '#c8a030';
  ctx.beginPath(); ctx.arc(dx+dw*0.76, dy+dh*0.55, s*0.1, 0, Math.PI*2); ctx.fill();
}

function drawKennel(sx, sy) {
  const s = TILE * GAME_SCALE;
  const w = 4*s, h = 4*s;
  // Stone base strip
  ctx.fillStyle = '#48484e'; ctx.fillRect(sx, sy+h*0.75, w, h*0.25);
  ctx.fillStyle = '#70707a'; ctx.fillRect(sx+2, sy+h*0.75+2, w-4, h*0.25-2);
  // Plank walls
  ctx.fillStyle = '#3e2008'; ctx.fillRect(sx, sy+h*0.28, w, h*0.5);
  ctx.fillStyle = '#7a4820'; ctx.fillRect(sx+2, sy+h*0.28+2, w-4, h*0.5-2);
  // Plank grain lines
  ctx.fillStyle = '#3e2008';
  for (let row = 0; row < 3; row++) ctx.fillRect(sx+2, sy+h*0.28 + (h*0.5/3)*row, w-4, 2);
  ctx.fillRect(sx+w*0.5-1, sy+h*0.28+2, 2, h*0.5-4);
  // Roof outline
  ctx.fillStyle = '#180a04';
  ctx.beginPath();
  ctx.moveTo(sx-s*0.18, sy+h*0.32); ctx.lineTo(sx+w/2, sy+h*0.02); ctx.lineTo(sx+w+s*0.18, sy+h*0.32);
  ctx.closePath(); ctx.fill();
  // Roof left face
  ctx.fillStyle = '#aa2828';
  ctx.beginPath();
  ctx.moveTo(sx-s*0.12, sy+h*0.3); ctx.lineTo(sx+w/2, sy+h*0.05); ctx.lineTo(sx+w/2, sy+h*0.3);
  ctx.closePath(); ctx.fill();
  // Roof right face
  ctx.fillStyle = '#882020';
  ctx.beginPath();
  ctx.moveTo(sx+w/2, sy+h*0.05); ctx.lineTo(sx+w+s*0.12, sy+h*0.3); ctx.lineTo(sx+w/2, sy+h*0.3);
  ctx.closePath(); ctx.fill();
  // Ridge
  ctx.fillStyle = '#cc3838'; ctx.fillRect(sx+w/2-s*0.08, sy+h*0.03, s*0.16, h*0.28);
  // Door arch opening
  ctx.fillStyle = '#0e0806';
  ctx.beginPath();
  ctx.arc(sx+w/2, sy+h*0.66, s*0.52, Math.PI, 0);
  ctx.rect(sx+w/2-s*0.52, sy+h*0.66, s*1.04, s*0.42);
  ctx.fill();
  // Door frame highlight
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = Math.max(1, s*0.1);
  ctx.beginPath();
  ctx.arc(sx+w/2, sy+h*0.66, s*0.52, Math.PI, 0);
  ctx.stroke();
}

function drawDog(sx, sy) {
  const s = TILE * GAME_SCALE;
  ctx.fillStyle = '#c8844a';
  ctx.fillRect(sx+s*0.1, sy+s*0.35, s*0.6, s*0.35);
  ctx.fillRect(sx+s*0.55, sy+s*0.2, s*0.35, s*0.3);
  ctx.fillStyle = '#a0602a';
  ctx.fillRect(sx+s*0.58, sy+s*0.1, s*0.1, s*0.18);
  ctx.fillRect(sx+s*0.76, sy+s*0.1, s*0.1, s*0.18);
  ctx.fillStyle = '#c8844a';
  ctx.fillRect(sx+s*0.02, sy+s*0.2, s*0.12, s*0.2);
  ctx.fillStyle = '#a0602a';
  ctx.fillRect(sx+s*0.15, sy+s*0.65, s*0.12, s*0.22);
  ctx.fillRect(sx+s*0.35, sy+s*0.65, s*0.12, s*0.22);
  ctx.fillRect(sx+s*0.5,  sy+s*0.65, s*0.12, s*0.22);
}

function drawSheep(sx, sy) {
  const s = TILE * GAME_SCALE;
  ctx.fillStyle = '#eee';
  ctx.fillRect(sx+s*0.1, sy+s*0.2, s*0.75, s*0.5);
  ctx.fillStyle = '#555';
  ctx.fillRect(sx+s*0.7, sy+s*0.3, s*0.2, s*0.22);
  ctx.fillStyle = '#888';
  ctx.fillRect(sx+s*0.15, sy+s*0.65, s*0.12, s*0.2);
  ctx.fillRect(sx+s*0.55, sy+s*0.65, s*0.12, s*0.2);
}

function drawChicken(sx, sy) {
  const s = TILE * GAME_SCALE;
  ctx.fillStyle = '#f0e0a0';
  ctx.fillRect(sx+s*0.2, sy+s*0.3, s*0.55, s*0.4);
  ctx.fillStyle = '#d44';
  ctx.fillRect(sx+s*0.62, sy+s*0.18, s*0.22, s*0.22);
  ctx.fillStyle = '#fa0';
  ctx.fillRect(sx+s*0.8,  sy+s*0.28, s*0.14, s*0.08);
  ctx.fillRect(sx+s*0.3,  sy+s*0.68, s*0.08, s*0.2);
  ctx.fillRect(sx+s*0.52, sy+s*0.68, s*0.08, s*0.2);
}

function drawCampfire(sx, sy) {
  const s = TILE * GAME_SCALE;
  ctx.fillStyle = '#6B3A2A';
  ctx.save();
  ctx.translate(sx+s*0.5, sy+s*0.7);
  ctx.rotate(0.5);  ctx.fillRect(-s*0.4, -s*0.07, s*0.8, s*0.14);
  ctx.rotate(-1);   ctx.fillRect(-s*0.4, -s*0.07, s*0.8, s*0.14);
  ctx.restore();
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(sx+s*0.5, sy+s*0.15); ctx.lineTo(sx+s*0.3, sy+s*0.65); ctx.lineTo(sx+s*0.7, sy+s*0.65);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(sx+s*0.5, sy+s*0.25); ctx.lineTo(sx+s*0.38, sy+s*0.62); ctx.lineTo(sx+s*0.62, sy+s*0.62);
  ctx.closePath(); ctx.fill();
}

function drawTent(sx, sy) {
  const s = TILE * GAME_SCALE;
  const w = 5*s, h = 6*s;
  // Dark outline silhouette
  ctx.fillStyle = '#1a2a18';
  ctx.beginPath();
  ctx.moveTo(sx-s*0.05, sy+h+s*0.05); ctx.lineTo(sx+w/2, sy-s*0.05); ctx.lineTo(sx+w+s*0.05, sy+h+s*0.05);
  ctx.closePath(); ctx.fill();
  // Right face (darker canvas)
  ctx.fillStyle = '#3a5a28';
  ctx.beginPath();
  ctx.moveTo(sx+w/2, sy+h); ctx.lineTo(sx+w/2, sy+h*0.06); ctx.lineTo(sx+w-s*0.06, sy+h);
  ctx.closePath(); ctx.fill();
  // Left face (lighter canvas)
  ctx.fillStyle = '#527a38';
  ctx.beginPath();
  ctx.moveTo(sx+s*0.06, sy+h); ctx.lineTo(sx+w/2, sy+h*0.06); ctx.lineTo(sx+w/2, sy+h);
  ctx.closePath(); ctx.fill();
  // Canvas seam lines on left face
  ctx.strokeStyle = '#3a5a28'; ctx.lineWidth = Math.max(1, s*0.06);
  for (let i = 1; i <= 3; i++) {
    const t2 = i / 4;
    const lx = sx + w/2 * (1 - t2);
    const ly = sy + h*0.06 + (h*0.94) * t2;
    ctx.beginPath(); ctx.moveTo(sx+s*0.06 + (w/2-s*0.06)*t2*0.5, sy+h);
    ctx.lineTo(lx, ly); ctx.stroke();
  }
  // Door flap (darker, center)
  ctx.fillStyle = '#1a2810';
  ctx.beginPath();
  ctx.moveTo(sx+w*0.37, sy+h+s*0.02); ctx.lineTo(sx+w/2, sy+h*0.42); ctx.lineTo(sx+w*0.63, sy+h+s*0.02);
  ctx.closePath(); ctx.fill();
  // Centre pole hint
  ctx.fillStyle = '#8a6030'; ctx.fillRect(sx+w/2-s*0.07, sy+h*0.05, s*0.14, s*0.5);
  // Guy ropes
  ctx.strokeStyle = '#8a6030'; ctx.lineWidth = Math.max(1, s*0.05);
  ctx.beginPath(); ctx.moveTo(sx+s*0.18, sy+h-s*0.1); ctx.lineTo(sx-s*0.35, sy+h+s*0.3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+w-s*0.18, sy+h-s*0.1); ctx.lineTo(sx+w+s*0.35, sy+h+s*0.3); ctx.stroke();
  // Stakes
  ctx.fillStyle = '#6a4820';
  ctx.fillRect(sx-s*0.4,  sy+h+s*0.25, s*0.1, s*0.22);
  ctx.fillRect(sx+w+s*0.3, sy+h+s*0.25, s*0.1, s*0.22);
}

function drawOrchardTree(sx, sy) {
  const s = TILE * GAME_SCALE;
  // Trunk
  ctx.fillStyle = '#2e1508';
  ctx.fillRect(sx+s*0.65, sy+s*0.62, s*0.7, s*1.38);
  ctx.fillStyle = '#7a4e28';
  ctx.fillRect(sx+s*0.69, sy+s*0.66, s*0.62, s*1.32);
  ctx.fillStyle = '#5a3618';
  ctx.fillRect(sx+s*0.9, sy+s*0.75, s*0.07, s*1.1);
  // Root flares
  ctx.fillStyle = '#4a2e10';
  ctx.fillRect(sx+s*0.42, sy+s*1.8, s*0.28, s*0.18);
  ctx.fillRect(sx+s*1.3, sy+s*1.8, s*0.28, s*0.18);
  // Canopy — apple-tree yellowy-green, pom-pom style
  ctx.fillStyle = '#0e4810';
  ctx.beginPath(); ctx.arc(sx+s*0.52, sy+s*0.58, s*0.48, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.12, sy+s*0.52, s*0.44, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.5,  sy+s*0.64, s*0.38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#207818';
  ctx.beginPath(); ctx.arc(sx+s*0.5,  sy+s*0.44, s*0.5,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.1,  sy+s*0.38, s*0.44, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.48, sy+s*0.5,  s*0.38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#34a428';
  ctx.beginPath(); ctx.arc(sx+s*0.46, sy+s*0.3,  s*0.4,  0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.06, sy+s*0.24, s*0.34, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.46, sy+s*0.36, s*0.3,  0, Math.PI*2); ctx.fill();
  // Highlight specks
  ctx.fillStyle = '#58cc44';
  ctx.beginPath(); ctx.arc(sx+s*0.4,  sy+s*0.22, s*0.16, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+s*1.0,  sy+s*0.16, s*0.14, 0, Math.PI*2); ctx.fill();
  // Apples
  const applePos = [[0.38,0.5],[0.7,0.42],[1.02,0.55],[1.3,0.46],[1.52,0.58],[0.54,0.64],[1.18,0.65]];
  applePos.forEach(([dx,dy]) => {
    ctx.fillStyle = '#cc1c1c';
    ctx.beginPath(); ctx.arc(sx+s*dx, sy+s*dy, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ee4444';
    ctx.beginPath(); ctx.arc(sx+s*dx-s*0.03, sy+s*dy-s*0.04, s*0.04, 0, Math.PI*2); ctx.fill();
    // Tiny leaf
    ctx.fillStyle = '#208010';
    ctx.fillRect(sx+s*dx-s*0.01, sy+s*dy-s*0.14, s*0.06, s*0.06);
  });
}

// ── Sprites list ───────────────────────────────────────────────────────────
const sprites = [];
sprites.push({ type: 'house',    col: 4,  row: 3  });
sprites.push({ type: 'kennel',   col: 18, row: 20 });
sprites.push({ type: 'dog',      col: 23, row: 21 });
sprites.push({ type: 'tent',     col: 5,  row: 38 });
sprites.push({ type: 'campfire', col: 12, row: 41 });
orchardTrees.forEach(([c,r])  => sprites.push({ type: 'otree',   col: c, row: r }));
trees.forEach(([c,r])         => sprites.push({ type: 'tree',    col: c, row: r }));
stumps.forEach(([c,r])        => sprites.push({ type: 'stump',   col: c, row: r }));
graves.forEach(([c,r])        => sprites.push({ type: 'grave',   col: c, row: r }));
[[30,20],[32,22],[28,25]].forEach(([c,r]) => sprites.push({ type: 'sheep',   col: c, row: r }));
[[42,30],[44,28],[46,32]].forEach(([c,r]) => sprites.push({ type: 'chicken', col: c, row: r }));

// ── Mower ──────────────────────────────────────────────────────────────────
const mower = { x: 9.5*TILE, y: 16.5*TILE, angle: 0, speed: 0 };
const MOWER_SPEED = 4.5 * TILE;
const TURN_SPEED  = 3.2;

// ── Scores ─────────────────────────────────────────────────────────────────
function loadScores() {
  try { return JSON.parse(localStorage.getItem('mm_scores') || '[]'); } catch { return []; }
}
function saveScore(ms) {
  const s = loadScores(); s.push(ms); s.sort((a,b) => a-b); s.splice(5);
  localStorage.setItem('mm_scores', JSON.stringify(s));
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), ss = s%60;
  return `${String(m).padStart(2,'0')}m${String(ss).padStart(2,'0')}s`;
}

// ── Banner ─────────────────────────────────────────────────────────────────
let bannerText = '', bannerScroll = 0;
function buildBanner() {
  const s = loadScores();
  bannerText = s.length
    ? '  TOP SCORES:  ' + s.slice(0,5).map((t,i) => `#${i+1} ${fmtTime(t)}`).join('   ') + '  '
    : '  MOWING MADNESS — NO SCORES YET — MOW THE LAWN!  ';
}
buildBanner();

// ── Game state ─────────────────────────────────────────────────────────────
const STATE = { HOME: 0, PLAYING: 1, END: 2 };
let gameState = STATE.HOME;
let startTime = 0, endTime = 0, mowedCount = 0, lastMs = 0;

const keys = {};
document.addEventListener('keydown', e => {
  // Don't capture keys used for page scroll when game isn't focused on movement
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (gameState === STATE.HOME && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) { startGame(); return; }
  if (gameState === STATE.END && e.code === 'Space')         { startGame(); return; }
  if (gameState === STATE.PLAYING && e.code === 'Escape')    { endGame(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── On-screen D-pad ────────────────────────────────────────────────────────
const BTN = { up: false, down: false, left: false, right: false };

function btnSize() { return Math.round(Math.max(36, Math.min(56, VW * 0.065))); }

function dpadLayout() {
  const bs = btnSize();
  const pad = 14;
  const bx = VW - bs*3 - pad;
  const by = VH - bs*3 - pad;
  return {
    up:    { x: bx+bs,   y: by       },
    down:  { x: bx+bs,   y: by+bs*2  },
    left:  { x: bx,      y: by+bs    },
    right: { x: bx+bs*2, y: by+bs    },
    bs,
  };
}

function hitButton(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (VW / rect.width);
  const my = (e.clientY - rect.top)  * (VH / rect.height);
  const d = dpadLayout();
  const { bs } = d;
  for (const dir of ['up','down','left','right']) {
    const b = d[dir];
    if (mx >= b.x && mx <= b.x+bs && my >= b.y && my <= b.y+bs) return dir;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  const b = hitButton(e); if (b) { BTN[b] = true; e.preventDefault(); }
});
canvas.addEventListener('pointermove', e => {
  // allow sliding between buttons
  if (e.buttons === 0) return;
  const b = hitButton(e);
  Object.keys(BTN).forEach(k => BTN[k] = false);
  if (b) BTN[b] = true;
});
canvas.addEventListener('pointerup',     () => Object.keys(BTN).forEach(k => BTN[k] = false));
canvas.addEventListener('pointercancel', () => Object.keys(BTN).forEach(k => BTN[k] = false));

// ── Game flow ──────────────────────────────────────────────────────────────
function startGame() {
  for (let i = 0; i < map.length; i++) if (map[i] === T.MOWED) map[i] = T.GRASS;
  mower.x = 9.5*TILE; mower.y = 16.5*TILE; mower.angle = 0; mower.speed = 0;
  mowedCount = 0;
  startTime = performance.now();
  gameState = STATE.PLAYING;
  updateMinimap();
  buildBanner();
}

function endGame() {
  if (gameState !== STATE.PLAYING) return;
  endTime = performance.now();
  if (mowedCount >= TOTAL_GRASS) saveScore(endTime - startTime);
  buildBanner();
  gameState = STATE.END;
}

// ── Camera ─────────────────────────────────────────────────────────────────
// Returns camera offset in screen pixels (top-left world pixel that maps to screen (0,0))
function getCam() {
  let cx = mower.x * GAME_SCALE - VW / 2;
  let cy = mower.y * GAME_SCALE - VH / 2;
  cx = Math.max(0, Math.min(MAP_W * GAME_SCALE - VW, cx));
  cy = Math.max(0, Math.min(MAP_H * GAME_SCALE - VH, cy));
  return { cx, cy };
}

// ── Map rendering ──────────────────────────────────────────────────────────
function drawMap(cam) {
  const { cx, cy } = cam;
  const tS = TILE * GAME_SCALE;

  const c0 = Math.max(0, Math.floor(cx / tS));
  const r0 = Math.max(0, Math.floor(cy / tS));
  const c1 = Math.min(MAP_COLS-1, Math.ceil((cx + VW) / tS));
  const r1 = Math.min(MAP_ROWS-1, Math.ceil((cy + VH) / tS));

  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      const t  = map[ti(c, r)];
      const sx = Math.round(c * tS - cx);
      const sy = Math.round(r * tS - cy);
      const sw = Math.ceil(tS);
      const sh = Math.ceil(tS);

      if (t === T.GRASS) {
        const v = grassNoise[ti(c, r)];
        ctx.fillStyle = `rgb(${42+v},${88+v},${34+v})`;
        ctx.fillRect(sx, sy, sw, sh);
        // Blade strokes — deterministic per tile
        ctx.fillStyle = `rgba(10,55,5,0.45)`;
        for (let g = 0; g < 5; g++) {
          const gx = sx + (((c*7+r*3+g*11) & 31) / 31) * sw;
          const gy = sy + (((c*3+r*11+g*7) & 31) / 31) * sh;
          ctx.fillRect(gx, gy, Math.max(1, tS*0.06), Math.max(2, tS*0.22));
        }
      } else if (t === T.MOWED) {
        ctx.fillStyle = '#7abf5e';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.fillStyle = 'rgba(0,0,0,0.055)';
        if (((c>>1) + (r>>1)) & 1) ctx.fillRect(sx, sy, sw, sh);
      } else if (t === T.PATH) {
        // Pokemon-style dirt path — warm sandy base with subtle noise variation
        const pv = grassNoise[ti(c, r)]; // reuse noise for dirt variation
        const pr = 178 + Math.floor(pv * 0.4);
        const pg = 148 + Math.floor(pv * 0.35);
        const pb = 98  + Math.floor(pv * 0.2);
        ctx.fillStyle = `rgb(${pr},${pg},${pb})`;
        ctx.fillRect(sx, sy, sw, sh);
        // Small scattered pebble/dirt flecks — deterministic
        for (let p = 0; p < 4; p++) {
          const fx = sx + (((c*13+r*5+p*17)&31)/31) * sw;
          const fy = sy + (((c*7+r*11+p*3) &31)/31) * sh;
          const dark = ((c*11+r*7+p*9)&3) < 2;
          ctx.fillStyle = dark ? `rgba(120,90,55,0.35)` : `rgba(210,185,140,0.4)`;
          ctx.fillRect(fx, fy, Math.max(1, sw*0.13), Math.max(1, sh*0.13));
        }
      } else if (t === T.BORDER) {
        ctx.fillStyle = '#4a3820';
        ctx.fillRect(sx, sy, sw, sh);
        ctx.fillStyle = '#7a5e38';
        if ((c+r) % 4 === 0) ctx.fillRect(sx+sw*0.15, sy+sh*0.08, sw*0.7, sh*0.84);
      } else if (t === T.SOLID) {
        ctx.fillStyle = '#5a8a3a';
        ctx.fillRect(sx, sy, sw, sh);
      }
    }
  }

  // Sprites
  for (const sp of sprites) {
    const sx = sp.col * tS - cx;
    const sy = sp.row * tS - cy;
    if (sx > VW + tS*3 || sy > VH + tS*3 || sx < -tS*4 || sy < -tS*4) continue;
    switch(sp.type) {
      case 'house':    drawHouse(sx, sy);    break;
      case 'kennel':   drawKennel(sx, sy);   break;
      case 'dog':      drawDog(sx, sy);      break;
      case 'tent':     drawTent(sx, sy);     break;
      case 'campfire': drawCampfire(sx, sy); break;
      case 'otree':    drawOrchardTree(sx, sy); break;
      case 'tree':     drawTree(sx, sy);     break;
      case 'stump':    drawStump(sx, sy);    break;
      case 'grave':    drawGrave(sx, sy);    break;
      case 'sheep':    drawSheep(sx, sy);    break;
      case 'chicken':  drawChicken(sx, sy);  break;
    }
  }
}

function drawMowerOnScreen(cam) {
  drawMower(mower.x * GAME_SCALE - cam.cx, mower.y * GAME_SCALE - cam.cy, mower.angle);
}

// ── Minimap (top-left) ─────────────────────────────────────────────────────
const MM_W = 150;
const MM_H = Math.round(MM_W * MAP_ROWS / MAP_COLS);
const mmCanvas = document.createElement('canvas');
mmCanvas.width  = MAP_COLS;
mmCanvas.height = MAP_ROWS;
const mmCtx = mmCanvas.getContext('2d');
const mmImg = mmCtx.createImageData(MAP_COLS, MAP_ROWS);

function updateMinimap() {
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const i = (r * MAP_COLS + c) * 4;
      let col;
      switch(map[ti(c,r)]) {
        case T.GRASS:  col = [42,90,36];    break;
        case T.MOWED:  col = [122,191,94];  break;
        case T.PATH:   col = [178,148,98];  break;
        case T.SOLID:  col = [120,80,50];   break;
        case T.BORDER: col = [74,58,32];    break;
        default:       col = [60,60,60];
      }
      mmImg.data[i]=col[0]; mmImg.data[i+1]=col[1]; mmImg.data[i+2]=col[2]; mmImg.data[i+3]=255;
    }
  }
  mmCtx.putImageData(mmImg, 0, 0);
}
updateMinimap();

function drawMinimap(cam) {
  const pad = 10;
  const x = VW - MM_W - pad;
  const y = BANNER_H + pad;

  // Hide if the mower's screen position is over the minimap area
  const msx = mower.x * GAME_SCALE - cam.cx;
  const msy = mower.y * GAME_SCALE - cam.cy;
  const margin = TILE * GAME_SCALE;
  if (msx > x - margin && msx < x + MM_W + margin &&
      msy > y - margin && msy < y + MM_H + margin) return;

  // Border
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x-2, y-2, MM_W+4, MM_H+4);

  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.drawImage(mmCanvas, x, y, MM_W, MM_H);
  ctx.restore();

  // Mower dot
  const mx = x + (mower.x / MAP_W) * MM_W;
  const my = y + (mower.y / MAP_H) * MM_H;
  ctx.fillStyle = '#ff3333';
  ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI*2); ctx.fill();

  // Viewport rect
  const vx = x + (cam.cx / (MAP_W * GAME_SCALE)) * MM_W;
  const vy = y + (cam.cy / (MAP_H * GAME_SCALE)) * MM_H;
  const vw = (VW / (MAP_W * GAME_SCALE)) * MM_W;
  const vh = (VH / (MAP_H * GAME_SCALE)) * MM_H;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);
}

// ── Banner ─────────────────────────────────────────────────────────────────
function drawBanner(dt) {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, VW, BANNER_H);
  // Pixel-art bottom edge line
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(0, BANNER_H-2, VW, 2);

  ctx.font = '9px "Press Start 2P"';
  const tw = ctx.measureText(bannerText).width;
  bannerScroll -= 55 * dt;
  if (bannerScroll < -tw) bannerScroll = VW;
  ctx.fillStyle = '#ffdd44';
  ctx.fillText(bannerText + bannerText, bannerScroll, BANNER_H - 9);
}

// ── Pixel-art D-pad buttons ────────────────────────────────────────────────
function drawPixelKey(x, y, size, dir, active) {
  const bv = Math.max(3, Math.round(size * 0.1));

  // Outermost dark border
  ctx.fillStyle = '#06060c';
  ctx.fillRect(x, y, size, size);
  // Shadow plane (bottom-right exposed edge)
  ctx.fillStyle = active ? '#0a140a' : '#10101a';
  ctx.fillRect(x+1, y+1, size-2, size-2);
  // Highlight plane (top-left exposed edge)
  ctx.fillStyle = active ? '#284a28' : '#2c2c3e';
  ctx.fillRect(x+1, y+1, size-1-bv, size-1-bv);
  // Face
  ctx.fillStyle = active ? '#162816' : '#1a1a26';
  ctx.fillRect(x+bv, y+bv, size-bv*2, size-bv*2);
  // Sparkle pixel cluster (top-left of face — classic retro key sheen)
  ctx.fillStyle = active ? '#4a7a4a' : '#404058';
  ctx.fillRect(x+bv+1, y+bv+1, 3, 3);
  ctx.fillStyle = active ? '#5a9a5a' : '#505070';
  ctx.fillRect(x+bv+1, y+bv+1, 1, 1);

  // Arrow with stem — proper directional arrow shape
  const ox = active ? 1 : 0; // press offset
  const acx = x + size/2 + ox;
  const acy = y + size/2 + ox;
  const aw = size * 0.26; // arrowhead half-width
  const ah = size * 0.24; // arrowhead depth
  const sw2 = size * 0.1; // stem half-width

  ctx.fillStyle = active ? '#68ee38' : '#7070a0';
  ctx.beginPath();
  switch(dir) {
    case 'up':
      ctx.moveTo(acx,       acy - ah*1.35);
      ctx.lineTo(acx + aw,  acy - ah*0.1);
      ctx.lineTo(acx + sw2, acy - ah*0.1);
      ctx.lineTo(acx + sw2, acy + ah*1.0);
      ctx.lineTo(acx - sw2, acy + ah*1.0);
      ctx.lineTo(acx - sw2, acy - ah*0.1);
      ctx.lineTo(acx - aw,  acy - ah*0.1);
      break;
    case 'down':
      ctx.moveTo(acx,       acy + ah*1.35);
      ctx.lineTo(acx + aw,  acy + ah*0.1);
      ctx.lineTo(acx + sw2, acy + ah*0.1);
      ctx.lineTo(acx + sw2, acy - ah*1.0);
      ctx.lineTo(acx - sw2, acy - ah*1.0);
      ctx.lineTo(acx - sw2, acy + ah*0.1);
      ctx.lineTo(acx - aw,  acy + ah*0.1);
      break;
    case 'left':
      ctx.moveTo(acx - ah*1.35, acy);
      ctx.lineTo(acx - ah*0.1,  acy - aw);
      ctx.lineTo(acx - ah*0.1,  acy - sw2);
      ctx.lineTo(acx + ah*1.0,  acy - sw2);
      ctx.lineTo(acx + ah*1.0,  acy + sw2);
      ctx.lineTo(acx - ah*0.1,  acy + sw2);
      ctx.lineTo(acx - ah*0.1,  acy + aw);
      break;
    case 'right':
      ctx.moveTo(acx + ah*1.35, acy);
      ctx.lineTo(acx + ah*0.1,  acy - aw);
      ctx.lineTo(acx + ah*0.1,  acy - sw2);
      ctx.lineTo(acx - ah*1.0,  acy - sw2);
      ctx.lineTo(acx - ah*1.0,  acy + sw2);
      ctx.lineTo(acx + ah*0.1,  acy + sw2);
      ctx.lineTo(acx + ah*0.1,  acy + aw);
      break;
  }
  ctx.closePath();
  ctx.fill();
}

function drawButtons() {
  const d = dpadLayout();
  const { bs } = d;
  const isUp    = keys['ArrowUp']    || BTN.up;
  const isDown  = keys['ArrowDown']  || BTN.down;
  const isLeft  = keys['ArrowLeft']  || BTN.left;
  const isRight = keys['ArrowRight'] || BTN.right;
  drawPixelKey(d.up.x,    d.up.y,    bs, 'up',    isUp);
  drawPixelKey(d.down.x,  d.down.y,  bs, 'down',  isDown);
  drawPixelKey(d.left.x,  d.left.y,  bs, 'left',  isLeft);
  drawPixelKey(d.right.x, d.right.y, bs, 'right', isRight);
}

// ── Timer + progress bar ───────────────────────────────────────────────────
function drawHUD() {
  const elapsed = performance.now() - startTime;
  const s = Math.floor(elapsed/1000), m = Math.floor(s/60), ss = s%60;
  const cs = Math.floor((elapsed%1000)/10);
  const str = `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;

  // Timer pill background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(10, BANNER_H + 4, 168, 36);
  ctx.font = '11px "Press Start 2P"';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(str, 18, BANNER_H + 22);

  // Progress bar
  const pct = Math.min(1, mowedCount / TOTAL_GRASS);
  const bx = 18, by = BANNER_H + 28, bw = 148, bh = 7;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = pct > 0.9 ? '#ffdd44' : '#7abf5e';
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
}

// ── Mowing + collision ─────────────────────────────────────────────────────
function mowUnder() {
  const hw = TILE * 0.44;
  const pts = [
    { x: mower.x, y: mower.y },
    { x: mower.x + Math.cos(mower.angle)*hw*0.7,       y: mower.y + Math.sin(mower.angle)*hw*0.7 },
    { x: mower.x - Math.cos(mower.angle)*hw*0.7,       y: mower.y - Math.sin(mower.angle)*hw*0.7 },
    { x: mower.x + Math.cos(mower.angle+Math.PI/2)*hw*0.5, y: mower.y + Math.sin(mower.angle+Math.PI/2)*hw*0.5 },
    { x: mower.x - Math.cos(mower.angle+Math.PI/2)*hw*0.5, y: mower.y - Math.sin(mower.angle+Math.PI/2)*hw*0.5 },
  ];
  let changed = false;
  for (const p of pts) {
    const c = Math.floor(p.x / TILE), r = Math.floor(p.y / TILE);
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) {
      const idx = ti(c, r);
      if (map[idx] === T.GRASS) { map[idx] = T.MOWED; mowedCount++; changed = true; }
    }
  }
  if (changed) updateMinimap();
}

function solidAt(wx, wy) {
  const c = Math.floor(wx/TILE), r = Math.floor(wy/TILE);
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return true;
  const t = map[ti(c,r)];
  return t === T.SOLID || t === T.BORDER;
}

function mowerCollides(nx, ny) {
  const h = TILE * 0.38;
  return [
    [nx+h, ny], [nx-h, ny], [nx, ny+h], [nx, ny-h],
    [nx+h*0.7, ny+h*0.7], [nx-h*0.7, ny+h*0.7],
    [nx+h*0.7, ny-h*0.7], [nx-h*0.7, ny-h*0.7],
  ].some(([x,y]) => solidAt(x, y));
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(dt) {
  const fwd   = keys['ArrowUp']    || BTN.up;
  const back  = keys['ArrowDown']  || BTN.down;
  const left  = keys['ArrowLeft']  || BTN.left;
  const right = keys['ArrowRight'] || BTN.right;

  if (fwd)       mower.speed =  MOWER_SPEED;
  else if (back) mower.speed = -MOWER_SPEED * 0.7;
  else           mower.speed *= 0.7;

  if (Math.abs(mower.speed) > 10) {
    const dir = mower.speed > 0 ? 1 : -1;
    if (left)  mower.angle -= TURN_SPEED * dt * dir;
    if (right) mower.angle += TURN_SPEED * dt * dir;
  }

  const nx = mower.x + Math.cos(mower.angle) * mower.speed * dt;
  const ny = mower.y + Math.sin(mower.angle) * mower.speed * dt;
  if (!mowerCollides(nx, mower.y)) mower.x = nx;
  if (!mowerCollides(mower.x, ny)) mower.y = ny;

  mowUnder();
  if (mowedCount >= TOTAL_GRASS) endGame();
}

// ── Home screen ────────────────────────────────────────────────────────────
function drawHome(dt) {
  const cam = getCam();
  drawMap(cam);
  drawMowerOnScreen(cam);
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(0, BANNER_H, VW, VH - BANNER_H);

  const tsz = Math.max(16, Math.min(30, VW * 0.038));
  ctx.textAlign = 'center';
  ctx.font = `${tsz}px "Press Start 2P"`;
  ctx.fillStyle = '#7bff4e';
  ctx.fillText('MOWING MADNESS', VW/2, VH/2 - tsz*2.2);

  const isz = Math.max(8, Math.min(11, VW * 0.014));
  ctx.font = `${isz}px "Press Start 2P"`;
  ctx.fillStyle = '#fff';
  ctx.fillText('▲ / ▼   FORWARD & REVERSE', VW/2, VH/2 + isz*0.5);
  ctx.fillText('◀ / ▶   TURN', VW/2, VH/2 + isz*3);
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('PRESS ANY ARROW TO START', VW/2, VH/2 + isz*7);
  ctx.textAlign = 'left';
}

// ── End screen ─────────────────────────────────────────────────────────────
function drawEnd() {
  const cam = getCam();
  drawMap(cam);
  drawMowerOnScreen(cam);
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, BANNER_H, VW, VH - BANNER_H);

  const won = mowedCount >= TOTAL_GRASS;
  const elapsed = endTime - startTime;
  const tsz = Math.max(14, Math.min(26, VW * 0.032));

  ctx.textAlign = 'center';
  ctx.font = `${tsz}px "Press Start 2P"`;
  ctx.fillStyle = won ? '#7bff4e' : '#ff6644';
  ctx.fillText(won ? 'LAWN MOWED!' : 'QUIT', VW/2, VH/2 - tsz*2);

  ctx.font = `${Math.max(9, tsz*0.58)}px "Press Start 2P"`;
  ctx.fillStyle = '#fff';
  ctx.fillText('TIME: ' + fmtTime(elapsed), VW/2, VH/2 + tsz*0.2);

  if (won) {
    const sc = loadScores();
    const rank = sc.findIndex(v => v === elapsed) + 1;
    if (rank > 0) ctx.fillText(`RANK #${rank} OF ${sc.length}`, VW/2, VH/2 + tsz*1.6);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = `${Math.max(7, tsz*0.4)}px "Press Start 2P"`;
  ctx.fillText('PRESS SPACE TO MOW AGAIN', VW/2, VH/2 + tsz*3.2);
  ctx.textAlign = 'left';
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop(ms) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (ms - lastMs) / 1000);
  lastMs = ms;

  ctx.clearRect(0, 0, VW, VH);

  if (gameState === STATE.HOME) {
    drawHome(dt);
    drawBanner(dt);
    drawButtons();
  } else if (gameState === STATE.PLAYING) {
    const cam = getCam();
    drawMap(cam);
    drawMowerOnScreen(cam);
    drawBanner(dt);
    drawHUD();
    drawMinimap(cam);
    drawButtons();
    update(dt);
  } else {
    drawEnd();
    drawBanner(dt);
    drawButtons();
  }
}

requestAnimationFrame(ts => { lastMs = ts; requestAnimationFrame(loop); });
</script>
</body>
