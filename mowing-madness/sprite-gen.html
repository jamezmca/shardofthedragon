// ─────────────────────────────────────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────────────────────────────────────

const PIXEL_SCALE = 4;  // default export: 16×16 → 64×64
const MAX_PREVIEW = 192;

function drawPixelSprite(ctx, px, pal, scale) {
  for(let r=0;r<px.length;r++) for(let c=0;c<px[r].length;c++) {
    const ci=px[r][c]; if(!pal[ci]) continue;
    ctx.fillStyle=pal[ci];
    ctx.fillRect(c*scale,r*scale,scale,scale);
  }
}

function downloadPixel(sp) {
  const pixScale = sp.exportScale || PIXEL_SCALE;
  const sz = sp.px.length * pixScale;
  const c=document.createElement('canvas'); c.width=c.height=sz;
  const ctx=c.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  drawPixelSprite(ctx,sp.px,sp.pal,pixScale);
  dl(c,sp.file);
}

function downloadDraw(sp) {
  const c=document.createElement('canvas'); c.width=sp.w; c.height=sp.h;
  const ctx=c.getContext('2d'); ctx.clearRect(0,0,sp.w,sp.h);
  sp.draw(ctx,sp.w,sp.h);
  dl(c,sp.file);
}

function dl(canvas,filename) {
  const a=document.createElement('a'); a.download=filename;
  a.href=canvas.toDataURL('image/png'); a.click();
}

// ── Build UI ──────────────────────────────────────────────────────────────────

function buildUI() {
  const root=document.getElementById('root');

  function addSection(title) {
    const h=document.createElement('div'); h.className='section-title';
    h.textContent=title; root.appendChild(h);
    const g=document.createElement('div'); g.className='grid';
    root.appendChild(g); return g;
  }

  function addPixelSprite(grid,sp) {
    const sz=sp.px.length;
    const previewScale=Math.floor(MAX_PREVIEW/sz);
    const previewPx=sz*previewScale;
    const block=document.createElement('div'); block.className='sprite-block';
    const title=document.createElement('h3'); title.textContent=sp.name; block.appendChild(title);
    const canvas=document.createElement('canvas');
    canvas.width=canvas.height=previewPx;
    canvas.style.width=canvas.style.height=previewPx+'px';
    const ctx=canvas.getContext('2d');
    for(let r=0;r<sz;r++) for(let c=0;c<sz;c++) {
      ctx.fillStyle=((r+c)%2===0)?'#2a2a3a':'#1e1e2e';
      ctx.fillRect(c*previewScale,r*previewScale,previewScale,previewScale);
    }
    drawPixelSprite(ctx,sp.px,sp.pal,previewScale);
    block.appendChild(canvas);
    const meta=document.createElement('div'); meta.className='meta';
    const exportPx = sp.px.length * (sp.exportScale || PIXEL_SCALE);
    meta.textContent=`${exportPx}×${exportPx}px · ${sp.file}`;
    block.appendChild(meta);
    const btn=document.createElement('button'); btn.textContent='⬇ Download PNG';
    btn.onclick=()=>downloadPixel(sp); block.appendChild(btn);
    grid.appendChild(block);
  }

  // Tiles
  const tileGrid=addSection('assets/tiles/');
  PS.filter(s=>s.folder==='tiles').forEach(s=>addPixelSprite(tileGrid,s));

  // Characters
  const charGrid=addSection('assets/sprites/ — Characters');
  PS.filter(s=>s.folder==='sprites'&&['mower_n.png','sheep.png','chicken.png','dog.png'].includes(s.file))
    .forEach(s=>addPixelSprite(charGrid,s));

  // Flowers
  const flGrid=addSection('assets/sprites/ — Flowers (game-ending obstacles)');
  PS.filter(s=>s.file.startsWith('flower_')).forEach(s=>addPixelSprite(flGrid,s));

  // Props
  const propGrid=addSection('assets/sprites/ — Props');
  PS.filter(s=>['stump.png','grave.png','campfire.png'].includes(s.file))
    .forEach(s=>addPixelSprite(propGrid,s));

  // Trees
  const treeGrid=addSection('assets/sprites/ — Trees');
  PS.filter(s=>['tree.png','tree_orchard.png'].includes(s.file))
    .forEach(s=>addPixelSprite(treeGrid,s));

  // Buildings
  const buildGrid=addSection('assets/sprites/ — Buildings');
  PS.filter(s=>['kennel.png','tent.png','cottage.png'].includes(s.file))
    .forEach(s=>addPixelSprite(buildGrid,s));
}

buildUI();

// Download All
document.getElementById('all-btn').onclick=()=>{
  const all=[...PS,...DS];
  all.forEach((sp,i)=>setTimeout(()=>{
    if(sp.px) downloadPixel(sp); else downloadDraw(sp);
  },i*100));
};
