<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4-cast | Free animated weather forecasts, no sign up</title>
  <meta name="description" content="4-cast shows your local weather as a full-screen animated scene — sunny skies, rainstorms, blizzards and more. Free, no ads, no account needed.">
  <meta name="keywords" content="weather forecast, animated weather, free weather app, current weather, no sign up weather">
  <meta property="og:title" content="4-cast | Free animated weather forecasts">
  <meta property="og:description" content="See your local weather as a full-screen animated scene. Sunny, rainy, snowy and more — free, no ads, no account.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="4-cast | Free animated weather forecasts">
  <meta name="twitter:description" content="See your local weather as a full-screen animated scene. Free, no ads, no account needed.">
  <link href="https://fonts.cdnfonts.com/css/recoleta" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HOME: shown when no ?location param -->
  <div id="home">
    <h1 class="headline">What's the weather in...</h1>
    <div class="search-wrap">
      <input type="text" id="search-input" autocomplete="off" spellcheck="false" placeholder="type a city...">
      <ul id="suggestions" hidden></ul>
    </div>
  </div>

  <!-- WEATHER: shown when location is resolved -->
  <div id="weather" hidden>
    <div class="sky"></div>
    <div class="sun-moon"></div>
    <div class="back-landscape"></div>
    <div class="landscape"></div>
    <div class="clouds">
      <div class="cloud cloud-a"></div>
      <div class="cloud cloud-b"></div>
      <div class="cloud cloud-c"></div>
      <div class="cloud cloud-d"></div>
    </div>
    <div class="weather-fx"></div>
    <div class="lightning-flash"></div>
    <div class="blizzard-fog"></div>
<div class="ui-overlay">
      <p class="ui-location" id="ui-location"></p>
      <p class="ui-temp"     id="ui-temp"></p>
      <p class="ui-rain"     id="ui-rain"></p>
      <nav id="time-nav">
        <button class="time-btn active" data-offset="0">now</button>
        <button class="time-btn" data-offset="3">+3 hrs</button>
        <button class="time-btn" data-offset="6">+6 hrs</button>
        <button class="time-btn" data-offset="12">+12 hrs</button>
        <button class="time-btn" data-offset="24">+1 day</button>
        <button class="time-btn" data-offset="48">+2 days</button>
        <button class="time-btn" data-offset="72">+3 days</button>
      </nav>
    </div>
    <button id="btn-change">change location</button>
  </div>

  <script src="app.js"></script>
</body>

</html>
